body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明南嶽沙門憨山釋德清述妙法蓮華經五百弟子受記品第八此品來意五百弟子聞前法喻二周五人得記復聞宿世因緣之事乃知佛以無量神通方便引導衆生原下一乘之種子爾乃的信佛心亦信自心決定成佛疑慮頓盡故云心淨志慕授記故云踊躍堪荷家業父子情忘故云深心本願唯佛能知故世尊與千二百各同授記以滿出世本懷也故此結集者以授字為品謂既發大信堪當荷受故此品來也經舉千二百人品標五百者以五百為千二之上首故爾時富樓那彌多羅尼子至瞻仰尊顏目不暫捨此結集者敘致滿慈領悟之情也從佛聞是等者謂聞法說二智甚深喻說三車一車隨宜之權同輩五人各得授記今聞往昔大通之因緣導師化城之神通此上諸事皆一向所未曾聞者所以得未曾有也先是未聞此法則尚懷疑執吝小果既聞開示則疑惑消除故曰心淨自信成佛可期故踊躍歡喜故嚴整三業却住瞻仰冀佛授記也而作是念世尊甚奇特至能知我等深心本願此述滿慈之辭也歎佛甚奇特希有者因聞三周開示領契佛心故發歎也隨順世間拔出貪著等正歎奇特希有之事也空生於般若會上忽見世尊護念付囑之心故歎希有乃不言而喻今滿慈歷聞三周之說具見如來大慈大悲無非護念付囑之心令五性三乘遠令離著是為甚奇希有之事蓋因言而悟也世尊前云迦葉等不能盡知如來真實功德滿慈自謂我等於佛功德其實言不能宣然我等深心助宣佛法護願流通意欲得記此心亦不能言唯佛世尊證知我心固不待言前迦葉等自述領悟尚有許多綢繆疑慮之情今滿慈但云深心本願唯佛證知則從來不疑於佛將顯內祕之本以發下根劣解之信即此是為助宣之意也故居千二百首良有以也爾時佛告諸比丘至無能盡其言論之辨此下世尊歷敘滿慈內祕外現助宣佛法之事以述成其深心本願如此也汝等見是下述滿慈現前助宣釋迦之法有如此者滿慈最善說法故世尊稱為說法第一捨如來不能盡其言論之辨此述善說之極也汝等勿謂富樓那至常作佛事教化衆生此述滿慈於過去佛所護持助宣之事亦見其深心本願也空法通達言達實相直空也四無礙說法之辨也唯佛能全滿慈亦具常能審諦則觀根逗機清淨說法則不著法相無有疑惑則決定說具足菩薩等則內祕外現而人不知密行皆謂實是聲聞但知其跡也所化多衆令立菩提則所說者非小法也淨土化生非小行也皆是深心本願之事諸比丘富樓那亦於七佛至漸漸具足菩薩之道上述遠事過去多佛此述近事過去七佛也過去諸佛雖多在莊嚴劫之最後謂毗婆尸尸棄毗舍浮三佛及賢劫初佛拘留孫拘那含迦葉至我釋迦四佛通為七佛此其近劫相傳心印之佛也自此已往賢劫將來至星宿劫諸佛一一佛所皆能護持助宣佛法專以說法為行淨土化生具菩薩道以為成佛之基也前五人得授因記世尊但說親近供養諸佛之行而已今滿慈因記備述助宣護法之事如此之詳至者以世尊密意專重護持正法廣結成佛之緣為大行也故因中不必更修餘行唯以助宣護持佛法為第一妙行而向後歷歷囑其持經廣歎法師功德皆此意也過無量阿僧祇劫至佛滅度後起七寶塔遍滿其國此滿慈得記也以因中弘法傳佛心印故不離當處而證菩提故果記當於此土得菩提也顧此娑婆本穢而滿慈果土純一清淨者足見即穢即淨密示實相真土矣但隨心轉變於是可知以因中於諸空法明了通達故果號法明以稱法性淨土利生廣大無量故果感依報以恆沙娑婆通為一土以平等大悲清淨說法故依報國土地平如掌無有山陵以稱法性建立諸法故七寶臺觀充滿其中以當說法淨穢情亡善惡平等故人天交接兩得相見無諸惡道因中常修梵行廣化衆生故果土無有女人淫欲衆生皆是化生清淨說法之報也衆生不從淫欲而生故身出光明永離欲縛故飛行自在衆生皆以從法化生故志念堅固精進智慧無諸雜亂妄想也身皆金色離欲之報也衆生以食為命國人既皆化生則不攝受欲食故唯以法喜禪悅為食也從來但說教菩薩法故眷屬皆大菩薩而聲聞亦多者以漸漸具足菩薩之道是亦願力所攝之衆也上皆依報莊嚴也劫名寶明以法寶圓明故時非五濁故國名善淨亦隨清淨說法之因也壽命但云無量而不言數法住不言正像但云甚久而不定其期此以稱性說法以法性本無始終故慧命常住正法恆存滅後起塔遍滿其國此滿慈說法之因果獨記如此足知如來密意獨顯持經功勝也且娑婆世界乃釋迦之化土也名五濁惡世衆苦所聚名為堪忍其國山陵溝壑高下不平便利不淨穢惡充滿衆生淫欲沉淪生死之地乃小乘之所厭怖如牢獄桎梏長辭而不敢再入者今滿慈得記不離此土而證菩提地平如掌國土清淨之若此絶無女人衆生化生身相光明之若彼又以無量娑婆通為一土其廣大又如此者此正特示二乘開佛知見則狹陋消除取捨情亡欣厭心息即目前所遇純是華藏莊嚴清淨實報之佛土更不向外馳求直下不疑頓登佛地此授記之功畢現於此即下根劣解豈不自信而甘自外於佛知見乎國土淨穢隨心轉變詎不信哉觀此足具見如來化生之善巧誠謂佛智不可思議矣若以此記與衆例視而輕忽之則不達如來微妙之意也爾時世尊欲重宣此義而說偈言諸比丘諦聽佛子所行道至我今但略說此頌通述弟子內祕外現之事也滿慈與身子等十大弟子皆同德也獨露權應之跡居千二百之首正示特為引進鈍根之方便將令知恩而信解也然聲聞有權現有實果若千二百人皆實果鈍根苟知滿慈等權應之跡必能捨小而信大矣故世尊於此發其祕耳今此下三十句通頌權現護宣之行其後下二十二句別頌滿慈授記之事富樓下六句結頌可知言但略說則功德不可思議矣爾時千二百阿羅漢至三藐三菩提記此千二百請記也以如來歎滿慈宿因深厚非千二百之所敢望今聞佛開示本為接引鈍根亦各自信有成佛之分故歡喜以請佛知衆心故告迦葉者然已遂本懷中心自快故特告上首正如同事之人事偕而相慶意也於此衆中我大弟子至盡同一號名曰普明此授五百弟子記也釋尊初於鹿苑三轉四諦法輪度參侍五人而憍陳先悟以最初得度故居僧首乃實果羅漢之領袖故五百中特表而出之獨為授記示異等也授記不言因行意有前列六人可法也果號普明以開佛知見入佛智慧無復癡暗也偈云常放大光明常說無上道故得此號其五百羅漢盡同一號其德同也不言劫國等事頌中具之經有長頌廣略互見之式爾時世尊欲重宣此義而說偈言憍陳如比丘當見無量佛至汝當為宣說此頌陳那之記以標衆也憍陳下十句頌正報果號其國土清淨下頌依報眷屬佛壽下三句頌壽命法住法滅下八句頌例五百次第成佛其所化世間亦如我今日則所化之機皆先權後實也國土之嚴淨下六句頌依報眷屬法壽一一皆若憍陳也迦葉汝已知下六句舉五百以例餘七百皆得果記相同也此千二百授記之文不詳陳因行者以鈍根羅漢且令生信至若事佛功行又待各自發心耳不敢遽以難行所怖之事加之此如來將護之意也爾時五百阿羅漢至而便自以小智為足此五百自述領悟之懷也我等應得等謂一向自以失於如來智慧今日乃知本不曾失但我等自以小智為足耳此領悟也世尊譬如有人至親友家至甚大歡喜得未曾有此領因緣之說設喻自況也大通智勝十六王子并無數人民如親友也王子說法華經比為我等已下一乘緣種如繫珠也是時不悟如醉臥也自此迷淪生死如遊行他國退住聲聞地故若少有得便以為足也於後親友會遇如今遇釋尊咄哉者喻昔日彈呵也指示衣珠喻今開佛知見令悟本有佛性也此喻昔失今得佛亦如是下法合昔因今者世尊下法合今緣我今乃知等法合今得故甚大歡喜得未曾有也爾時阿若憍陳如等欲重宣此義而說偈言我等聞無上安隱授記聲至身心遍歡喜此憍陳頌述今得悔責昔失也我等聞無上三句慶今得也禮無量下七句悔昔失也譬如貧窮人下十六句頌喻昔緣與珠之親友下八句頌喻今緣我等亦如是下八句頌合昔因今佛下四句頌合今緣我今下四句總頌得記故自慶也妙法蓮華經授學無學人記品第九此品來意由前三周開示當機聞已各信自心不疑佛說故上首弟子自無學并五百及千二百皆久受教化各得受記業已安慰其心矣尚有新學聲聞若阿難羅睺等各願得記以滿衆望以見佛平等之慈故各為授記因以名品故此品來也然佛性有三種因謂正因緣因了因三因若顯成佛無疑人人本具故為正因要假教法知識助發乃顯故為緣因自信了悟故為了因若舍利弗等五人了悟之速者乃正因深厚也若五百弟子者廣引昔緣以見久受教化乃緣因熟也而緣因之中有親有因起信論云或示親友今學無學輩若弟若子是緣因之中而最親者無不得度之理也故盡授記方見如來平等慈悲之意故次前品爾時阿難羅睺羅至如阿難羅睺羅所願住立一面此記有學衆也蓋學於無學故名有學乃新學小聲聞耳阿難為佛弟羅睺為佛子所謂攝受親也因見千二百無學皆得授記乃遺有學故思惟以請然阿難多聞羅睺密行皆內祕之儔今列有學者以有學不敢希記向以成佛非己智分不知所請若不假大權引導則不蒙佛指名的授以決衆疑故示居此耳以二尊宿為衆知識今列學衆若得記莂則皆可得矣故曰我願既滿衆望亦足爾時學無學二千人因見阿難啓請故一心同請爾時佛告阿難汝於來世至所共讚歎稱其功德爾時世尊欲重宣此義而說偈言我今僧中說阿難持法者至種佛道因緣此阿難多聞持佛法藏智慧高深通達自在故果號如之教化二十千萬億恆沙菩薩則唯以大法攝化純一無雜也國名常立勝幡則以正法摧邪尊勝如幢劫名妙音遍滿則法音所感壽命不可校計法住倍之則法性常住之應也以持諸佛法藏故諸佛讚其功德頌偈如文可知爾時會中新發意菩薩至而諸聲聞得如是決新發意菩薩聞阿難記而生疑者將以啓其夙因也其所疑者以壽命法住遠而無極也爾時世尊知諸菩薩至其本願如是故獲斯記此世尊發明阿難遠因以釋大衆之疑也以阿難與佛同時發心但佛願度生故勤精進阿難樂多聞故願持法藏法性無量故壽命無窮純教菩薩故國無二乘其本願如此故果亦如之諸弟子獨滿慈阿難特異於衆蓋重持法之功也阿難面於佛前自聞授記至如今所聞亦識本願爾時阿難而說偈言世尊甚奇有令我念過去至護持諸佛法阿難因聞佛記又述昔因即能憶念過去無量諸佛法藏亦識本願即如善財於彌勒樓閣前聞彈指之聲頓見閣中無盡諸佛境界是知諸佛法藏乃阿難閨閣中物耳偈言方便為侍者正是自識本願則不可與諸悔失慶得者同日語也記獨異衆宜矣阿難宿因如此楞嚴摩登之事豈顛倒夢想乎爾時佛告羅睺羅至當得阿耨多羅三藐三菩提爾時世尊欲重宣此義而說偈言我為太子時羅睺為長子至以求無上道此羅睺羅得記也羅睺密行第一今記得果號蹈七寶華則所履微密妙行所感也為佛長子言能克荷家業意表成佛以行為首也其國土壽命眷屬法住皆與阿難等者顯聞思修行本無異慧命均等故果報亦等理宜然也爾時世尊見學無學二千人至正法像法皆悉同等爾時世尊欲重宣此義而說偈言是二千聲聞今於我前住至漸入於涅槃爾時學無學二千人聞佛授記歡喜踊躍而說偈言世尊慧燈明我聞授記音心歡喜充滿如甘露見灌此普授有學衆記也此有學衆皆新學聲聞衆皆知其難並無學者也一槩特記恐衆見疑故世尊先言其意柔軟寂然清淨則因聞妙法已踐無學之境堪當得記衆所未知所以佛告阿難汝見是二千人不意謂可曾見此衆現前領悟之心也以此示之潛消衆疑故為授記以因中護持法藏故果號寶相謂以佛法寶藏為自莊嚴也壽命劫國等皆悉同者以因同也此二千人向於法中未見行事故記亦大略不一一也頌文可知言漸入於涅槃則亦以三乘化導也既聞記已歡喜踊躍故說偈讚謝妙法蓮華經法師品第十此品來意由前世尊廣讚一乘甚深微妙能信受者即得成佛故諸大弟子各得授記然此一乘乃衆生本具正因之佛性也今以如來方便開示說此妙法以為助顯之緣因無不了悟乃堪荷負以今證昔既知大通之本因緣緣至今而不失則知今日一會之法緣又為將來無盡之種子所謂凡有聞法者無一不成佛乃至一念隨喜者即得菩提故以法師標品以心為師故名法師意在今以法華之正因要託法師以開顯以為將來窮劫之勝緣蓋佛性種子要借緣熏熏有新舊大通為舊熏今乃新熏也法師有五種謂隨喜讀誦受持書寫解說但能一種即名法師以此經已有如來全身故能持者即為荷擔如來故當敬侍如佛以顯殊勝妙法要假人弘則使佛種不斷故毀謗者其罪甚重以斷佛種性故也由是以見如來出世本懷已周故次授記此品來也爾時世尊因藥王至當得阿耨多羅三藐三菩提此下廣記八部以示平等大慈極顯持經之益也前白毫光中所見若諸佛子種種因緣而求佛道是則前諸授記乃三乘人種種因緣而求佛道者也又曰諸求三乘人若有疑悔者佛當為除斷是知現前八部皆求三乘之人也追其昔因此輩豈非大通智勝之遺乎然此等輩佛佛出世皆為護法則聞法之緣業已熟矣況今聞此妙法一偈一句乃至一念隨喜者皆與授記當得菩提以示平等佛慧故與現前一一授記以顯妙法之勝益也此特告藥王者乃忘身捨執妙契此法能持之人即為持經者之師表也佛告藥王至我亦與授阿耨多羅三藐三菩提記此懸記未來持法之人也如來滅後此法在世即法身常住故若聞一偈一句乃至一念隨喜者已有成佛真種如人食少金剛終竟透皮而出無不成佛之理也故亦為授記此但言隨喜者下正示六種法師若復有人受持讀誦至於未來世必得作佛此示六種法師正是持經之人也謂此六種持經之人能敬此經如佛而供養恭敬者是人則已曾供多佛宿福深厚成就大願而來者若有人問何等衆生於未來當得作佛我應示是諸人等必當作佛也天台判六種法師當五品觀行位即以隨喜妙法為成佛真種故必得作佛無疑矣寂音謂修多羅有觀照二門是妙方便故凡言於此經受持讀誦書寫演說者觀照方便之力也五品觀行者謂一隨喜二讀誦三說法四兼行六度五正行六度言隨喜者聞隨喜何法答妙法妙法者即此心也妙心體具如如意珠心佛及衆生是三無差別此心即空即假即中常境無相常智無緣無緣而緣無非三觀無相而相三諦宛然是故五種法師必得作佛者觀行之力也故東印土國王請二十七祖齊王問尊者何不看經者曰貧道出息不涉衆緣入息不居陰界常轉如是經百千萬億卷是知持經所重觀照持心非循行數墨執紙墨文字為成佛之因也何以故若善男子至何況於大衆中廣為人說此徵釋上持經緣勝所以也上言能持一句則具六種法師之功德何況能持全經然在惡世演此經者是人定是淨土果人示生惡世者也若如來滅後有能竊為一人說此經一句者是人即是如來所使行如來事之人何況為衆廣演者乎以將如來之慧命故也藥王若有惡人以不善心至其罪甚重此戒勿輕毀持經之人也佛體如空毀之如唾空耳持經之人慧命所係毀之則斷佛種故罪不容悔藥王其有讀誦法華經者至三藐三菩提故此勉敬事持經之人如敬佛者以能持此心則全體是佛則為如來肩所荷擔不但荷擔如來也昔佛上忉利天為母說法優闐王與諸弟子思慕世尊因目連等三十二人往詣天宮以旃檀香造如來像請回人問四衆瞻禮及世尊自天宮回見像作禮讚曰我滅度後賴汝於震旦國度人無量然一香像尚能持佛慧命況持此經之人乎然如來肩所荷擔隨所至方尊重供養宜矣所應尊重如此者以歡喜說須臾聞即得菩提故也爾時世尊欲重宣此義而說偈言若欲住佛道成就自然智至行於如來事此總頌持經之勝益也佛道高遠不易住自然智妙出天然不易成但當供養持經之人則皆易矣一切種智佛果智也積劫修因然後乃得今但持此經并供養持者則疾得矣是知妙法全體在經與人也故持經之人非如來所使其孰能之諸有能受持下八句頌捨清淨業報等文應以下四句頌既是果人故應當供養也吾滅後下十二句言惡世難持能持難聞幸聞故當敬禮供養冀得須臾聞也所以惡世能持者非如來所遣則不能也若於一劫中常懷不善心至法華最第一此頌較毀讚之罪福也如長行可知毀者之罪如此而讚者獲福又如彼所重慧命不斷也於八十億劫下八句頌以長時之供養慶須臾之得聞以供乃人天小善聞乃直得菩提故為獲大利也藥王下四句頌結勝益以諸經中此法華經為第一故爾時佛復告藥王菩薩至猶多怨嫉況滅度後此下顯法深妙承上第一誡勿輕授也三世諸佛所說經無量萬億即釋尊所說諸經亦無量萬億唯獨此法華經難信難解者以是諸佛祕要之藏故諸佛所寶故不可妄授匪人一向守護久默而未顯說者以如來現世猶多怨嫉如退席之儔況滅後乎所以慎勿輕授也藥王當知如來滅後至則為如來手摩其頭此言如來滅後惡世難持能持者一以仗佛覆護二以自有三種大力也佛以忍辱為衣謂心體妙法住寂滅忍是如來以衣覆之也隨順覺性故為諸佛所護念也徹信自心為大信力志以此法普施衆生為大志願力承事諸佛心無疲厭為善根力妙契法身故與如來共宿念佛故應忍故為如來摩頭安殷也苟非具斯數者而於惡世持經難矣藥王在在處處至皆近阿耨多羅三藐三菩提此言經即如來法身全體故在處皆應起塔也以法身無依以塔為依故此塔即應種種供養也見塔禮拜以親近法身故即近菩提藥王多有人在家至得近阿耨多羅三藐三菩提此言妙法為菩薩修行求佛之本也凡有僧俗欲行菩薩道而不聞此經是人未善行菩薩道者以不達本故也大經云忘失菩提心而修諸善根是為魔業以心外取法故所謂達本情亡知心體合所以為善故得聞是經乃可以為善行也此則乃佛知見若聞是經信解受持者則為開佛知見故得近菩提下設喻以明其善行藥王譬如有人渴之須水至其心決定知水必近此喻求法之要為善行之譬也水喻正因佛性高原喻煩惱深厚穿鑿喻觀照研窮乾土喻未見佛性故云去水尚遠施工不已喻觀行漸進濕土喻分見真理至泥喻法流不遠故云知水必近是則濕土如聞般若泥則若聞此經也及聞此經更須假觀照之功方便悟入乃見佛性真源所謂與如來法流水接也由是觀之若以文字語言為得者正謂依他作解塞自悟門若望消渴而得清涼者難矣故經云近之而已前云寶處在近此云知水必近又云得近菩提不言到而云近宗門所謂語忌十成者耶菩薩亦復如是至今佛教化成就菩薩而為開示此以法合也此經乃諸佛之慧命菩薩修行若未聞未解未能修習此經者則去菩提尚遠以向被無明煩惱所覆如乾土也若得聞解思修以觀照方便則近菩提如鑿井見泥然菩薩修行必要依此經者以一切菩提皆屬此經故以此經開方便門示真實相故此法華經藏即衆生如來藏也若未開示蘊在識藏以此識藏菩薩地盡不能盡知唯佛能知故云深固幽遠無人能到非大根亦不能信故今佛為菩薩開示不入餘衆生手也藥王若有菩薩聞是法華經至當知是為增上慢者此言非機難信也若菩薩聞而驚怖者乃新發意者聲聞聞而驚怖者皆增上慢人皆非機也藥王若有善男子至及四衆廣說是法華經此示說經之方所謂教菩薩法也歷言敬說經者供養如佛故敬說者非徒事口舌必須具佛之體所說與佛心相應體佛之心也故云入如來室著如來衣坐如來座乃可說法安身為室夫法身非身以衆生為身故曰慈悲所緣緣苦衆生則佛以慈悲為室也覆體為衣佛本無我無我則無物可對無物可對則物莫能傷潛身於忍則無我之至故以忍辱為衣也逸心為座心空則寂滅寂滅則聲如谷響說無所說故以法空為座也如來身心語言為若此菩薩能具此體安住其中然後以不懈怠心為四衆說如是乃可名為說經者否則欲其敬事如佛難矣藥王我於餘國遣化人至我還為說令得具足此言說者體佛之行則感佛護助弘宣也前云若我弟子未受化者若我滅後於餘國作佛更有異名而度脫之今云如來滅後有如是依法說是經者我於他方必遣化人為聽法衆先信是法令不者信也若說法者在空閒處我必廣遣八部為護法使無魔擾也不但遣人即我親現其身於其人前若有忘失句逗我必為說令通利無遺失也以如來滅後濁惡世中持經者難非仗如來加被攝受何能令法久住哉爾時世尊欲重宣此義而說偈言欲捨諸懈怠應當聽此經至得見恆沙佛此頌初四句總顯法勝信受者不易捨懈怠者心不與世情和合是真精進以心契妙法名精進行故欲捨懈怠當聽此經也如人下六句設喻藥王下十句法合若人下十四句言體佛行我千萬億土下三十六句佛助弘宣為現光明身等乃現身面言說加持也諸佛護念正謂教菩薩法佛所護念也若親近下四句結勸言得見恆沙佛者所謂恆沙性德總在心源隨順心師則性德顯矣齊此已前九品判為開佛知見者開有二意在佛則為衆開示開顯開發要令聞者自信此心在機則為開悟以衆生久迷不信自心今聞佛說則悅災了悟所謂悟心之士如蓮華開經雖通言四種知見約義則上十品經通顯如來出世本懷諸大弟子一向不知佛心故多疑佛說甚至以佛為魔今則決信無疑方顯開悟此心之象宗門所謂的信自心是佛直到不疑之地故判屬開字古德槩以前為說三周法授三根記法師一品為授廣記以圓該前記諦觀經義獨重持經之人極言妙法之益者以衆生向不知有今既知有當須奉重不可妄授匪人所謂非器不傳通顯開佛知見之義耳妙法蓮華經見寶塔品第十一此品來意判為示佛知見者以顯示如來常住法身直指淨土實報真境欲令衆生知此見此法身境界乃為佛之知見一往但以言說開曉今則的以實事指示故此品單約示字也惟此法身真境經初一光東照圓現法界事相生佛始終乃通示衆生心境之妙由當機未悟妙心乃以識情思量所謂情生智隔不達目前便是將謂非己智分今蒙如來種種開示當機已信佛言自知作佛各得授記是乃雖信自心然猶未信實相真境此則生滅之見未忘淨穢之執未謝故世尊至此將顯法身常住故七寶妙塔從地涌出多寶如來全身現在以消生滅之見即此娑婆三變淨土以祛淨穢之執且十方諸佛充滿其中以彰法界塵塵剎剎觸目皆是實相真境此乃佛之真知見也故此品為示佛知見當授記已畢故此品來也然塔高五百由旬塔中多寶全身不散者以示衆生即此五蘊生滅身心便是常住法身安宅也就此娑婆三變皆成淨土者以示華藏莊嚴實報真境不離五濁業用也此特示毗盧遮那依正實報莊嚴之一斑欲令衆生知此心境之妙即可目前現證不生佛道長遠之怖也引權入實意見於此何以明之此經所明開方便門示真實相何謂真實相以我毗盧遮那曠劫修因所證法身真佛所居寂光真土從法垂報千丈盧舍那佛所居實報莊嚴淨土而此身土皆真故為真實之相而釋迦乃從報垂應之化身其所居之土皆與民同患乃娑婆五濁之穢土而此身土皆假故凡施設一往說法皆以為權所謂方便門者是也由盧舍那初成正覺現千丈身坐菩提場說華嚴經而二乘在座如盲如聾是雖身土皆真而教法俱實奈何獨被大機小根絶分故入剎那際三昧雙垂兩相二始同時正說華嚴不妨示應化身八相成道於鹿野苑將一乘法分別說三以接小機所謂以方便力為說四諦十二因緣六度等同攝三根雖有教菩薩法總屬權教正如長者誘引諸子許以三車非實有也故未盡如來出世本懷以諸弟子未見法身真境故經云我本立誓願欲令一切衆如我等無異意欲直令衆生親證如來法身境界以趣華藏莊嚴之實果方稱本懷奈何下劣之徒一向執權當實更不前進且於佛所說疑而不信故費世尊四十年來種種方便陶汰之功今已純熟且化緣將畢故於此會直吐本懷開除昔日三乘之權以顯一乘之實經中長者家業之富正喻華嚴一乘圓妙之法也以諸聲聞但認釋迦應身之佛以為真不知尚有真佛也但見娑婆穢土之可厭不達實相真境也故生滅之見淨穢之情一向執吝而不捨以不達惟心所現故將說此經先放白毫一光普照東方萬八千世界洞示法界之真境即在衆生日用之間此非心識思量分別可到故重假方便種種開示大衆各信自心遂一一授記成佛正若華嚴所言初發心時知一切法即心自性成就慧身不由他悟此但了心真不達境實心境未融未是成佛真因猶屬衆生知見未是佛之知見也故前授記已顯心真今說此品以顯境妙直指目前現證故特判為示佛知見故云以事指陳以洗小乘從前宿習知見易於修證方盡如來出世之本懷也此品來意幽遠非細心參詳殊難領會但融觀華嚴自知此中歸趣爾時佛前有七寶塔至供養寶塔恭敬尊重讚歎此正指示佛知見也佛知見者乃自覺聖智所知所見乃一真法界真境也惟此法界乃法身之安宅報化依之而起也故諸佛證之為一切種智報身踞之為華藏莊嚴化身以之為神通妙用衆生迷之為五蘊身心八萬四千煩塵惱勞修心之士若不洞見一真法界總屬門外止宿草菴不為實證故此三周開說以圓佛前寶塔出現為示佛知見之象也然法身無依以法界為依法界者寂滅之心也寶塔者寂滅之境也五百由旬者喻衆生五蘊身心即是寂滅真境也縱廣二百五十由旬者喻迷此法界即此身心不出二十五有也從地涌出者喻無明心地若破寂滅之境現前所謂生滅既滅寂滅現前則此五蘊身心本無所有故云住在空中種種寶物而莊校者喻此法界本非斷滅具有恆沙稱性功德神通妙用也高出四天則非四大可拘也諸天散華八部作供者喻此法界本為諸天之所奉重八部之所守護元非寂寞無人之地也爾時寶塔中出大音聲至如所說者皆是真實此言塔中出聲以示寂而能說非斷滅也歎言善哉善哉等以讚釋迦能稱法界體以平等大慧說此妙法華經也如是如是者印證所說皆究竟如法界也所說皆是真實證其所說不妄也前世尊歷對弟子自謂言不虗妄今塔音現證釋迦說寂滅法意要三乘必信以此印定群機也爾時四衆見大寶塔至恭敬合掌却住一面此四衆見塔喜怪也喜者七寶妙塔忽然涌出住在空中甚為希有固可喜也而塔中出聲甚可怪也若悟塔中所出音聲則一切音聲皆寂滅矣大衆不知所以然而然故合掌住立冀佛開示也爾時有菩薩摩訶薩至又於其中發是音聲此當機見塔為衆疑請也大樂說菩薩請者以寂滅之法乃離言之道苟非樂說則終絶言矣淨名云雖復不依言語道亦復不著無言說樂說之義也塔非無故而現故請說其因緣爾時佛告大樂說菩薩至從地涌出讚言善哉善哉此說塔現之因也塔中有如來全身者然塔喻衆生五蘊身中有如來全身所謂幻化空身即法身也楞伽云如來藏自性清淨轉三十二相入於一切衆生身中如大價寶垢衣所纏今國名寶淨乃如來藏出纏離垢之象也佛號多寶法身乃如來藏以具有恆沙稱性功德故名多寶其佛行菩薩道時誓願滅後凡十方說法華經處塔現作證者以多寶本以妙法得證法身故凡說經處法身即現在法會中聞說妙法苟能開佛知見則此五蘊身心頓見法身全體此作證之象也彼佛成道已臨滅囑供全身以大塔者正顯離相滅相究竟涅槃常寂滅相之法也其佛以神通下至塔中讚言善哉善哉等者所謂寂而能演遍十方以此經即法身全體若佛知見一開即出現作證也上敘多寶之因緣大樂說結示今緣也是時大樂說菩薩至我等願欲見此佛身此法會願見塔中多寶佛身也法身顯現雖是以己智力須仗佛威神故假佛神力以請佛告大樂說至亦願欲見世尊分身諸佛禮拜供養此世尊許見且述多寶本願將集分身以顯三身一體正破二乘向認化身之執也大樂說下世尊當集分身大衆將因多寶亦願得見分身諸佛爾時佛放白毫一光至所照之處亦復如是此光召分身諸佛也初將說此經佛入無量義處三昧放白毫一光照東方萬八千世界圓現法界事相生佛始終蓋舉法界一隅以彰妙法全體意顯諸佛出世始終不出剎那際三昧其所說法皆光中之事文殊引燈明之本始是顯示佛之知見欲令大衆開悟也大衆不悟故如來出定方便演說所謂開方便門至引大通智勝成佛之事初入三昧十方世界而皆大明是開示佛之知見也而下根衆生雖悟往昔之因緣而未親證實相之真境故三周說法尚帶言說今既廣記現在未來凡有聞法者無一不成佛抑恐小乘執相之徒名言習氣未忘情存生滅淨穢之見難造一真之境故假寶塔涌出多寶現身光召十方諸佛三變淨土乃即五蘊以見法身就目前以證實相正是指示佛之知見也故放白毫一光即見東方五百萬億恆沙國土諸佛等者示五道衆生皆住諸佛一真之地也見諸佛菩薩為衆說法者示衆生動亂妄想即諸佛菩薩恆演法音也光中不現衆生生死三乘求道等事者以今直證法身以名教菩薩法故不言其餘種種也今說十方諸佛皆釋迦之分者然佛有三身乃從法垂報從報垂化今示三身一體意顯釋迦即多寶分身即釋迦法化冥一之象也所謂佛身充滿於法界普現一切群生前隨緣赴感靡不周而恆處此菩提座今分身齊集共證妙法以顯十方諸佛道同古今一際釋迦所說真實不虗意顯無邊剎境自他不隔於毫端十世古今始終不離於當念也至若三變淨土意顯穢即是淨娑婆即華藏目前全是實相真境故光中諸國皆七寶莊嚴也初一光顯示次三周開示今此會指示乃盡佛之知見耳此正極諸佛之神力發揚此事所謂長者并會國王親族將付家業一大事因緣圓會於此非特爾也爾時十方諸佛至并供養多寶如來寶塔此十方諸佛因光召爾將集也時娑婆世界即變清淨至移諸天人置於他土此變土以容分身諸佛所謂示真實相也一真法界本無淨穢但隨心轉變以娑婆穢土原是華藏只以染惡衆生所集故穢惡充滿土石諸山高下不平二乘不達唯心妄生欣厭取捨以見心外有法故一向執取涅槃不起一念度生之心故怖之如牢獄畏之如桎梏是未見穢土本淨衆生本空耳今如來此會特為指示佛之知見只欲了達一真平等法界明悟心境皆真徹見諸法實相是則三周開示乃開方便門今多寶出現三變淨土所謂示真實相也然娑婆本淨但衆生無明覆心智光未發故妄見其穢今佛放白毫光遍照十方顯示唯心境界開佛知見則剎塵心念皆佛出興即此穢變成淨土故經云容受分身諸佛故三變淨土也淨穢唯心不假餘力但因光照而云即變顯此娑婆即是華藏故琉璃為地寶樹莊嚴等一真平等故無諸聚落山川等總入神通大光明藏故燒大寶香是為衆生成佛因地故華布其地萬行彌滿皆是法音故寶網羅覆懸諸寶鈴衆生本空故移諸天人置於他土苟開佛知見則當下情忘頓見實相真境矣昔華嚴會上二乘如盲今則分明顯現目前是所謂示佛知見也是時諸佛各將一大菩薩至所分之身猶故未盡此東方分身諸佛來集也諸佛各將一大菩薩以為侍者意顯果因一契也寶樹高五百由旬寶座高五由旬意明開佛知見則念念佛現不離五蘊身心也諸佛各於此座結跏趺坐者所謂不離當處也遍滿三千大千世界一方所分之身猶故未盡者意顯重重無盡也時釋迦牟尼佛欲容受至諸天寶華遍布其地此二變三變淨土將廓法界真境也前初變淨土業已通變娑婆而為一淨土矣但容東方所分身佛已充滿其中似無容針之地矣尚不能盡是一方之佛有餘而全土之境不足則分身之多可知今於娑婆之外八方各更變二百萬億那由他國皆令清淨是則境又不止一娑婆也問曰華藏界中獨一娑婆而為穢土以有三惡道穢惡充滿其餘佛土悉皆清淨今娑婆之外所更變者皆有三途人天且隱惡道而移天人又似娑婆同土也且前已通變而東方諸佛已充滿矣今更三變者果何土耶答曰此意甚深是顯法界無邊以明衆生妄緣無盡也然娑婆一土釋迦化境常言三千大千世界而已諦觀滿慈得以記恆河沙等三千大千世界為一佛土是知娑婆非止一三千大千而已以衆生迷本法界真心全體變為無明妄想是迷則遍迷乃全變法界而為衆生界也斯則衆生充滿法界豈一娑婆可能容受哉所謂恆河沙等三千大千通為一土是也然各隨所見局為一土耳故華藏通多淨土者以隨諸佛菩薩淨心所見以即迷為悟故即穢而淨以隨衆生妄心所見故即淨而穢今令衆生開佛知見是即迷返悟故即無量劫來生死妄想今一念全體轉為諸佛智用故釋迦十方分身來集之象也以妄想無盡故佛亦無邊然境隨心變今真心既轉而真境隨轉所以娑婆之外八方各更變二百萬億那由他國土將廓法界之量今且猶是分轉非全轉也若全轉者豈有方向名數哉今以無盡妄想轉為佛智則宜乎佛多而境迫豈一娑婆可能容受哉然三變文云為諸佛當來坐故復於八方各更變二百萬億等是知衆生今已開佛知見則妄想永絶自今念念諸佛現前是為諸佛當來坐也問曰所云全迷法界今既開悟即當一時全轉何假三變淨土次第而然耶答曰此正顯如來有大方便引攝衆生之意以衆生垢重不能頓見法界全體故向設三乘之權引令漸進然執權之徒知見狹劣如來不敢遽以全體示之所謂若說是事皆當驚疑恐其驚怖而不信故說無量種種方便而引導之然今雖信佛心而猶未見實相真境故假三變淨土以示之然初變娑婆者以二乘一向但見三界生死可怖故生厭離而求涅槃不敢復入此正衆生知見也今示娑婆即是淨土以破二乘欣厭取捨之心也次於八方各更變者是引二乘趣向法界欲令捨權從實前至寶所不生退怯之心也次為諸佛當來坐故於八方各更變二百萬億等者乃引權教菩薩令入究竟佛慧也將窮法界實際乃今姑為三乘劣解略示少分而已豈能盡舉全體大用哉是知已變之外淨土不可思議正是諸佛功德無量無邊諸佛智慧甚深無量者此耳前云其智慧門難解難入若非如來善巧開示廣大神力以多寶之事而略示之則智慧門終竟難解難入也即今變土集佛之事二乘何從而知解耶此所謂示佛知見也明矣然所變之土皆云寶華遍布其地乃明示此佛知見為成佛真因也爾時東方釋迦牟尼至諸佛遣使亦復如是此言東方分身諸佛既集則十方次第而集也娑婆之外二三各變二百萬億佛土故八方各四百萬億今已遍滿意顯佛身充滿塵塵剎剎無盡無盡也諸佛各在寶樹下坐師子座者所謂而恆處此菩薩座也各遣侍者問訊釋迦佛佛未親見者所謂法身無有彼此迭相見故各齎寶華滿掬供佛者顯此妙法為成佛真因故問訊之辭以見釋迦示現與民同病之意也爾時釋迦牟尼佛至散多寶佛及釋迦牟尼佛上此釋迦開多寶塔以示法身出現也佛身如空無所依以塔在虗空而釋尊欲開寶塔亦住虗空者示法身體同之象也以右指開七寶塔戶示自性開發不勞餘力也如却關鑰開大城門者歷劫堅固無明妄想忽然迸裂法身頓現宗門所謂㘞地一聲也衆會皆見多寶如來全身不散如入禪定者示衆生自性開發則現前五蘊身心頓見法身全體顯現心境當處寂滅之象也為聽是經而來至此者以所說妙法深契法身真際也衆喜散華者各示真因之象也爾時多寶佛於寶塔中至接諸大衆皆在虗空此多寶分座釋迦入塔共坐者示五蘊緣生之佛與法身同體真應不二之象也大衆見二如來作念佛座高遠俱願處空者正顯二乘向以佛道長遠為怖今佛知見既開則真見遠而不遠俱願親近佛地可期之象也佛以神力接衆在空者顯二乘人非佛神力方便接引無由得近佛慧也四十年來接引之功乃取效於今日耳豈小緣哉以大音聲普告四衆至妙法華經付囑有在此言護念付囑之事也妙法華經如來護念之法也能持此經則為護念之人矣苟有持者則此法付囑有在如來出世本懷為一大事唯此而已故法若有所付則大事畢矣所謂唯此一事更無餘事故云不久當入涅槃正如長者將終若得其子委付家業志願畢矣由是觀之佛祖接人直可得到法身邊若法身向上事則當於佛未出世祖未西來時薦取不待今也爾時世尊欲重宣此義而說偈言聖主世尊雖久滅度至今於佛前自說誓言此聖主下十句頌因多寶勉衆意在得人付囑也彼佛下四句頌多寶本願又我下十二句頌化佛來集為證妙法欲令久住故為坐下四句頌三變淨土諸佛各各下十八句頌諸佛畢集歎美容儀淨妙如清池蓮華光明照曜如夜炬火妙香普熏衆生觸者心喜神悅如大風吹小樹枝言披靡傾倒喜不自持也諸佛來儀如此為令妙法久住故告諸大衆下十四句求持法之人能護持者當自發願多寶與我及諸化佛當作證也諸佛子等下二十句再求能持說者則為見我及供多寶并諸化佛也所以再三求持經者既已開示佛之知見貴在能持使佛種不斷若視為尋常則有負如來今日之大事因緣也持經必教發願者以惡世難持欲令信力堅固不得遇緣生退怯耳故下文歷言其難諸善男子下八句令諦思此經難持不若諸經之易易慎勿輕忽故令發願而後持也若接須彌下十六句言說經之難若手接須彌指動大千固已為難而神通者能之有頂諸天智慧難越而慧辨過勝者亦能超之唯有此經於惡世中最為難說以人多弊惡多怨難信故也假使有人下言書難虗空難把楞嚴阿難既悟則觀十方虗空如手持葉物是則虗空猶可把也若此經者寂滅離言之道豈得而書之耶是以書之為難也若以大地下八句讀難大地至重梵天至高足甲至微置大地於足甲而升梵天神通廣大者不難不若惡世讀此經為難也假使下八句持難負乾草入劫火而不燒亦未為難惡世衆生暴惡煩惱火中能持此經是為難也若持八萬下聽難八萬四千法藏以文言敷演何足為難獨此經之實相無量義趣而能聽聞是為難也若人說法下十二句奉難若有人善說法令諸聞者得羅漢六通此亦未難能持此經即得菩提故為難耳我為佛道下八句顯所以難言我自成佛以來從始至今於無量土所說諸經蓋無量矣皆隨機之談獨有此經示一乘佛性凡有持者疾得菩提故為第一若能持此經則全持佛身慧命不斷然非大根堅固忍力實難持也諸善男子下六句令持者發誓只欲堅其願力也上通頌難持此經難持若暫持者至一切天人皆應供養此頌難持能持故我及諸佛歡喜讚歎也然持此經非紙墨文字之謂也要亡言得旨頓契佛心是為勇猛精進則是總持萬行頓斷煩惱故為持戒頭陀不歷多劫頓發佛地所以暫持即有如是大益也能於來世下八句承上大益故惡世能持是真佛子能解其義則為世間眼目以開佛知見也於恐畏下四句結能說者當如供佛也問曰多寶證法化佛畢集世尊更無他說獨以持經苦口叮嚀再三四者何也答曰以佛知見衆生之迷固已久矣遠自大通塵點劫來一向迷之而不悟已費吾佛生生世世隨之教化業經無量不可思議劫數矣直至今日猶勞四十年之方便開示現前信解者幾何人哉是謂佛法之難遇也如此今既開示若不堅力持之則恐此後一失又不知更經塵點之劫未審可如今日之聽聞也若此法失持則佛種斷絶豈細事哉正如大富長者創業艱難勤苦纍世而致富有家業苟無克家之子而持守之若一旦散失難求再昔也此其世尊苦口叮嚀再三勸持者蓋此意也已前十品通為開示佛之知見總名信解故向後諸品多言持經之功以顯悟佛知見既悟守之為難也妙法蓮華經提婆達多品第十二此品來意連下十品通為悟佛知見也以前三周開示為開佛知見諸二乘人但信此心而已雖信心真未達境妙故現寶塔一品直示境妙名為示佛知見此下名為悟佛知見者以諸聲聞雖信自心作佛猶有歷劫無明未盡從來狹劣知見習氣未忘雖云信解猶屬知解故須多方妙行調治乃得法身淳淨抑恐此輩涉俗利生不善方便故預示種種守護之方由從妙行乃得悟入使其不墮凡情不生驚怖此正如來廣大慈悲所謂預留醫方之意也向下通顯行證臨文各有所屬此判悟之之初而以提婆達多名品者以顯悟有難易以行為本也以諸聲聞久懷佛道長遠之怖故不起一念好樂之心今雖蒙授記且又經歷多劫乃得證果抑恐引起宿習不肯勤求故世尊自引本事雖為國王乃不惜身命而求妙法由此苦行遂至今日得證菩提此悟之難乃漸悟也又恐下劣之輩畏難而不進故又說文殊所化七歲龍女成佛之事以見其易且海為生死沉溺之地龍乃三毒之首女為陰邪垢濁之器此最難化者而獻珠之頃當下成佛何其易易耶此頓悟也良以親近大智為依歸故意令當機於佛滅後當親最勝知識可保妙悟之極永不墮二乘之地故悟之首以立漸頓故此品來也爾時佛告諸菩薩至精勤給侍令無所乏此佛自敘往昔勤求妙法之難以警二乘懈怠之心也言無量劫中求法華經無有懈倦者則求法之心非一劫矣況多劫中常作國王而勤求之又非尋常之人矣且為求法故象馬等外施也頭目等內施也捐捨國位則一切施也然有說妙法者願終身走使伏勞忍苦忘我之至也時有仙人應求而為說則精誠所感也王聞即歡喜隨侍執勞而不厭乃至以身為床座而不倦且經千歲長時而不辭給時周足此求法之心何其勤苦長遠耶且現前二乘之人得授記者各人自揣求法之心曾有如是之精誠乎是則我今為說法王大寶諸人不求而自至豈可尋常易視哉是則將來歷事多佛固應體我如是之心方名持法之人也古云既悟守之為難苟無克苦堅強何以得成聖果故首告悟心以此爾時世尊欲重宣此義而說偈言我念過去劫為求大法故至今故為汝說我念過去下二十二句通頌世尊往昔求法之精勤也阿私陀此云無比乃佛過去之本師若法有比則不能令求者忘身至此也普為諸衆生下八句頌昔求法之難而今為衆說之易也欲令大衆知所重故佛告諸比丘爾時王者至皆因提婆達多善知識故此佛述昔師仙人為今提婆達多正示刻苦為成佛之因也提婆達多此云天熱生時人天心皆熱故以為名又母禱天而生故亦云天授斛飯王之子佛之從弟然事逆行世世專意害佛今則更甚常以毒藏十指甲禮佛接足足不傷而指自壞又與阿闍世王謀欲殺佛而自為新佛王縱五百醉象踏佛佛以手指指現師子象皆懾伏又推大石壓佛地神遮之石碎迸其小者中佛足流血因是陷入地獄佛遣使問其安否報曰我處此如四禪天樂又問幾時出地獄答曰待世尊來入地獄我方出之其五逆類如此害之非一世也今云提婆即昔說妙法之仙人而言由提婆達多善知識故令我具足六波羅蜜慈悲喜捨等所以得成正覺廣度衆生者皆因提婆達多善知識故是則如來今日佛果皆因提婆而成其恩重不可言矣其實皆以怨害世尊歸重如此者足知佛果難成所謂或示怨家以怨害折磨堅其精進不退之忍力非此何以得至今日哉所謂彼一闡提非一闡提世間解脫誰轉世尊述此蓋因前品極言持法之難以惡世多怨故欲二乘得記之人將來持經處於惡世當觀如來因提婆之怨害得成菩提然後乃能無退怯心即取佛果無難故當悟守之初必若佛事提婆為嘉範然後方能令法久住也告諸四衆提婆達多至發菩提心至不退轉此與提婆達多授記而不列於諸弟子中者以是世尊本師故且以磨礪砥行堅固如來之忍力以成菩提故居悟守之首而為惡世持經之範也佛號天王者謂由怨害令佛強忍以至天然而得大自在故感果如之國名天道者謂佛佛成道未有不由忍苦而成自然之理也常說妙法蓋因中始以妙法教釋尊故果上常說而衆生聞妙法俱得三乘之果者正示法一而機異也時天王佛滅後供塔之人皆得三乘之果者亦由因行所感也佛告諸比丘未來世中至若在佛前蓮華化生此言未來有聞此品信敬而不疑者則永不墮三途乃至若在佛前蓮華化生者以見世尊求法之難多怨成就之力而於妙法精持堅忍不退之益故獲如此之勝報也於時下方多寶世尊所從菩薩至可還本土此下方智積請多寶佛當還本土者以證法事畢不宜久住意表證悟未忘猶存法執必返一絶跡兩忘能所方為妙悟宗門所謂悟之一字亦須吐却乃返本還源之象也釋迦留之以待文殊者表以所悟妙法融為觀照消磨法執方盡持法之妙也故待文殊可與相見論說妙法爾時文殊師利坐千葉蓮華至共相慰問却坐一面此言文殊坐寶蓮華從海涌出者表悟心者如蓮華開妙智現前藏識海中挺然獨露也至於佛所禮二尊足者始覺之智合乎本覺之象也往智積所共相慰問者二智冥會之象也非此不足以言妙悟智積菩薩問文殊師利至於海教化其事如是此問文殊所化之衆言其數無量不可稱計者謂生死大海三毒窟宅非大智不能深入非妙法不能轉煩惱而為妙行也以智起惑忘則無數煩惱當體清淨故無數菩薩坐寶蓮華詣靈鷲山住在空中也煩惱一轉則一切行皆是佛行故皆修行大乘空義也故文殊曰我於海教化其事如是爾時智積菩薩以偈讚曰大智德勇健化度無量衆至令速成菩提此智積偈讚文殊初四句謂非大智勇健不能化此多衆次四句謂非妙法不能轉變如此之速文殊師利言我於海中唯常宣說妙法華經此文殊重答前偈謂唯常宣說妙法華經更無別法意顯妙法成就之速故下問可有速得成佛之人智積問文殊師利言至修行此經速得佛不智積重問文殊言妙法甚深可有衆生依之修行速得佛否此問要顯妙法之功甚速故爾文殊師利言至不信此女於須臾頃便成正覺此文殊深讚八歲龍女利根依此妙法修行而能即至菩提此其人也海中異類三毒穢濁柔弱女身而能具如是勝妙之德者正顯生死垢濁煩惱之體本是成佛智用也故云能至菩提且云剎那發心即得不退者所謂一念轉移之力也此實常情所難信故智積生疑釋迦多劫修因乃得菩提何以龍女須臾便成正覺所謂得其旨者等諸佛於剎那失其門者徒修因於曠劫正顯妙法勝能非頃久淨穢之情可計也言論未訖時龍王女忽現於前至以偈讚曰深達罪福相至我闡大乘教度脫苦衆生此龍女現證以消狹劣滯相之執也執釋迦之久修見龍女之罪垢是皆不達罪福性空唯文殊大智遍照則了無異相一際平等何遲速之有哉我闡大乘教度脫苦衆生意在唯持妙法以度衆生也時舍利弗語龍女言至云何女身速得成佛此身子生疑正示二乘執相之見也如身子所見女身五障絶無成佛之分此蓋常情所共執以不達法性本空了無男女淨穢之相知此可入平等實相矣爾時龍女有一寶珠至一切衆生演說妙法此龍女自示成佛之速也龍之所鍾愛者珠今龍女獻珠之頃當下成佛者表能頓斷法愛則佛性現前所謂稟明於心不假外也龍女忽然變成男子者示佛性無常了無男女之相正破二乘執相之執也即往南方言明正為南表離無明暗則藏性頓顯佛體現前即往南方無垢世界坐寶蓮華成等正覺也以從妙法得悟故普為衆生演說妙法因身子生疑故龍女即變男子當下成佛所以激發二乘正謂個個丈夫不若一弱女也爾時娑婆世界菩薩聲聞至一切衆會默然信受此法會蒙益也無垢世界六種震動者轉染令淨頓悟唯心之象也娑婆衆生住不退地而得授記者因龍女激發而獲勝益智積身子大衆之疑頓釋故默然信受以此品顯示堅固當如釋迦之精勤自無疲厭之心知龍女之速證菩提自無佛道長遠之怖此世尊以是方便教菩薩也妙法蓮華經持品第十三此品來意由前當機開解已得授記猶歷多劫成佛世尊慮恐小乘狹劣習氣未除復生佛道長遠之怖乃自敘往昔求法之難以消疲倦之心復以龍女當下成佛之事以發欣慕之願故次之以持品者蓋此經是諸佛之慧命為衆生正因之佛性若如來滅後人多弊惡最難奉持苟失其持則佛種斷絶此世尊之隱憂也故諸菩薩默領佛意安慰世尊願不有慮各願奉持廣說此經不惜身命也而五百弟子與學無學人亦領佛意亦各願於餘國廣宣此經以娑婆國土人多上慢自量其力不能化度故也時佛姨母等諸比丘尼向來自視女身多障不敢希望佛果今見龍女成佛之易亦自信成佛有分故請世尊特為授記因亦願於他國廣宣此經以見不退之心也爾時世尊乃視八十億那由他菩薩而不言者意謂諸聲聞人雖願持經而未習涉俗利生之行不知遠害之方法力不充恐被留難使法緣不廣欲諸菩薩以調護之故諸菩薩默領佛意齊發誓願於如來滅後周旋往返十方世界唯以忍行受持此經然非己力皆是如來神力以守護之此乃將導初心所以安慰如來願不有慮也然品以持名者持謂守其所有而不失之意猶世俗所謂守業為難也譬如大富長者盡以家業委付其子儻一失守則祖脉斷絶豈細事哉故此品經文單說持經之事以明悟守之難故此品來也爾時藥王菩薩摩訶薩至瞋濁諂曲心不實故此因世尊前來極言此經難持而諄諄激勸且云誰能護持此經自說誓願故藥王樂說發願奉持也以藥王忘身捨執樂說具樂說辨所謂以不懈怠心乃能持耳故首衆發願世尊所慮末世難持此經者以人多弊惡故藥王願持先述弊惡之人以善根轉少難可教化若欲持經當起大忍力不惜身命此正領前如來教以入如來室等及給使仙人求法之勤苦如此乃可能持也以二大士激勵二乘發起持經之誓願故五百阿羅漢同時發心願持然終不敢遊履娑婆當於餘國廣宣此經耳足見小乘狹劣之心未能遽捨也爾時佛姨母至即於佛前而說偈言世尊導師安隱天人我等聞記心安具足諸比丘尼說是偈已至於他方國廣宣此經此佛姨母希記亦將同衆發起持經之心也佛常隨女衆有六千人皆是新學佛姨母為首向以女身多障絶無成佛之分今見龍女成佛亦各自信作佛故希望授記但不敢直請故以憂色目視如來欽渴之心蓋已切矣故如來呼其名而告之曰汝所以憂色而視如來者將無謂我不說汝名而授記耶然我已先總說千二百聲聞悉亦當作佛矣汝今欲特知記者汝與六千比丘尼當事六萬二千億佛皆為法師以此說法因緣漸漸具足菩薩之道當得作佛號一切衆生喜見以說法開示衆生各各歡喜故感果號如之其六千人次第授記而羅睺羅母耶輸陀羅比丘尼心亦希記故世尊亦特為授記乃告之曰汝於來世亦事多佛為大法師漸具佛道將來成佛號千萬光相者以因中為佛之妻能不著癡愛助成如來之萬德且又說法能開衆生之心性故果號千萬光相宜矣既皆得記亦誓持此經然但在他方廣宣終怯娑婆以初學法力未充故也爾時世尊視八十萬億至在於他方遙見守護此世尊顧視八十萬億那由他菩薩者口雖不言意謂二乘劣弱不能於此世界廣宣此經欲此諸菩薩末世護持所謂付囑有在也以此諸菩薩皆居不退得總持門以是十方雲集之衆堪能荷負故也是諸菩薩已契佛心故敬順佛意并欲自滿本願故於佛前作師子吼齊發誓言各願於如來滅後周旋往來十方世界護持此經是則不但娑婆一國土也前世尊云誰能護持此經自發誓願故此諸菩薩深體佛意也又願世尊於他方遙見守護以其末世難持須仗如來威神力故也即時諸菩薩俱同發聲而說偈言惟願不為慮於佛滅度後至佛自知我心今日靈山一會世尊之可喜者諸三乘人皆契佛心各各授記其所慮者於惡世中此經難持而最難得者堅忍大力之人以持之此世尊之隱憂恐其佛種斷絶故也其諸得記聲聞皆不能已故默視諸來雲集之菩薩故此諸菩薩敬順佛意誓願弘持故頌首四句頌敬順佛意惡世願持也其下歷言忍諸難事以顯難持之所以有諸無智下四句通言弊惡之人後皆出家之魔類惡世中比丘一偈通言出家之邪慢或有阿練下八句言假名修行之魔類阿練若云寂靜處假稱修行以假為真妄自尊大如六通之羅漢也是人懷惡心下十二句頌忍惡心言破法之情狀僞造經書貪求利養毀謗賢善真魔種也常在大衆中下十四句頌忍毀謗破法之事此諸邪慢最難忍者皆當忍之濁劫惡世中下十二句頌忍惡事言以恐怖惡事為惡鬼所附而撓害之或罵詈毀辱以敬信佛故忍此諸難身命尚不愛況侵害乎言但惜無上道以所重者佛種慧命其餘一切皆不足計以護持佛所囑之法為重故也世尊自當知下十句頌忍見擯之事謂所宣經典濁惡比丘不知是佛隨宜所說將謂我等自造故惡口而謗或嚬蹙而憎甚至見擯不容安住於塔寺此世尊自當知此等人我等念佛告敕付囑之心則皆當忍此諸惡也甚矣佛法之難弘宣也若白衣生謗尚有可原今皆佛之弟子自行破壞弟子不信則誰當信者譬如獅子身中蟲自食獅子身中肉佛亦無如之何矣世尊所憂正若今日也苟非堅持忍力何能堪此之怨害乎諸聚落城邑下八句頌在處弘宣凡有求者我皆身到其所說佛所囑之法以是世尊所使仗佛威神故不畏艱難一一善說願佛安隱不以為慮也以一乘佛性種子其開示在佛其悟入在機故修行之士苟非堅忍不拔之志何由徹悟得到親證實際之地故須善知識調護使其漸進深造此世尊今日付囑護持此經是在緣因佛性也若但念誦文言又何難之有我於世尊下四句結頌領旨前寶塔云我滅度後誰能護持讀說斯經今於佛前自說誓言故此領旨故請世尊多寶并分身佛同作證也
