body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明南嶽沙門憨山釋德清述妙法蓮華經藥草喻品第五此品來意因上四大弟子領悟許三賜一説喻自陳昔失今得之情世尊印可其心然猶未盡知如來知見之力抑恐執相之徒不達如來平等説法隨類異解之旨將謂實有三乘之果可證涅槃習氣不忘不能徹法源底故説藥草一喻以顯如來説法平等一味但隨根大小各受不同如一雨無私三草二木隨分受潤各別是知法本不異異在於機此則唯有一乘無二無三之旨自明而使聞者習見頓除可入如來平等法慧開佛知見明矣此後即為授記故此品來也爾時世尊告摩訶迦葉至示諸衆生一切智慧此如來述成四大弟子雖悟而猶未盡也迦葉等既領譬喻之説乃設窮子怖父長者曲垂方便誘引之心以喻如來俯為二乘極盡慈悲之意可謂善説如來真實功德矣但所知者似乎如來涉於有心單為二乘之人實有三乘之設殊不知如來説法以平等大悲無問有性無性一音説法普使聞知齊成佛道原無三一之分此是如來無作妙力所謂復有無量無邊功德無量億劫説不能盡者即出世至今所見聞者如海一滴耳此非汝等所知也以如來是諸法之王得大自在凡有所説皆稱法界性真實不虗故於一切法以方便權智應機而説即其所説皆歸究竟真實智地無有虗談以如來實智證理則觀知一切諸法歸趣究竟實際以權智鑑機則知一切衆生之心樂欲所行無不通達又善能分別諸法之相若性相權實一一明了即其所説善能開示衆生本有智慧此所以為無量功德之大略豈汝所能盡知耶迦葉譬如三千大千世界至具足蒙潤各得生長此法一機異之譬也三千大千之土地總譬一真法界衆生本有之心地山川溪谷所生之草木譬三界所有之衆生種類名色之各異譬三乘五性之不同木有貞樗草有良毒今取衆生堪受化者如草之可為藥木之可成材者其不受化者皆腐毒樗朽耳故名藥草衆生根性種種不一有三乘五性之不同故云種類若干名色各異此喻所被之機也佛以法界身雲普遍十方故如密雲彌布圓音一演十剎頓周故如一雨普洽衆生聞者隨類各解故如三草二木各有所受稱其種性各得成實所謂佛以一音演説法衆生隨類各得解初從人天小乘以及菩薩無不成就皆能自利利他除生死之病獲涅槃之安故但取藥草而喻至若闡提外道及十惡不信之衆生皆狼毒蕪草亦無不蒙潤但不能信受故非機耳雖一地所生等喻衆生同稟一真法性而隨種成熟不同所謂法本不異異在機也由是觀之三乘之法非佛有心分別唯以法界海慧平等普説由機聞見各異自分大小差別是則昔日權法皆説佛慧但小智自私而不受非佛定有三乘可執取也此迦葉等雖悟昔權而不知本無三一之分此如來平等大慧無量功德説不能盡者殊非二乘可知也如來亦復如是下法合可知於大衆中唱如是言下至為聽法故乃佛初成正覺法王應運出興詔告三界之詞也以空劫無佛三界衆生自未見佛今法王從真界出不知佛是何人為何而來所知何法恐其驚怖故告之曰我是如來等使皆知是佛也為未度者度等使知佛為度衆生令出苦得樂而來也如實知之等告以所證之法且能開能説使三界衆生皆應來此聽法此正為一大事因緣出現世間之本懷正如大雲雨也爾時無數下三界衆生因聞布告召集而來也如來於時等觀根説法如三草二木隨分受潤人天三乘各得成熟故云皆令歡喜各得善利此隨根之法似先有心分別其實佛以平等大慧觀衆生各各不同故一音所演之法大小具足即一四諦法而三乘各解不同正法一機異非有心差別也故天台判教有祕密不定正此謂也前云如來不説大者非今日別説一大但説破昔日所説皆大法耳以迦葉但悟今日是大將謂昔説是小故如來復説此喻以洗執昔之狹習了悟平等佛慧乃堪授記耳是諸衆生等敘聞法得益各得成就漸得入道正如一雲普雨三草二木具足受潤各得生長也所云漸得入道非佛有漸法要知法本是頓但聞者漸漸成熟如雨是普在草木各得具足蒙潤但隨根漸長耳如華嚴地上菩薩自五戒十善四諦十二因緣歷次而修豈非人天小善皆法界大法哉況諦緣乎若分別諸法則二乘所知若無分別之分別則非二乘所知也如來説法一相一味至隨宜説法難解難知此敘佛平等一味之法也佛所説法本一實相元無異相純是甘露醍醐曾無異味解脫者雖説諸法而離一切法離相者雖説諸相而離一切相滅相者雖説生滅而顯寂滅無生此釋一相一味之法也以此故所説法一一究竟皆至一切種智豈有三乘之法哉但衆生聞者隨其根性若持若修各隨所得而不自覺知此法一而機自異耳所以者何等釋衆生不知之所以然佛説法雖是平等一音而衆生根器有種相體性樂欲念思修得之不同必先觀察了知然後應機普説是則佛皆如實了知衆生之性欲而衆生不自覺知本根之大小故所聞法如蚊飲海各隨量而足將謂佛法止此而已豈知平等一味之法哉如來知是下釋上不即説大之所以然佛既以平等大法普施衆生衆生所受大小不同佛不早為説破一向久默斯要者以佛説法一言一句無不究竟歸極於法界真空但衆生心欲之不同故將護之以待其時故不即為説一切種智之事恐其驚疑特隱忍以待非畢竟不説也今衆生根熟涅槃時至不得不説耳迦葉能知如來隨宜説法甚為希有然隨宜中平等此其難解難知也爾時世尊欲重宣此義而説偈言破有法王出現世間至以種種緣令得正見此重頌前義也破有下四句總述迦葉讚佛之意九界衆生皆墮於有凡夫有生死二乘有涅槃菩薩有衆生可度有佛果可求唯佛能破故云破有於法自在故稱法王如來尊重下十二句頌佛待時説大之意如來所以久默不説者恐小智生疑故隨力為説漸漸令得正見此迦葉所未知也迦葉當知譬如大雲至所潤是一而各滋茂此喻顯平等大慈之意也佛身如雲説法如雨則平等可知而言密雲大雲至垂布可攬則喻法身普遍俯就群情之意未雨而雷電前驅喻凡説法必先放光現瑞動地為前相也初云三草二木頌至百穀等則喻三乘五性無不利潤然乾地亦洽則無性闡提未嘗不滋也其雲所出等喻佛一身一智慧平等一味所被之機受益不同隨分自足而各滋茂成熟也佛亦如是出現於世至等雨法雨而無懈倦此佛亦如是下法合也初四句合喻本既出下四句頌出世本懷大聖下十四句頌告詔之辭諸天下十句頌召集人天當説平等法也其法下六句頌一相一味平等之法凡有所説當作大乘因緣所謂究竟皆得一切種智也我觀下二十四句正頌平等説法貴賤等釋平等之意無論貴賤持毀邪正利鈍一以平等大慧而普被之足知三乘五性不待今日授記矣一切衆生聞我法者至漸次修行皆得道果此一切下頌衆生隨根受益不同各得成實也初四句總頌諸地謂從三界九地以至菩薩十地也後釋諸地或處下四句明人天知無漏法下八句明聲聞緣覺求世尊處下四句明藏教菩薩依權教修故名小草偈云我當作佛然藏教所期三藏果頭佛也又諸佛子下六句明通教菩薩安住神通下六句明圓教菩薩佛平等下六句頌法一而機異也佛以此喻下六句結佛功德説不能盡之意以由迦葉不能盡知如來功德故説此喻以發明之然一雲一雨平等普潤三草二木具足成熟雖喻佛之功德廣大不可思議其實於佛智慧海中如一滴耳豈能盡喻佛之功德哉迦葉所以不能盡知也我雨法雨下八句總明成熟之利諸佛之法下六句總明成熟之機下別明隨機得果聲聞緣覺處於山林至潤於人華各得成實此聲聞下頌各得增長也初六句頌聲聞緣覺而得增長若諸菩薩下六句言權教菩薩而得增長復有住禪下八句言實教菩薩而得增長所謂具足蒙潤各得生長者也如是迦葉下六句總結成實迦葉當知以諸因緣至漸漸修學悉當成佛此迦葉下頌開權顯實諸佛道同也初六句明即權顯實諸佛道同今為汝等下八句總結今實通廢昔權開後授記之文也已為授記而云漸漸修學悉當成佛者正顯昔非真修自今開佛知見方是成佛真因所謂不生滅心為本修因也楞嚴云理須頓悟事因漸除故云漸漸妙法蓮華經授記品第六此品來意由四大弟子領悟平等一味之旨已解本無三乘之實本有佛之知見既開則成佛真因已具乃為四人授記特以名品故此來也爾時世尊説是偈已至雖有魔及魔民皆護佛法爾時世尊欲重宣此義而説偈言告諸比丘我以佛眼至光明世尊其事如是此授迦葉之記也諸弟子授記之事有因有果而所得之果有同不同者蓋各隨本因而感也皆以今日開佛知見為發覺初心從此已去所修之行方為成佛之真因以因圓而後得果也然因中必由事佛供佛者供佛則修福宣法則修慧二嚴具足乃因圓而後得果故最後身方得成佛也最後身者論云菩薩地盡覺心初起心無初相遠離微細念故得見心性此乃無明盡淨二死永亡之時名最後身然事佛多寡之不一乃無明厚薄之不等也然有造塔不造塔者以所積福各有深淺之不一也名號各別則各隨本因而國土莊嚴同一清淨則同一唯心清淨所感之實報所化衆生無三惡道則本願之所召眷屬之大小壽命之修短法住之久近皆各隨願力之所致例皆然也迦葉名飲光因地事日月燈佛然燈續明以紫金光塗佛形像故感果號名光明國名光德劫名大莊嚴宜矣壽命法住皆二十小劫則差於身子亦本願所持也國土清淨則同一淨心三乘眷屬亦夙緣也以非惡世故魔皆護法爾時大目犍連須菩提至即共同聲而説偈言大雄猛世尊諸釋之法王至如飢須教食此目犍連等因迦葉得記故希記而請也然前佛總説千二百聲聞悉亦當作則佛人人皆有成佛之分明矣而三子必欲指名而説其實事猶恐其不得悚栗而請者此正小乘夙懷執相之習狹劣之心未即頓捨今雖蒙佛許可自己未敢承當故如飢逢王膳未敢便食必須得旨後乃敢食所以雖聞作佛而心尚懷憂必冀佛説乃安樂耳爾時世尊知諸大弟子至度脫無量菩薩及聲聞衆爾時世尊欲重宣此義而説偈言諸比丘衆今告汝等至像法亦住二十小劫此空生得記也將來事佛因行與迦葉等果號名相則各隨本因以須菩提解空第一然所空者名相之外更無可空故將來成佛果號名相正顯空法得證也尊者生時庫藏皆空故果上劫名有寶國名寶生蓋即空以顯不空義也亦本因耳其土清淨則同一淨心人民皆處寶臺應有寶義也眷屬壽命法住久近與迦葉等但彼佛常處虗空説法則由空法實證故果亦如之爾時世尊復告諸比丘衆至像法亦住二十小劫爾時世尊欲重宣此義而説偈言諸比丘衆皆一心聽至無量無數莊嚴其國此栴延得記也栴延因記則先事八千億佛及佛滅後造七寶塔廟供佛舍利歷二萬億佛總之少於飲光空生而速得佛者由昔善於論義法性精明果號那提金光則精瑩之至因行然也壽命十二劫則隨機感住世法住久近則願力所持爾時世尊復告大衆至像法亦住四十小劫爾時世尊欲重宣此義而説偈言我此弟子大目犍連至吾今當汝等善聽此目連得記也目連因記事佛少於栴延而佛滅滅度後造塔供佛則二百萬億越數更多亦由功行造進不一也目連宿習神通第一則果號栴檀香然香有清遠潛通神通之象也眷屬亦等但壽命少長亦隨機感法住四十小劫甚久則願力所持也然諸聲聞人一向皆有佛道長遠之怖者以未見實果可期渺無歸宿故生怖耳今授記作佛猶經多劫而不怖者以有實果在前取證有時則宿習易捨以小乘所重名言習氣不得佛語則此心不安是知授記之事即以名言而䇿進之如止啼黃葉正以楔出楔之意耳如人素以夢事為吉凶之兆必以圓夢語為準然夢豈真吉凶耶漢武帝時有人善圓夢帝以假夢試之曰朕夢殿瓦二片化一對鴛鴦飛去其人圓曰宮中必有相殺者頃即報云宮人有相殺而死者帝曰朕戲之耳非夢也何以應人曰夢者神之所至也神動而吉凶隨之故諸佛説法度生如説夢事信矣我諸弟子下十句起後因緣之説也妙法蓮華經化城喻品第七此品來意由前五人俱得授記座中尚有一類鈍根聲聞向以佛果菩提非己智分狹劣習氣未忘將謂彼為唱導之首宜乎得記而此輩猶懷絶分之心故世尊遠引塵劫已前大通佛時十六王子教化之宿因曾下一乘之緣種自是以來生生受化今緣已熟止是印許之時以破大衆執著之疑躍然發起慕大之心以除宿習故廣引大通之往事十六王子講法之因緣以顯緣因佛性也故説化城一喻原是虗設以明三乘畢竟是權為止怖遠疲勞之衆令衆暫息可進寶所以此開發策進鈍根故大衆聞説頓悟昔因自信成佛乃各得授記故此品來也佛告諸比丘乃往過去至觀彼久遠猶若今日爾時世尊欲重宣此義而説偈言我念過去世無量無邊劫至通達無量劫此如來遠引大通智勝之本因以證現今法會之緣種也佛號大通智勝者乃一切種智諸佛法身之果體衆生本有之佛性也唯此智體超法界量故云大徹聖凡情故云通常然不昧故云智乃勝義中真勝義性故云勝以此智最勝故用不離體故十號具足常住寂光故國名好城空劫已前故劫名大相衆生背此智體其來無始故云過不可思議阿僧祗劫也寂音以華嚴法界觀真空絶相理事無礙周遍含容三種觀門釋大通智三字三義具足為勝此最稱理但此言本具觀言修顯似有先後耳此智又名無師智自然智諸佛證此智體名一切種智華嚴云奇哉奇哉一切衆生具有如來智慧德相但以妄想顛倒執著而不證得若離妄想顛倒執著則一切智無師智自然智當下現前是知此智為一切諸佛之果體一切衆生之佛性也以二乘迷此本智故皆言昔失將謂絶無成佛之分前雖授五人記乃諦信佛心而不疑者尚有劣解下根執著二乘名言習氣昔失之疑不忘今雖聞記而疑情未盡不悟不失之所以故佛特説因緣推原佛性之本無始自來不失故的指大通之往事明見如今則未來授記得果之事亦不虗妄所謂以因緣破下根之執也前歷言佛智非二乘所知然佛果海功德難思此亦不知之一端也彼佛滅度已來甚大久遠者正顯法身隱而不現衆生迷之蓋已久矣故説塵墨之劫以況之歷大千世界以為墨將為地種就十方內且以東方過千國土下墨一點大如微塵是則經千國土才一點耳如是展轉東行又過國土如初次第點之有墨點者已不可知非算師所及況點與未點盡抹為塵此塵之數已極多矣以此一塵為一劫則劫可量哉此則推原其始無始也彼佛滅度已來復過是數足徵衆生迷此佛性其來久矣豈二乘可知耶然前對上根但云成佛已來不言其時對中根言教化之事但言二萬億佛所謂舉一隅也今對下根則極盡塵劫之量者以劣解二乘向存斷滅始終之見陋習難袪非此不足以破之此如來接引之方便也且以如來知見觀彼久遠猶若今日況我如來應世四十年來不離剎那際三昧豈虗言哉故如來所説真實不虗下根聞此雖顓蒙之極不得不信佛真實之説也佛為二乘苦心則火宅長者及窮子之父豈能盡佛真慈哉偈云佛智淨微妙無漏無所礙通達無量劫是知佛智前觀無始則後觀無終即授記弟子成佛之事至遠不過三百萬億劫數佛眼觀之如目前耳可不信乎佛告諸比丘至成阿耨多羅三藐三菩提此言大通智勝佛從法垂應之迹也佛壽五百萬億那由他劫特舉應緣之迹耳言本坐道場則出真兆聖應現之始也垂得菩提以佛佛出現必示初成正覺故云垂得垂者將也問曰佛既示現不必更得而云垂得菩提佛法不現者何耶答此待機也所謂佛真法身猶若虗空應物現形如水中月衆生心水淨菩提影現中華嚴經云毗盧遮那於一切衆生身中成等正覺是知佛本非身以衆生為身今大通智佛有應無感故垂得菩提而佛法不現在前正以衆生心器未淨故十小劫以待時耳結加趺坐身心不動者所謂正入剎那際三昧即首言無量義處三昧也今釋尊應身待四十年豈為久耶忉利諸天先就菩提樹下敷座以待者正顯不離菩提樹下而遍應也適坐此座則諸天雨華作樂乃至滅度者顯佛出現始終不起剎那際三昧也序品光中圓現諸佛始終將謂光中之境耳今則直顯此經皆説光中之實事也過十小劫佛法現前乃得菩提者機感契會心境絶待之時也古云若識佛性義當觀時節因緣是知今説佛慧因緣要待機緣契會非時不敢強説也其佛未出家時有十六子至頭面禮足繞佛畢已此原始釋迦之本因也大通智勝蓋明一切種智今云其佛未出家時有十六子者明一切種智皆由轉識而成也以迷此智成阿賴耶識乃在纏生死之名也而此識體其用有八前云日月燈明而有八子者是單約識言故名有意今云十六而名智積蓋約識本於智以迷則轉智成識其用有八悟則轉識成智其用有四然成所作智其用有五故亦有八今約真妄一體故云十六而四智圓滿通名一切種智故其子名智積言未出家時特在纏之名耳若剋果體則真妄不二父子情亡矣釋迦本因為第十六子則權實可知諸子各有等者謂本識未轉則諸識皆有染污無知貪染等事本識一轉則諸識齊轉頓破發業潤生二種無明故云聞父出家皆捨所珍始覺合本故云往詣佛所經云無明以為父合愛以為母今識既轉智則貪愛煩惱返滋智用故云諸母涕泣而隨送之以愛難捨不得不捨也其祖轉輪聖王等者識論阿賴耶外別立九識名白淨識亦即真如今賴耶一轉則心所百法并諸微細煩惱一時齊轉皆與真如為大智用故其祖轉輪聖王與一百大臣及餘人民皆共圍繞隨至道場也一心合掌瞻仰世尊以偈頌曰大威德世尊為度衆生故至歸命無上尊爾時十六王子偈讚佛已至諸天人民重説偈言世雄無等倫百福自莊嚴至當轉無上輪此王子讚佛出世專為利益天人也大威德下六句讚佛功圓得果世尊甚希有下八句讚佛入定待機今者下四句自慶善利衆生常苦惱下八句言當化之機今佛下六句慶自他俱利也讚已請轉法輪顯佛出世本為安隱憐愍衆生非徒然也故請説法世雄無等倫四句請説實智也度脫於我等下六句請佛説權智也世尊知我心下八句請佛必用開權以應衆生之機也佛告諸比丘大通智勝佛至遍滿世界勝諸天光此如來特為下根開佛知見也梵語毗盧遮那此云光明遍照即大通智而云成佛為一切種智也此智為一切衆生本有之佛知見佛為此故出現世間名為一大事因緣以衆生一迷此智而為無明固結根身器界隔礙而不通故但為妄想煩惱之所動亂日用而不知故造妄業妄遭衆苦故佛以同體大悲出現世間而開示之使其悟入以出生死此乃如來出世之本懷也衆生一明此智即當下是佛此義驚人非劣根所堪故待時熟而説此法華一會通顯四十年來皆為此事之本懷然非輕易可遽説者所言開示者以言開曉以事指示故法會之初先放一光照東方萬八千世界圓現法界事相生佛始終是舉此智全體之一隅以為開佛知見之前茅將謂弟子根機既熟可不言而喻矣且此智境在彌勒補處尚且懷疑故借文殊七佛之師代為説破引燈明之本始證今佛之瑞相是第一番示佛知見也法會瞢然未曉又假世尊出定殷勤稱歎方便開示至方便品末世尊已為極力宣揚矣止得身子一人領悟是知衆生之迷固已深矣又説火宅一喻三界衆苦之狀可謂詳悉如示諸掌矣且又止得四人領悟然在會千二百衆猶然睡夢之中也奈之何哉信乎其智慧門難解難入也故佛説宿世因緣明以告之遠引大通智勝之本始以為今日之因緣特為下根之人大發明之初則眉光待放而後照但見東方今則本有之智光不屬收放而常明者故幽暗之處而皆大明是則本然不昧之智體衆生日用而不知今智體忽然現前則衆生各各頓知本有故咸言此中云何忽生衆生也奇哉奇哉大光遍滿則通照十方此又特為下根第二番示佛知見也此猶遠引古佛若向下現寶塔品則為大衆指在目前乃第三番示佛知見也其十方天王尋光請佛皆廣方便品末時諸梵天王等未盡之意也爾時東方五百萬億諸國土中至而説偈言我等諸宮殿光明昔未有至遍照於十方爾時五百萬億國土諸梵天王至一心同聲以偈頌曰世尊甚希有難可得值遇至惟願哀納受爾時諸梵天王偈讚佛已至一心同聲而説偈言世雄兩足尊惟願演説法以大慈悲力度苦惱衆生爾時大通智勝如來默然許之又諸比丘東南方五百萬億國土至而説偈言是事何因緣而現如此相至度脫苦衆生爾時五百萬億諸梵天王至一心同聲以偈頌曰聖主天中王迦陵頻伽聲至今得值世尊爾時諸梵天王偈讚佛已至一心同聲而説偈曰大聖轉法輪顯示諸法相至忍善者增益爾時大通智勝如來默然許之又諸比丘南方五百萬億國土至而説偈言我等諸宮殿光明甚威耀至為佛出世間爾時五百萬億諸梵天王至一心同聲以偈頌曰世尊甚難見破諸煩惱者至惟願垂納受爾時諸梵天王偈讚佛已至一心同聲以偈頌曰惟願天人尊轉無上法輪至當演深遠音爾時大通智勝如來默然許之西南方乃至下方亦復如是爾時上方五百萬億國土至為諸梵衆而説偈言今以何因緣我等諸宮殿至為佛出世間爾時五百萬億諸梵天王至一心同聲以偈頌曰善哉見諸佛救世之聖尊至皆共成佛道爾時五百萬億諸梵天王至時諸梵天王而説偈言世尊轉法輪擊甘露法鼓至無量劫習法此言智勝始坐道場諸天梵王請轉法輪也方便品末釋尊自敘始坐道場觀樹經行三七思惟意欲將一乘法分別説三進退未決時諸天梵王請佛開漸由是遂説三乘以尋念過去佛所行方便力亦應説三乘今則大通智勝佛十方梵天一時普請及出定所説乃四諦法是知前言過去佛即今之智勝明矣斯則釋尊為智勝之子而説法仰遵其本師是為祖述之家法也前但泛泛略敘今則實指所以為下根設也凡諸佛出現於世皆以釋梵諸天為請主例應然也智勝光遍十方諸天各隨所向尋光而來前藥草喻云我是如來等是以言召此以光召及其説法皆一律也足徵諸佛種種方便皆為一乘固無疑矣然諸天覲佛獻供皆同讚辭各別但無佛出世時劫不同東南方言一百八十劫南方言百三十劫上方云昔無量劫空過無有佛是皆各隨機感之不同抑見智勝光照之遠大以大梵天王為娑婆界主今言十方各五百萬億國土諸大梵王則佛光所照極法界之量通為一土則與眉光所照東方萬八千土天淵矣惟佛智慧難解難知在上根可舉一隅至若下根非己智分不得不為盡情吐露使其了然自信故知此輩鈍根非此不能令生信解此如來所為善巧方便也爾時大通智勝如來至是苦滅是苦滅道此智勝受請説法也三轉十二行法輸乃説四諦法也三轉者謂示相勸修作證初轉示相謂此是苦逼迫性等示四諦之相也次轉勸修謂此是苦汝應知等勸今厭苦斷集慕滅修道也作證轉者謂我已知等以己證彼也二乘聞之隨聲即悟故云聲聞舊解謂三轉令入見修無學三位是已又云十二行者寂音謂令聞法者發生無漏真聖慧眼於每諦中觀三世為總又每諦中觀過去為智觀未來為明觀現在為覺別為四諦如是一轉總別四行故為三轉十二行也諦者審諦又諦實又真實凡夫在苦而不審諦二乘審知是實而不知真實菩薩達苦性空四諦名一實通大小故天台釋四諦有四謂生滅無生無量無作隨四教之不同藏教小乘但知生滅而不知無生通教雖知無生而不知無量無作別教則無量圓教則無作唯一四諦各隨所見之不同也方便品釋迦受請則曰將一乘法分別説三今大通受請則直説小法而不更言分別者正為下根釋昔權即實之疑也以一向小乘不知是權故方便品特為開權顯實而上根已領中根未悟三假一實之義故説火宅喻三車一車令其領悟然諸小乘雖知昔權而不知權即是實故説藥草喻以一雨無私三草二木隨根受潤以顯法本是一但機有異耳中根雖悟而下根猶疑不達法一機異之旨故遠引大通説法之因緣以顯法一正應藥草一雨之意故今智勝受請説法不言分別説三但直説四諦隨根領悟大小之不同然四諦一法耳而小乘聞之則唯悟生滅通教聞之則悟無生別教聞之則悟無量圓教聞之則悟無作豈非法一機異耶故華嚴名四聖諦地上所修亦四諦法況小乘乎故如來説法其智慧門難解難入者此也及廣説十二因緣法至無量無邊不可稱數此廣四諦説十二因緣法也十二因緣乃中乘法有流轉還滅二門從無明緣行至生緣老死憂悲苦惱為流轉門廣苦集二諦世間因果也自無明滅至憂悲苦惱滅為還滅門廣滅道二諦出世間因果也小乘以集諦為苦本集乃三毒等諸煩惱也中乘則言無明為三毒煩惱集諦之因則深進迷原故為利根説也無明者謂妙性本明但因一念忘動俄然晦昧迷本圓明故號無明以本體湛然因無明鼓動故有遷流故名為行既遷其體則智轉成識矣故行緣識此三支乃過去本起之因也然因必有果故識為生死結根以智本無名無相今識攬四大色心和合有名有相故為名色此初投胎之始受形之原住胎凝滑之相也既入其胎五七三十五日六根完具故名六入六根既具形成出胎根與塵接故為觸領納所觸違順之境故為受此五支乃現在之果也受必生愛愛必執取取必造業既造其業後果不亡故為有此現在三支因也既有業因而後果隨之故為生生緣老死等此未來二支果也三世循環生死相續窮劫不斷故為生死衆苦之因緣通為苦集二諦中乘修斷但觀無明一滅則餘十一支一齊皆滅如倒樹根斷則枝葉齊倒乃利根修斷之行是為滅道二諦也故云廣説十二因緣等佛於天人下初會聞法獲益之衆也不受一切法悟空理也言諸漏者漏有三種謂欲漏有漏無明漏今云心得解脫謂枝末緣斷則根本無明伏而不起是為解脫非斷無明為大解脫也禪定三明等皆二乘所證之果第二第三等言其次諸會亦説諦緣之法而小乘得度者故云不可稱數爾時十六王子至亦求出家王即聽許此王子請説大乘之法也十六王子初捨珍愛親近智勝請轉法輪其所請者但云安隱天人雖不言小而意在小也故智勝先説諦緣之法故如今釋尊初説阿含漸教也諸小乘人既已得度故諸王子皆以童子出家特請佛説無上菩提成佛之大法自陳深心本願則志願成佛非二乘所知故王子為請也王子出家乃諸識出纏之象諸識既轉則一切根本枝末煩惱一齊都轉為真如妙用故轉輪王所將臣民八萬億人俱出家也以諸識俱轉為智用乃成佛之真因所以請説大法也爾時彼佛受沙彌請至諸佛世尊於今不盡此智勝受請説大法也然已受請而猶過二萬劫乃説妙法華經者蓋待時熟而説亦若今日也以彼壽長故待時亦久宜其然矣及説妙法獨十六王子為當機故能受持皆悉信受其餘聲聞亦有信解者然未能持也其餘衆生皆生疑惑者正是當時遺塵為今日之當機也以疑惑者衆故説時亦久經八千劫今説此經不滿數年而收機已盡特約緣熟者止此耳其未熟者又為將來之緣種也釋尊説此經已不久即入涅槃者以化緣已畢而智勝乃入靜室禪定者以待十六王子之成熟欲以妙法傳續無窮所謂護念付囑教菩薩法於時王子説法華經是則王子乃妙法之鼻祖而成佛度生至今未出大通三昧也智勝入定八萬四千劫者表衆生八萬四千煩惱為諸佛禪定之門菩薩妙行之智用故能度六百萬億那由他恆河沙等之衆生表轉六識微細之煩惱皆為成佛之妙行故令皆發菩提心也是知疑惑衆生不假知識久久熏習之功何由能生正信哉誠哉難信難解而此會猶有退席之衆耳智勝出定印證十六沙彌善説法要叮嚀大衆皆當數數親近供養正為今日之緣種矣所以者何下釋教親近之意以三乘人但能信是十六沙彌之説者皆得如來智慧之大益所以教令親近耳佛告諸比丘下正示昔為今日緣種也十六菩薩常説妙法所化衆生世世不離久而自信正顯聞熏之功也故歷值多佛至今不盡以顯妙法淵源而來直至今日豈小緣哉諸比丘我今語汝至成阿耨多羅三藐三菩提此十六王子以説妙法之功各得成佛示現八方名號不同蓋隨德稱名舊解約八卦以釋之固為有理學者不無牽合釋迦牟尼出現娑婆名堪忍土特隨本願故於難忍世界教化衆生非深慈大願誰能此哉壽量品云我實成佛以來甚大久遠此云比已成佛出現娑婆然今釋迦為毗盧之應身是知三身一體久近情亡是為佛不思議力也諸比丘我等為沙彌時至未來世中聲聞弟子是也此釋尊述往昔教化之事正為今日之緣種也始而釋迦但以妙法一乘成佛之種子教化無量之衆生皆已從佛發菩提心已而今有住聲聞地者此言自後退墮前云我昔教汝志願佛道汝今悉忘者是也以是原以大法教汝欲令成佛汝等忘之故我今日應當以此三乘令汝漸得佛道此往昔之因緣皎然汝等但執昔權不達如來真實之義所以如來智慧難信難解也爾時所化之衆即汝等現前受教之弟子今日緣熟得道之時也其有不能得記者而昔因猶在又為將來之緣則我滅度未來世中聲聞弟子是也豈有昧其本因哉我滅度後復有弟子至除諸如來方便説法此言廣為未來得度之因緣也然我所化弟子今生不能盡受佛教若我滅後有不信此經貪著小乘者則我於餘國作佛更有異名又為度脫之因緣即於餘國受化亦必從此經而入更無餘乘除諸方便之説是知佛佛度生成佛皆説此經為究竟也餘國作佛如華嚴名號品佛有四百億十千名蓋隨機應現之號然名異而實不異故皆以妙法開示衆生佛慧也諸比丘若如來自知至唯一佛乘得滅度耳此結顯終實也諸佛出世雖為一大事因緣一定先説三乘引導待機熟時至化緣將畢然後乃説此經盡廢昔權獨顯一實此諸佛利生之法式也衆又清淨正言機熟堪授之人故集諸菩薩為説此經各各授記作佛方盡出世本壞也比丘當知如來方便至此城非實我化作耳此將開化城引進之喻先立滯權為喻本也如來所以先設漸教者以方便權智觀察衆生深心樂欲之不同知其樂小難以語大故説小乘涅槃為暫息耳譬如下喻設漸意五百由旬喻衆生流轉五道也三毒充滿故喻惡道曠絶無人喻衆生迷失本真唯恣貪嗔故云怖畏之處珍寶處喻妙莊嚴海果覺報土多衆喻三乘之人欲出生死而求作佛也西域商人求寶必有一為導師將引衆人此喻釋尊出世為衆導師引出五道故云欲過此難所將人衆疲極欲退喻二乘狹劣怖畏佛道長遠皆有止息之心也導師方便等喻釋尊方便施權也過三百由旬化作一城喻三界外設小乘涅槃為中路止息之所也疲極衆喜喻愜二乘之心也衆人入城生安隱想喻小乘耽著涅槃不復前進也導師知衆不疲即滅化城喻今機熟廢權立實也寶處在近喻佛果非遙肯進即是故不言里數此喻明為下根開權顯實矣諸比丘下法合喻本知諸生死下合知通塞若衆生下合怖遠疲極若但説佛乘而不開漸則衆生怖畏佛道長遠是則不得不設方宜也佛知是已下正合化城二涅槃即聲聞緣覺二果也若衆生下合衆止息即滅化城策進寶所也一乘佛慧即是寶所二乘已出三界險道故云近於佛慧以權捨即實成佛無難此開權顯實之義也爾時世尊欲重宣此義而説偈言大通智勝佛十劫坐道場至慎勿懷驚懼此頌因緣之事也大通智勝佛下十六句頌智勝成佛彼佛十六子下四句頌王子見佛頭面禮佛足下頌王子請法東方諸世界下二十句頌十方梵王請轉法輪無量慧世尊下八句頌受請開漸六百萬億姟下四句頌初會説法二乘得益第二説法時下八句頌二三四會多衆得益時十六王子下八句頌王子請説大法佛知童子心下十句頌受請為説妙法華經言如恆河沙偈者謂機廣時長故所説之經文言亦多此稱性應機之談本無一定之法故今經一期止二十八品燈明六十劫説大通八千劫説常不輕於威音王佛所則聞二十萬億偈喜見於日月淨明德佛所聞八百萬億阿閦婆偈此稱性之談故廣略不同所謂通方之説也彼佛説經已下十六句頌大通入定王子説妙法華經所度有恆河沙衆彼佛滅度後四句頌所化之衆世世為得度之因緣長行無滅度之文偈中出之是十六沙彌下四句頌王子成佛爾時聞法者下八句頌十六佛皆説妙法引入佛慧是知所化之緣其來久矣以是本因緣下四句頌今所化皆本昔緣原下成佛種子故今作佛慎勿疑也如此歷歷昔緣即下根昧劣詎不信哉譬如險惡道逈絶多毒獸至引入於佛慧此譬如下四十六句通頌設喻如文可知但長行唯言化城頌中而言城郭舍宅園林浴池樓閣男女充滿等事則廣喻三乘權果功德利用大小相似總非實證故通云化作為止息耳我等亦如是下法合前十句合開權既知下十六句合廢權立實諸佛下四句總結法喻終一品之義
