body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明南嶽沙門憨山釋德清述妙法蓮華經隨喜功德品第十八此品來意由前分別持經功德但聞壽量一品已為殊勝然猶未盡隨喜全經之益今以一念隨喜之功較之超過八千秊中廣以七寶次生布施四百萬億阿僧祇世界六趣眾生又令各得四果之福者以極顯此法殊勝之益以堅二乘願樂之心故此品來也爾時彌勒菩薩摩訶薩至得幾所福而說偈言世尊滅度後其有聞是經若能隨喜者為得幾所福此彌勒因聞持壽量功德業已如佛殊勝極矣但不知偶爾暫時隨喜功德當何如耶故此請問爾時佛告彌勒菩薩摩訶薩至我今說之汝當善聽此約轉教之最後將以較法會之初聞者功德之勝也四眾人等無論長幼皆法會之親聞者從法會出至於餘處若在僧坊等言不擇其處猶街談里說不為法會也父母宗親不拘其人皆非法會之聽眾也是皆率略非嚴整之儀也隨力演說則未必盡達全經之旨也是諸人等聞說但隨順歡喜而已非精持也復行轉教至第五十人則與法會漸疎且遠矣今將顯最初法會聽聞之功德姑以第五十人之功德較之則可知已此以疎較親極顯初聽之勝益也華嚴五十聖位重初發心功德無比此第五十人乃聞名字而初發心者耶若四百萬億阿僧祇世界至七寶所成宮殿樓閣等此以廣大財施較隨喜之福也四百萬億阿僧祇世界則世界之廣大且多矣六趣四生以及十類眾生則盡眾生之數不可量矣盡眾生之所求隨所欲之樂具一一與之則心無遮限矣與滿閻浮提之金銀七寶乃至樓閣等則財施之廣大無邊矣此極言財施之大也是大施主如是布施至皆得自在具八解脫此以法施較隨喜之功德也然以廣大財施滿八十秊則將盡形壽時之久也又愍眾生衰老思以法度之乃為說法令廣多之眾生皆證四果得出生死之苦超深禪定之樂此則法施無窮也於汝意云何是大施主至何況令得阿羅漢果此世尊徵明財法二施之功德將較隨喜之功德也佛告彌勒我今分明語汝至算數譬喻所不能知此以財法二施較第五十人之功德也外財有漏小果權乘故難比佛性種子故隨喜一偈之功超勝廣大二施之福阿逸多如是第五十人至不可得比此以疎較親故不可比葢後聞者如初發心初聞法者如地上菩薩之象以親從法會聽聞妙法直入佛慧所以功德不可思議比量耳又阿逸多若人為是經故至及乘天宮此明隨喜生報之勝也前聞壽量則報與佛無異故經行坐臥即是佛受用今隨喜之益轉身生報得好象馬車乘及天宮殿以所隨喜者是一乘妙法故感報如之若復有人於講法處坐至若轉輪聖王所坐之處此言分座令聽之報也以聞此經法空為座今暫分座故感報天帝輪王之座以一念讓心與法空等故阿逸多若復有人至得與陀羅尼菩薩共生一處此言勸聽之報也所勸之人即須聞而勸者感報功德轉身得與陀羅尼菩薩共生一處以此妙法一心為法界總相大法門體故勸人蹔聞則心同法界故得總持之菩薩共生也利根智慧百千萬世至見佛聞法信受教誨此言勸者六根之報也利根智慧意根也不瘖瘂等舌根也有音無字曰瘖音字俱無曰瘂差不齊也曲歪齒也褰縮短唇也胗唇瘡也咼斜歪口也上皆舌報鼻不下鼻根也匾㔸平鼻也曲戾歪鼻也面色下身根也窊曲陷而曲也所生見佛眼根也聞法信受耳根也此言勸人聽法感報六根端正具足之如此意將顯持經六根清淨之報也阿逸多汝且觀是至為人分別如說修行此以劣顯勝也且勸一人聽法感報之如此況一心聽說精持者乎此所以六根清淨之報有在也爾時世尊欲重宣此義而說偈言若人於法會得聞是經典至其福不可限若人於法會四句頌最初一人親聞隨喜如是展轉下四句頌轉教至第五十約最後人較其功德如有大施主下四句頌財施見彼衰老相下十六句頌法施真實法謂小乘涅槃世皆不牢固如水沫泡燄謂無常之法最後下四句頌較最後之福如是下四句頌以後較初之福若有勸一人下二十句頌轉教之報若故詣僧坊下八句頌專聞報若於講法下四句頌分座報何況一心下四句頌以劣較勝此較隨喜蹔聞之功德業已超勝無比將顯精持之人必得六根清淨之前象也妙法蓮華經法師功德品第十九此品來意由前廣讚持經之大益今顯持經之法師即得六根清淨者以顯法華三昧之勝益現前即登不退地以發二乘精進不退之心故此品來也前法師品但以法師為助發之緣因今此品乃正顯持經之功德名同義別以佛性種子要藉緣熏使慧命不斷故法師功德最勝故以功德簡之爾時佛告常精進至莊嚴六根皆令清淨此言法師功德而告常精進者謂持經之人必精心純一永離懈怠有進無退方稱法師前言六種法師謂讀誦受持解說書寫供養今不言供養意在持經不言受持以讀誦解說書寫四種皆受持之行故不舉也言六根功德有八百千二百之不等者楞嚴定六根優劣文云世界相涉三世四方宛轉十二流變三疊六根功德各各圓成有千二百以力用不齊故眼唯八百以後方全暗鼻闕中交身合中知以三分言功一分缺德故眼鼻身三各具八百以彼義選圓根故約六根各具力用之不等今經正顯父母所生常身以顯持經即得六根清淨之報故只就現在肉身六根而言清淨不在優劣也彼言功德乃指六根之力用今言功德即持經不出六根故一一功德莊嚴六根皆得清淨意在持經之功德也言即得清淨者然清淨乃遮空之辭也以肉質六根皆隔礙而不通奔染六塵原非清淨今言清淨乃顯持經功德所致故也故曰皆得清淨問曰經言六根清淨皆云父母所生現前肉身即能徹見徹聞三千大千世界者是事難信請決所疑答曰理固如是無足怪也請試言之然眾生知見本是一真法界圓明心體無邊剎境十世古今靡不洞照纖毫不遺與十方佛同體無二者也但以最初一念無明妄動障弊妙明故感結水火風土四大壅令留礙故隔越不通以致見不超色聞不出聲此固眾生之知見也今持經之人一念頓悟本圓真心故曰一人發真歸元十方虗空悉皆消殞何況空中所有國土而不振裂是則塵消覺淨故十方世界圓明洞照而言三千猶約量而言之耳言清淨者謂六根銷復乃空之異名以就現前肉身故遮之也且觀音耳根圓通生滅既滅寂滅現前故能上與十方諸佛同一慈力下與六道眾生共一悲仰豈直六根清淨而已乎首楞嚴云阿那律陀無目而見䟦難陀龍無耳而聽乃至迦葉圓明了知不因心念是皆父母所生肉身也又曰不明自發則諸暗相永不能昏根塵既消云何覺明不成圓妙此六根清淨之象也是則眼見三千世界等無足怪也是善男子善女人至果報生處悉見悉知爾時世尊欲重宣此義而說偈言若於大眾中至雖未得天眼肉眼力如是此眼根清淨功德也言肉眼清淨則色塵空而不隔妙體現前徹見三千大千世界一切眾生心念頭數皆現心中三際了然故果報生處悉知悉見楞嚴所云行陰若盡則眾生生死業流灣環無不畢見況圓明洞照乎頌言無所畏心則直心正念真如法也以是持經故功德自具其實圓照法界今言八百但就肉身言之耳彌樓此云光明即七金山之一也復次常精進至種種音聲而不壞耳根爾時世尊欲重宣此義而說偈言父母所生耳至但用所生耳功德已如是此耳根清淨功德也普賢心聞洞十方今以持經既悟妙心則十方洞聞了無壅塞也有理之言為法聲無理之言為非法聲頌云撰集解其義然撰集解義是未有聲也而能聞之者葢彼以思而知故我以不思而聞所以為心聞也頌言悉能分別知則不獨徒聞其聲而已此乃耳根清淨之妙也復次常精進至若欲分別為他人說憶念不謬爾時世尊欲重宣此義而說偈言是人鼻清淨至而是持經者先得此鼻相此鼻根清淨功德也須曼那此云善攝意瞻蔔此云黃華小而香波羅羅此云薰華多摩羅䟦此云賢無垢香多伽羅此云木香眾生之香葢眾生身分皆各有氣分熏人約義為香耳波利質多羅乃帝釋員生樹拘陀羅云大遊戲地樹不壞不錯言無壞無雜也言聲聞及佛四聖之香所謂戒香定香智慧香解脫香解脫知見香此皆非有形色之香豈鼻根可能聞哉鼻根清淨故乃可聞所謂心空聞性香也頌言地中寶藏懷妊男女聞香而能辯初懷妊時即知其成就不成就又男女所念染欲癡恚之心及地中伏藏金銀珍寶銅器所盛又珍寶貴賤聞香知貴賤出處凡此等事豈鼻根所能哉華嚴所言菩薩有十種甚微細智非洞明法界無以辯博如此而言鼻根清淨是所謂寄根而言耳乃至眾生在佛前聞經皆歡喜如法而修行聞香悉能知此非平等法性無以洞達如此肉身之鼻天然實相不侍無漏法生矣復次常精進至又能出於深妙法音爾時世尊欲重宣此義而說偈言是人舌根淨終不受惡味至或時為現身此舌根清淨功德也舌約嘗味則好醜美惡苦澀諸物一入舌根皆變上味純成甘露法味此乃離味之知也約說法在眾生中則諸天八部五眾之人俱來聽法盡形供養在四聖則聲聞辟支菩薩諸佛常樂見之且又感諸佛皆向說法悉能受持是謂諸佛法身入我性我性還共如來合此所以又能出於深妙法音也頌言諸佛常念守護現身謂妙契法身故也復次常精進至皆於身中現其色像爾時世尊欲重宣此義而說偈言若持法華者其身甚清淨至一切於中現此身根清淨功德也以身清淨如淨琉璃故眾生喜見眾生生死善惡報處及三界形色四聖體用一一皆在身中顯現如鏡現像寂音引晉佛圖澄者本天竺人以永嘉四秊至洛陽自言百餘歲腹旁有孔以絮塞之夜讀則拔絮出光照室又常將齋臨水從孔中引腸胃洗濯還納腹中以油塗掌中使童子即而窺之童子驚走曰是中有軍馬葢照見石氏擒劉曜計其處千餘里此亦父母所生之常體也頌言菩薩於淨身皆見世所有唯獨自明了餘人所不見此正楞嚴所謂一人發真歸元十方虗空悉皆消殞空中國土悉皆振裂此葢發真者見餘人所不見也復次常精進至亦是先佛經中所說爾時世尊欲重宣此義而說偈言是人意清淨明利無濁穢至持法華經故此意根清淨功德也以意根清淨離諸思量分別故於一偈一句達無量義以深達實相故說俗間經書治世語言資生業等皆順正法如古德機緣廬陵米價麻三斤乾矢橛庭前栢樹子洗鉢盂去等一一如此皆意根清淨故拈起便示向上第一義也六道眾生心所動作皆悉知之以心徧十方同一體故此人有所說皆是先佛法以得諸佛智慧故是人持此經安住希有地總言六根清淨如此為希有地也此言悟佛知見葢以四安樂行為妙悟之始壽量為妙悟之極故較量分持全經之功德以至六根清淨乃為妙悟之實效然就父母所生肉身六根而言者楞嚴云識陰盡者如淨琉璃中含寶月故六根融通圓照法界是皆未盡果縛即肉身而言妙悟開發之如此是知持經妙悟端在識心盡破分別情亡故一一圓明清淨實相此法爾如然稟明於心不假外也故從上諸祖妙悟自心皆能如此但不欲顯露惑世耳觀其各有臨終付囑密記之事靡不歷然此其驗也故天台智者大師妙悟法華三昧親見靈山一會儼然現存豈非眼根清淨之驗歟妙法蓮華經常不輕菩薩品第二十此品來意由前言持經功德之勝今正示以堅持之行故如來自敘往昔為菩薩時名為不輕持此妙法唯以平等佛慧教化眾生乃至多遭毀辱絕無一念疲厭之心以至今日得菩提果此持經之驗也以此勸進二乘當遵此範末世持經可無厭患自無退墮之心也以此妙法悟之為難既悟守之為難且於惡世弘持此經更難之難故世尊憂懸之意也深而叮嚀告誡之心也切所以歷說持經之行自提婆達多以來皆明悟守之事至此遵如來行然後乃為精持以得六根清淨乃見其人故此品來也前後諸品文雖不一義實一貫參會經文自得其旨具見如來說法之意也爾時佛告得大勢菩薩至眼耳鼻舌身意清淨此將顯精持之利先牒指持毀以警之也毀謗之罪如前喻品末與法師品說聞持之福如向法師功德品說將顯精持而先牒明損益者意謂不善持者令彼毀謗而獲罪法師雖能善持得六根清淨不能化彼強暴但能自利而不能利他今常不輕以佛性徧記四眾今增上慢皆轉邪心而生正信而自亦得六根清淨所謂自利利他二行具足故將說精持而先牒罪福意顯持經必若常不輕者乃盡精持之妙也告大勢者以忍有大力故也得大勢乃往古昔至爾時有一菩薩比丘名常不輕此將舉精持之人先舉所師之佛也佛號威音王者可畏曰威聞聲而伏謂之威音不必作意而人自畏之故曰威音王菩薩住寂滅忍以平等大悲普施眾生眾生聞聲而自畏伏故所師之佛為威音王而人稱己曰常不輕是以尊行加人故也以安忍寂滅物我兩忘永離憂惱故劫名離衰唯以忍行故無損有益故國名大成此乃空劫初成之佛已前無佛故宗門稱向上曰威音那畔今說精持而先指毀謗之罪者意謂不能持經故損他無益即前四安樂行雖能守己以免毀謗之來不致損他而猶不能轉彼不信以入信根故持經法師雖能自得六根清淨而不能令他同入是但自利不能利他故非精持今不輕菩薩以平等大悲佛性種子徧記四眾不但安忍謗辱而能化彼增慢轉罪為福方是真精進行有大勢力乃盡持經之妙也故佛將顯此行先舉損益有深意也得大勢以何因緣至汝等皆行菩薩道當得作佛此徵不輕得名之因緣也因以佛性徧觀四眾故禮拜讚歎皆稱行菩薩道當得作佛是以平等大悲普視眾生不輕於人也而是比丘不專讀誦經典至汝等皆當作佛此言不專讀誦經典但行禮拜者以經乃詮顯如來法身佛性種子之具也今觀佛性普觀四眾則法身徧在大眾身中斯則真經在人而不在紙墨文字即此便為真持經矣四眾之中有生瞋恚心不淨者至號之為常不輕此言因是而得不輕之名也罵詈不瞋打擲不怨而猶常自高聲授記願人作佛者此正安心寂滅物我兩忘無我之至也以是之故久而不退即彼闡提四眾皆起信根非此不足以化強暴故皆號之為常不輕大哉佛意甚深微妙之如此也始也二乘不聞此經絕無成佛之分是法身慧命備載此經故曰此中已有如來全身故二乘既聞此經皆得授記作佛以法由人弘若無人弘則慧命斷絕故所重者又在持經之人也且惡世難持不善持者令人不信生謗則無益而有損是則持經又最難得其人也故說四安樂行教以持經之方不致彼謗及得其人有能持者當供如佛是則佛性慧命又在能持之人而不在經矣所謂人存政舉也故能持之人即得六根清淨之益此雖自利而不能利他是但能持而不能弘也今常不輕者不專誦經但行禮拜而以佛性種子徧記四眾是則佛性普在諸人而不獨在持經者也故能轉彼邪心化彼兇暴而生正信皆植成佛之因如此方盡如來涉世利生之本懷也觀其義深遠其語巧如不但四十秊前之方便即法華一會特為此事猶且方便微密漸導至此而顯發其極致此豈常情所窺測哉觀者不見佛心而以文字智辯為多者有負如來深慈矣可不敬哉是比丘臨欲終時至廣為人說是法華經此言不輕聞經得自利之益也臨終者顯向未聞經未得慧命也空中聞威音王佛先說此經者意顯此經乃真空法界所流也二十千萬億偈者凡有對則為二以此經乃心境雙忘離相寂滅之法眾生心境種種無量一聞此經則一切心境化為寂滅之法矣故經有二十千萬億偈未足多也即得六根清淨者顯持經之益也更增壽命以臨終聞經以能受持續佛慧命以稱法界寂滅之性故得二百萬億那由他歲以稱性而演故盡命說經於時增上慢四眾至令住阿耨多羅三藐三菩提此言不輕因聞法持經轉邪利他之益也彼增上慢四眾人等乃昔輕賤不輕者向已稱美名則已不毀知所重矣今見不輕得大神通謂六根清淨樂說辯力謂廣說此經大善寂力謂住寂滅忍故皆信伏隨從是則不但不毀抑又歸化此由不輕忍力所致也故復化千萬億眾令住菩提此利他之行見持經之益也然世尊將說妙法而五千上慢禮佛而退是知此輩乃諸佛所不化者今見不輕而感化如此所謂觀德人之容使人之意也消是貴身體力行之益有勝於言說分別也命終之後得值二千億佛至功德成就當得作佛此言不輕持經值佛之益也命終得值二千億佛皆號日月燈者謂住寂滅法佛性種子慧光常明如日月燈故云於其法中說法華經也復值二千億佛同號雲自在王者謂妙法如雲普被群生慧光破暗得大自在也以得六根清淨絕諸對待故說法無畏也供養既多善根已深故說此經久而不倦當得作佛也得大勢於意云何至疾得阿耨多羅三藐三菩提此言不輕乃釋尊前身也以持經之久故成佛之速意在勵其精持也得大勢彼其四眾至教化阿耨多羅三藐三菩提此言不輕復化之益也彼四眾瞋恚不輕而不信者故感千劫地獄之苦罪畢還遇不輕教化成佛所謂聞而不信尚結佛種之因也得大勢於汝意云何至三藐三菩提不退轉者是此言今日在會大眾即昔日謗法之人也以初謗者乃法華經也故今還因聞此經而得開悟以四眾現存豈非大益得大勢當知是法華經至讀誦解說書寫是經此結顯勝益所以勸持也前言謗經之罪但言地獄三途之苦報盡為人終無獲益意顯不善持者令人終於不信是謂慧命斷絕也今言謗者即感地獄苦畢復蒙教化此其慧命不絕者乃善持經之益佛意持經必苦不輕然後為精持故勸受持引已往事以誡將來佛慈深矣爾時世尊欲重宣此義而說偈言過去有佛號威音王至漸具功德疾成佛道此頌述不輕遠因也從過去有佛下至疾成佛道四十句通頌不輕持經之事連言命終聞經先言增壽後言值無數佛是知慧命相續永永無窮也彼時不輕則我身是至今於我前聽法者是此言今緣以證昔因也彼時不輕下十四句言不輕即我彼謗毀者即現前四眾也我於前世勸是諸人至世世值佛疾成佛道此結勸持也我於前世下至時說是經十六句顯昔勸之益是故行者下八句言今勸之益言時聞時說所謂欲識佛性義當觀時節因緣也古釋齊此已前二十品名正宗分此後八品判屬流通今愚以開示悟入四字分二十八品通是正宗以提婆達多品至後囑累十一品為悟佛知見藥王及後至普賢勸發六品為入佛知見已前二十二品通名信解向後六品顯行證故意以藥王明行為入此與古釋全不相蒙而以義為準臨文自當證知妙法蓮華經如來神力品第二十一此品來意由前世尊廣說持經之功復示自持之行是則當機圓悟已極已遂如來出世本懷且得地涌持經之眾故如來歡喜乃極盡神力而印證之且示當機平等法界直令覩佛境於目前見淨土於當下以顯法利已圓將付法王家業也然後地涌之眾以發啟者正顯自心性德滿足方為法華全體也如來即現神力徧身毛孔皆放光明舌至梵天地皆震動者所謂通身吐露徹底掀翻也諸佛同放光明以顯佛佛道同也十方諸佛同坐光中空中出聲遙讚釋迦說法華經者以顯十方諸佛心心相印也十方世界通達無礙如一佛土者乃昭廓法身真境以消二乘限量之心也如來至此極盡神力發揚此經功德不盡者以如來所有一切之法一切自在神力一切密秘之藏一切甚深之事皆於此經宣示顯說故久默斯要今乃說之以其難信難解今已深信深解所謂悟佛知見也而奉持之功德亦非思議可及故開示至此顯理已極妙悟已圓乃盡佛神力以印證之故判此品已前為信解之真因因心既真可克妙果故次囑累先此品來意顯地涌之眾皆克家之子也舊判此品連後七品俱屬流通此品為發起義有未盡故愚判藥王連後五品為入佛知見由行以證果方盡如來說法儀式故也爾時千世界微塵等菩薩至解說書寫而供養之此地涌之眾請持妙法也然地涌之眾皆克家之子特為持經而出何以一向默住直待至此方請者以此大眾向住下方空中行頭陀事志樂靜處似未達涉俗利生之事故待世尊分別持經功德以堅願樂之心及說不輕以示二利之行故至此方於佛前願於滅後凡分身所在滅度之處皆願廣說此經亦自欲得是真淨大法所以請也新記之眾願於他方弘經而不敢在娑婆藥王願在娑婆而不敢往十方唯地涌之眾願往分身所在之處廣說此經則願大而心廣與佛心等故特付囑之爾時世尊於文殊師利等至地皆六種震動此如來印許持經故現大神力以示得遂本懷踊躍歡喜之意也舊住娑婆言文殊等在會與地涌之眾揀非他方雲集者以將囑累先現神力警之也神力乃法界無作妙力也華嚴為之神變相廣長舌者如來三十二相有覆面舌今言出廣長舌乃神力所現也舌雖大而不出口今言出廣長舌上至梵世且梵世乃色究竟處也而云至者正顯有色相處凡一切音聲形色皆說法音聲也毛孔甚微細世界甚廣大而云一切毛孔放無量無數色光遍照十方世界者意顯正報毛孔依報微塵一一其中智光充滿皆說法之地也此釋迦一佛所現神力之廣大如此眾寶樹下諸佛乃分身雲集之佛一一舌相光明皆與釋迦等無有異者顯佛佛道同也現神力滿百千歲者放光之頃即經如許長時顯三際平等也至梵世則竪窮遍十方則橫該百千歲則三世意顯此舌根竪窮橫遍十方三世神力充滿法音彌布意將以此神力說此經之功德猶不能盡也謦欬彈指最小音聲而能徧至十方地皆震動者意顯法音稱真法界故聲所及處眾生聞者無明頓破之象也將顯讚經功德故先現此神力也其中眾生天龍夜叉至皆大歡喜得未曾有此言眾生八部各因神力攝受開佛知見也其中眾生八部皆住十方界光中之所攝受者且此皆肉眼不能遠見今因佛光所攝皆遙見娑婆世界空中雲集十方分身諸佛及見釋迦多寶并無邊法會圍繞釋迦者是所謂開佛知見頓見靈山一會儼然現在故皆歡喜得未曾有此因神力所攝也爾時諸天於虗空中至通達無礙如一佛土此言空中諸天因光所照見靈山一會說法華經轉教眾生隨喜者意顯能入法性真空方能悟此妙法據此乃可轉教眾生隨喜正謂坐如來座方能弘持此經也彼諸眾生聞此聲已皆向釋迦三稱者此因轉教故諸聞者各各開佛知見也以種種瓔珞妙物遙散娑婆者以諸妙行一一迴向佛道也所散之物變成寶帳者以理融事通歸法界也十方世界通達無礙如一佛土者開佛知見則一切根塵識界廓然無礙此皆神力所致也爾時佛告上行等菩薩至此經功德猶不能盡此結顯經德已上種種神力說不能盡也且以至梵天之舌相照十方之毛光合十方雲集分身諸佛之神力滿百千歲之長時是則竪窮三際橫徧十方震動大千通諸佛土如是神力於無量劫說此經之功德猶不能盡者極顯此經乃法界之全體然諸佛神力雖廣大無比猶是分顯未能盡舉法界之量如所謂未徧普賢一毛孔故也以法界全體諸佛眾生正報之毛孔依報世界之微塵一一徧含十方剎土大經云普賢一一毛孔中不可說剎次第入毛孔能受彼諸佛諸剎不能遍毛孔如一毛孔一切毛孔一一皆然如一微塵一切微塵塵塵亦爾以此經雖未明言事事無礙而一真法界乃四法界之本故也以此經所詮實相寂滅真心是一真法界之實相故諸佛所現神力而不能盡說此經之功德也華嚴云假使有人以虗空為紙大海為墨須彌為筆書寫此經一字功德不盡正此意也以要言之如來一切至皆於此經宣示顯說此言神力不能盡說之所以也一切所有盡法界之所有也一切自在神力盡法界無作之大用也一切秘藏盡法界之秘密也一切甚深之事徹法界之源底也是皆法身全體殊不可以見聞之跡求之今此經分明顯說如上神力雖廣大無邊猶屬可見可聞所以不能盡說此經之功德耳是故汝等於如來滅後至諸佛於此而般涅槃此囑地涌之眾傳持此經以結前云此中以有如來全身皆應起塔等義也所以者何下釋所以也以一切諸佛成道度生轉法輪入涅槃皆從此經出故應起塔供養故當弘持使慧命不斷也爾時世尊欲重宣此義而說偈言諸佛救世者住於大神通至決定無有疑諸佛救世者下十二句頌神通之事以佛滅度下十二句頌神力不能盡說持經之功德能持是經下六句頌持經即見釋迦多寶分身諸佛并我今日教菩薩事以一切諸佛法身應現之事皆在此經故能見之能持是經下八句頌能持是經由見諸佛故諸佛歡喜諸佛坐道場下十句頌由持此經即得諸佛秘要之法故得四無礙辯也諸法法無礙也之義義無礙也名字言詞詞無礙也樂說無窮樂說無礙也故結云一切無障礙於如來滅後下十句頌由得四無礙辯故能說法教無量菩薩皆住一乘之大益也是故有智者下六句結頌勸持也將欲囑累先現神力以顯不能盡說此經之功德者意顯此經乃如來道場所得之法功德廣大以發持經菩薩堅固願力也妙法蓮華經囑累品第二十二此品來意以從前開示顯理已圓當機悟心已徹信解已真是成佛之真因已具則如來出世本懷已滿正若長者父子情忘即當委付家業故說囑累為信解之終故此品來非斷為流通也齊此已上十一品經為悟佛知見合前二十一品通為信解總屬顯理為因下六品顯行以明證入為果爾時釋迦牟尼佛至令一切眾生普得聞知將欲付囑先摩頂安慰而告諭者示其慈憐令不驚疑而必信也三摩其頂再三諄切之至也無上菩提最為難得之法佛於歷劫勤苦乃至三千世界無芥子許不是菩薩為求菩提捨身命處以久受勤苦乃可得成所謂難得阿耨菩提也今將付囑再三言其難得者正如長者大富之家要子知其創業之艱難也今以此法付囑菩薩非特欲其持守而已且欲廣宣此法令一切眾生普得聞知以所託者重故告諭之心也切是謂一大事因緣非細故也所以者何如來有大慈悲至則為已報諸佛之恩此釋令其廣宣之意也十方如來但以眾生為心凡己所有皆與眾生以有大慈悲無所恡惜亦不畏眾生之多凡有求者皆能與之此諸佛之本心也能與眾生佛之智慧如來智慧自然智慧然云佛之智慧而有三種者何耶言佛之智慧乃眾生所迷今與開示令其悟入者是也如來智慧乃眾生與佛平等共有因修而後證得者也自然智慧則天然妙性本無迷悟不屬修證者也智慧本一但由開示而後悟入由悟入而後修因修而證本有天然之自性故說有三種也今佛既與開示必使悟修而證本有方為究竟盡皆與之無悋故是一切眾生之大施主此如來之心以眾生為心也故教諸菩薩亦應隨學如來之法一切與之勿生慳悋也故於未來世凡有信佛智慧者即當為說此經使得佛慧上言三種智慧今教菩薩但言如來智慧者以先為眾生開示佛之知見使自悟入修習證得故以開示為急務所以特言之也儻若眾生有不信如來智慧者當於深妙法中示教利喜謂於三乘權教秘密法中漸漸誘引使令信受此正付囑之意也故曰汝等若能如是則為已報諸佛之恩矣前方便品末身子等感悟佛恩乃至頂戴塵劫身為床座徧於三千世界畢竟不能報佛之恩故此結勸但能弘宣此經則為已報諸佛之恩矣所謂假使頂戴經塵劫身為床座徧三千若不弘法度眾生畢竟無能報恩者時諸菩薩摩訶薩至唯然世尊願不有慮此諸菩薩因佛付囑而受命也因佛摩頂三囑故此三反受命安慰世尊願不有慮此正克家之子足以慰父之心也爾時釋迦牟尼佛至多寶佛塔還可如故此付囑事畢故令分身諸佛各還本土也前窮子喻長者思念此子意欲委付家業及窮子歸來始而驚怖既而疑久而信益久而親父子情忘故長者并會親族國王大臣委付家業今多寶出現分身齊集正會國王大臣之意故今付囑已畢遂令分身諸佛各還本土也尚留多寶還可如故者以前雖悟法身但只親近隨順而已後顯證入正欲妙契法身方為深入實證故留多寶言還閉塔如故正顯證入法身秘密藏耳故留證也說是語時十方無量至聞佛所說皆大歡喜此因證法得人付囑故皆歡喜也分身諸佛與諸菩薩皆喜者喜釋迦法有所付也身子與新記弟子等歡喜者喜有菩薩受囑眾等末世有所依歸也金剛經云如來善護念諸菩薩善付囑諸菩薩是知如來出世一向護念菩薩專為付囑此事也四十年來求人不得今幸得人而付囑之已盡如來出世本懷利生之能事已畢於此所謂教菩薩法佛所護念者業已盡情吐露矣故今付囑其受囑者但印證其心而已欲證實果必須修行所謂先悟後修故後六品以藥王等正顯依法修行方可證入名為入佛知見詎可視為虗受耶故愚判為入佛知見意在顯行若言流通則此經為一代時教之總流通耳智者詳之妙法蓮華經藥王菩薩本事品第二十三此品來意由前顯理已圓今當顯行以明入佛知見也前乃教菩薩法後乃依教修行以取實證以藥王明行者意謂二乘雖悟圓理尚有微細無明習氣未淨難於涉俗利生猶要歷事多佛廣修眾行必資止觀之藥調治之方淨治微細無明破俱生我法二執以為妙行乃可證入故首問藥王云何遊於娑婆世界而行百千萬億難行苦行者正示二乘初涉生死險道全仗止觀之力故以藥王昔因聞法華經得現一切色身三昧以破俱生我法二執乃能以神力供佛得受付囑也然身供佛約破俱生我執之象然臂供養約破俱生法執之象二執既空皆因法華三昧之力以顯持經之功乃見妙法最勝故廣讚經功凡有修者無不獲益故此品來也二執有分別俱生二種初由開示悟佛知見頓斷一分無明已破分別二執即登初地俱生二執由二地至七地斷俱生我執從八地至佛地斷俱生法執今云破二執乃二地至七地行相至此乃顯故云分別二障極喜無二執俱生地地除故判為入佛知見明矣楞伽明菩薩以止觀力進破二障實證真理從二地起至七地頓捨藏識乃入八地自此以後即得三種意生身一者謂三昧樂意生身二者覺法自性意生身三者種類俱生無行作意生身此當八地得現一切色身三昧乃三昧樂意生身也妙音觀音二品如次配二種身以得此身乃實證之驗也以此意生身入定則有出定則無故云三昧樂正當七地爾時宿王華菩薩至及此聲聞眾聞皆歡喜此徵明藥王苦行以宿王華發起者意顯宿修稱真之行以為成佛真因也藥王前願於娑婆世界廣說此經故今明行但以涉俗利生弘經為妙行故問藥王云何遊於娑婆世界有百千萬億難行苦行也願少解說令眾歡喜者意顯止觀為涉俗之要欲令新記菩薩得此調心不畏娑婆弊惡也前四安樂行但遠謗辱譏嫌此止觀妙行乃證入之妙行意將歷境調心以治微細無明惑障也故願說之令此聲聞眾喜也非此止觀妙行則終不敢入娑婆矣所以請也爾時佛告宿王華菩薩至諸聲聞眾說法華經此將明藥王之苦行故先述其本因也所師之佛號日月淨明德者謂以正智觀照破無明暗淨治染垢之象也其佛法眷有八十億菩薩七十二恒沙聲聞者意破七識染污無知習氣將顯八識圓明之體以契本覺真心之象也以本覺妙體不離四大根塵故佛壽四萬二千歲淨智妙圓絕諸染污故國無女人及四惡道也七識本是平等性智故地平如掌八識本是如來藏體大圓鏡智故琉璃所成具有恒沙性德故寶樹莊嚴等菩薩聲聞皆坐寶臺者言三乘皆依七八二識修行以成自然得果故令諸天作樂供佛喜見為藥王前身因聞說法華經則實相妙行有所授受而來也彼佛為一切眾生喜見菩薩說法華經一切眾生喜見者以離染清淨故眾所喜見此藥王之前身也聞法華經苦行資始有本之行也是一切眾生喜見菩薩至得現一切色身三昧此言藥王前身因聞經資行得益也喜見精進經行一心求佛者因聞妙法以止觀調心即楞伽云無間行起信云一行三昧故曰一心以觀實相於一切法了無異相故觀真如名無間行又名一行也滿萬二千歲得現一切色身三昧者楞伽大慧問無間行佛說修行者大方便乃至得無生法忍住第八地得離心意識五法自性二無我相得意生身然意生身有三種經云云何三昧樂正受意生身謂第三四五地三昧樂正受種種自心寂靜安住心海起浪識相不生知自心理境界性非性是名三昧樂正受意生身釋曰謂初登地證平等真如直至七地盡真如際已捨藏識故云自心種種寂靜七識波浪不生故云安住心海起浪識相不生已斷俱生我執我執既斷則境界無依故云知自心現境界性非性此乃定力所持亦名力持身故云三昧樂正受意生身七地證此而云三四五地舉中以該初後也今云一心求佛正安住真如一心也以七識既破則根塵自泯故云滿萬二千歲住三昧中真如圓明普照一切了無障礙一切異類種種形色皆現三昧心中如摩尼珠隨緣顯現故云三昧樂正受意生身所謂得現一切色身三昧葢言三昧中現也前法師功德品持此經者得六根清淨而已未能現一切色身也今喜見持經以依所悟實相修行入真如三昧乃依行所成故云一心求佛乃得現一切色身三昧故判此品已後為入佛知見謂依解起行行起解絕乃得證入故楞伽說三種意生身正顯無間行實證之相以此釋之方見此經入佛知見之實證而後六品非流通也智者請深觀之得此三昧已心大歡喜至價直娑婆世界以供養佛此言喜見因得法利以三昧力研窮習氣之象也謂聞實相妙法故得三昧今欲隨順真如實相將為成佛真因故空中雨華作供即以真如三昧熏變習氣故雨香作供養也以三昧乃真如氣分故香價直娑婆作是供養已從三昧起至過是已後其身乃盡此言喜見然身正示破俱生我執之象也上以神力運供乃三昧無作妙力此言然身乃真如三昧進破俱生我執之象故言從三昧起也以三昧熏變習氣淨治根塵故云服諸香滿千二百歲熏變根身故云香油塗身已捨藏識垢染故云天寶衣而自纏身以全體真如故灌諸香油我執頓破故云而自然身藏識已捨則八識圓明恒沙無明皆成妙覺故光明徧照八十億恒河沙世界其中諸佛同時讚歎也是由精進一心我執既破妙契法身故讚言是真精進是名真法供養如來也諸供養中法供養最故華香諸物及國城等供皆所不及也真如實證妙絕忘言故諸如來而各默然以根塵既消我執亦泯故火然千二百歲其身乃盡一切眾生喜見菩薩至即為其父而說偈言大王今當知至供養於世尊為求無上慧說是偈已而白父言至大王我今當還供養此佛此言喜見然身得化生之益也以染污既除我執已破則證清淨真如名白淨識故轉生淨德王家以由八地出真如三昧所謂意生身也故云結跏趺坐忽然化生為父說偈以敘前緣乃具足六通宿命現前也言日月淨明德佛今故現在者謂佛見未忘法執尚存也以證實相真如則一切世諦語言資生業等皆順正法故云因供佛故得解一切眾生語言陀羅尼陀羅尼云總持真如之異稱也以從八地出當法師位善能說法故復聞法華經八百千萬億等偈此正法執未忘也將破此執故云我今當還供養此佛白已即坐七寶之臺至合十指爪以偈讚佛容顏甚奇妙光明照十方我適曾供養今復還親覲爾時一切眾生喜見菩薩至世尊猶故在世此敘喜見再覲本師之儀也以我執既破入法性空故云上昇虗空以將躋等覺故云往到佛所以本覺分顯故云我曾供養今復親覲而言世尊猶故在世此正佛見未泯雲門云法身亦有兩般病得到法身為法執不忘己見猶存坐在法身邊是一直饒誘得法身去放過即不可子細檢默將來有甚麼氣息亦是病此宗門法身二種病前則教義所收次為透法身句則教所不攝也今云破法執正雲門第一種病所謂微細法執今云世尊猶故現在正宗門法身見也須破此執乃可入妙爾時日月淨明德佛至於夜後分入於涅槃此言喜見持經法利妙契法身堪續慧命故日月淨明德佛臨入涅槃付囑大事也言當入涅槃以佛法囑累而云及菩薩弟子并菩提法及三千大千七寶世界給侍諸天等并滅後舍利一切齊付者以所證菩提及眷屬莊嚴正報依報及法身舍利等皆因修妙法所成一真實相故齊付之所謂全付家業也言佛法乃所說應機之法也菩提法乃道場所得法也囑令起塔意顯法身依持寂滅真境故使慧命不斷也既付囑已即入涅槃爾時一切眾生喜見菩薩至埀諸幡葢懸諸寶鈴此言喜見受囑起塔續佛慧命也栴檀能清涼熱惱以此為𧂐供佛而然之所謂入法身寂滅清涼之境也收取舍利八萬四千起如許塔者一入法身寂滅則八萬四千煩惱一一皆化入寂滅真際矣表剎莊嚴等謂法身本具性德莊嚴也爾時一切眾生喜見至皆使得住現一切色身三昧此言喜見然臂乃示破俱生法執之象也言作是供養心猶未足者謂所證未至極則不以得少為足也菩薩大弟子及天龍等乃日月淨明德佛之所付囑者以先然身未足為供故今然臂方為盡心意顯俱生二執盡破方為實證也二就既破則八萬四千煩惱都歸寂滅之地則向之七識執持根境諸法者亦俱歸寂滅矣故云然臂供八萬四千舍利塔七萬二千歲也二執既破則捐捨小乘頓入無上正覺故無數求聲聞人皆發菩提心亦得住現一切色身三昧也爾時諸菩薩天人阿脩羅等至一切天人得未曾有此言諸菩薩天人八部等見其無臂而憂惱者以其法愛難捨也圓覺經云法愛不存心漸次可成就喜見誓言兩臂如故者所謂但破其執不破其法也至若得佛則無不具足故如故也以希有之事故瑞以應之此上敘藥王之往因也佛告宿王華菩薩至無量百千萬億那由他數此結昔證今也故曰一切眾生喜見菩薩即藥王菩薩是其藥王捨身布施無量百千萬億那由他數者謂種種我法二執也始而法師品歷言此經難持繼而安樂行品教以持經之方然彼四行但能遠彼強暴而不能化繼而說常不輕雖能化彼上慢而未能忘佛見法見於佛知見難於證入是皆俱生我法二執未能淨盡難以妙契法身故說藥王然身而得付囑然臂而續慧命意在進破二執方盡持經之妙行乃可入佛知見也宿王華若有發心至諸珍寶物而供養者此言欲得菩提能然手足一指供養舍利勝以國城妻子三千國土諸珍寶物而供養者意顯能破少分微細法執則能妙契法身超勝有為功德也是故持經妙行重在自破煩惱所知二障也若復有人以七寶滿三千大千世界至其福最多此較持經一四句偈其福超越七寶滿三千界供佛之功德者以彼有相福田難比法身無為功德也以法身無為不墮諸數故能超之宿王華譬如一切川流至此經亦復如是諸經中王此廣顯妙法具有十種第一殊勝之德所以超越三乘乃以十種譬喻明之也一深廣如海諸水所不能及所謂諸佛智慧甚深無量二最高最上如須彌山諸山所不能及三照明長夜如月眾星所不能及四破暗如日生盲亦蒙其益五最尊上如轉輪王六統攝一切如帝釋天為三十三天中王此經統諸佛之法義七為三乘之依怙如梵天王為眾生父八為三乘之第一如二乘於凡夫中為第一九為諸經中為第一如三乘中菩薩為第一十為諸法中王如佛為法王以此十喻通喻此經於一大時教中為最上一乘之妙法最為殊勝故也上顯法勝下顯功勝宿王華此經能救一切眾生至能解一切生死之縛此言妙法之勝能也能救一切者能拔眾生生死之苦也能離苦惱煩惱苦因苦苦果也饒益眾生即充滿其願也此三乃標其勝能如清涼池下十二喻別顯勝能也此法華經下法合上喻總而言之能令眾生離一切苦惱病痛解一切生死之縛也眾生苦痛縛著皆由無明感結今佛知見一開智光現前能破無明則諸苦自滅所謂如暗得燈也若人得聞此法華經至所得功德亦復無量此言得聞妙法由有勝能故書寫者功德無邊供養功德無量也宿王華若有人聞至盡是女身後不復受此言若聞藥王一品亦得無量功德也易卦乾伸以乾為陽坤為陰故乾為男坤為女以乾剛坤柔也此法華經言佛性金剛種子堅固不壞故女人持經入佛知見亦永為般若真因佛性種子歷劫不磨所以不復更受女身也若如來滅後至亦復不為憍慢嫉妬諸垢所惱此言女人能如法修行所得利益以較男之更勝也西方極樂世界蓮華化生此佛說能念佛者即得往生今惡世女人能於此經所說修行即得往生者以入佛知見頓破無明頓斷煩惱以心清淨故佛土清淨是為淨土之因也然貪欲瞋恚愚癡憍慢嫉妬乃女人之所最重者今依經修行一旦頓斷不為所惱故身得清淨往生淨土冥矣言後五百歲佛滅度後初五百秊解脫堅固二五百秊禪定堅固三五百秊多聞堅固四五百歲福德堅固五五百秊鬪諍堅固今云後五百秊即鬬諍堅固之時女人於此難持之時持之所以得益最勝女人如此其男可知得菩薩神通無生法忍至成就如是功德智慧之力此猶約女人持經生淨土者而言功德也無生法忍登地乃得已證平等真如已破妄見故眼根清淨已轉七識根塵故見七百萬二千億那由他恒河沙等諸佛以諸佛法身應念現前故遙見共讚汝能於下至無有與汝等者皆諸佛讚辭也以非有為功德故不能焚漂以稱法界性故說不能盡也言破諸魔等者諸魔即五陰魔生死軍即死魔餘怨敵即煩惱魔言能破悉摧所謂與五陰魔煩惱魔死魔共戰有大功勳出三界破魔網故云能破能摧也以得諸佛之慧命故諸佛共護以超越世間故天人不如以得一乘佛慧故三乘之禪定不能與等以三乘未得佛慧故也故結之曰此菩薩成就如是功德智慧之力此借女人以讚故廣結其大益也若有人聞是藥王菩薩至所得功德如上所說上言能依全經修行此言但能隨喜藥王一品之利益也能隨喜讚善則舌根清淨故口出青蓮華香已悟色身即法身故毛孔中出栴檀之香而功德說不能盡也羅什滅後塔前湧青蓮華一枝啟塔視之華從舌根出是譯妙法華經之驗也是故宿王華至病即消滅不老不死此以一品囑累宿王意在持經以苦行為本也後五百歲閻浮提中魔強法弱之時非苦行不能廣宣此經非護持不能無障故囑宿王無令諸魔得其便也特囑宿王當以神力守護者以此經是閻浮提人病之良藥如天甘露故云病即消滅不老不死以正經佛付囑地涌之眾意在十方世界往返弘宣而且以藥王專在娑婆尚不愜心今以此品單付宿王囑在南閻浮提廣宣流布者況閻浮乃四洲之一耳其境甚狹其人甚惡佛何獨重於此耶然十方雖廣實佛本心以佛化娑婆彼三洲不生唯現閻浮乃身教之地人多㢡惡故獨囑之意顯閻浮提人與此經有緣故為良藥非此經不能攝化非苦行不能弘宣故獨以此品歸重也宿王華汝若見有受持是經至應當如是生恭敬心此囑宿王敬奉持經之人也青蓮華喻妙淨明心粖香喻微妙神通言持經者已具此經故以此散之以見其人不久坐道場破魔軍說法度人出生死海固當恭敬如佛想也說是藥王菩薩本事品時至語言陀羅尼此言聞品得益也以入佛知見深證實相故達一切眾生語言皆入法性故得陀羅尼總持法門也言藥王得現一切色身三昧則一切色皆是佛身今云語言陀羅尼則一切言音皆是法音以八地菩薩出真如定進至九地當法師位現身說法此在七地已具體而微故為後位勝進相也多寶如來於寶塔中至利益無量一切眾生此因說藥王本事苦行持經皆已妙契法身故多寶讚歎宿王華而問此事利益眾生故伸讚歎也多寶出現原為證明此經意在得人以續慧命故今讚歎藥王次乃復召妙音已得其人則終會不再見矣
