body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明南嶽沙門憨山釋德清述妙法蓮華經安樂行品第十四此品來意由寶塔品如來專求持經之人其初心得記之衆雖遵佛敕且懼娑婆人多弊惡不敢橫身皆直願往他方弘宣而藥王樂説敬順佛意誓以忍力持之此雖能行然強力忍詬非初心所能亦非持久之計故文殊特為啓請末世持經之方以教悟守之法故佛為説四安樂行意謂惡世諸難自我所招苟自有以處之則自然遠離諸難而不以為患四行具足乃得悟守之力方盡持經之妙故説髻珠之喻以顯第一之功故此品來也惟此四行品節向以行處近處深心大悲心四法釋之義雖有當臨文未便會通舊解以正身正語正意大悲心四法節文甚明故今從之然此四法以性戒為主亦若楞嚴由攝心為戒而入也爾時文殊師利法王子至於後惡世云何能説是經此文殊因上藥王樂説等諸菩薩敬順佛意發願於後世持經故特為新學菩薩請問持經之法欲令此等各具遠害之方不畏弊惡難事也佛告文殊師利至欲説是經當安住四法此世尊因文殊請遂説四安樂行以此弘經可以遠諸患難也四行者正身正語正意大悲然菩薩涉俗利生無過自利利他二行而已三業端正自利之實也大悲一行利他之功也若三業不正來難之端也無慈愍心則致害之由也安可以涉俗乎此如來垂訓守護家業之嘉範也二行以智為先導故文殊特請一者安住菩薩行處至是名菩薩摩訶薩行處此別説四法初正身行也前法師品教持經之法則曰入如來室著如來衣坐如來座如來室者大慈悲心是如來衣者忍辱心是如來座者諸法空是蓋言親近隨順之至也今此四法廣釋前義但行處近處有理事二行然必以忍辱為第一所謂著如來衣也故行處首言住忍辱地者究竟寂滅之地也忍有生忍無生忍寂滅忍生忍者謂強力忍詬而未能忘我我不忘安能消彼暴戾哉無生忍者謂橫逆之來但觀心本不生雖彼以惡加之而自心不生不為所動然不動雖安未能忘物故戒勿親近以防惡覺惡習乃為善入無生也寂滅忍者謂觀自他身心本自寂滅寂滅則心境雙忘了無對待全不見有毀辱之相故能柔和善順而不卒暴心亦不驚是所謂忍辱地乃入如來室也以彼已寂滅則無毀者亦無受者忍相亦無故曰又復於法無所行若有所行則彼我未忘非寂滅地矣所以不見有所行者以觀法如實相謂當體寂滅本自如如故不見有可行之忍亦不分別所忍之辱此平等不二能所兩忘心行處滅所謂法空為座理行之妙也是為行處云何名菩薩摩訶薩親近處至是名初親近處此言初親近處以戒定為本也專戒不親不可親之人恐引惡習多妨正行即楞嚴由三漸次入無生忍之意也不親近國王等防染富貴驕恣之習所以妨正念也不親諸外道防邪見之習妨正見也梵志出家邪見之人尼犍子在家邪見之人言不親世俗文筆等乃妄言綺語雜論妨正思惟也言路伽耶陀者師破弟子之惡論逆路伽耶陀弟子破師之惡論不親謂妨正知見也言不親凶險相扠相撲等者謂防顛倒散亂之習也那羅延此云力旃陀羅此云嚴幟謂以惡自嚴如標幟此妨寂靜行也畜豬羊等惡律儀防殺盜之習也來者則為説法以消惡念所謂大慈悲心也不親求聲聞等者防小乘狹劣之習也楞伽經云應捨外道小乘惡見議論當親近最勝知識言不問訊至不共住止者防漸染之習也來時則為説法化彼狹習令入大道所謂入如來室也不親女人等者防淫習也不近不男之人言非法器防猥媟邪僻之習也不獨入他家防譏嫌邪染恐失正念也為女人説法不露齒笑乃至為法猶不親厚防引淫機破壞戒心也不畜年少弟子等者恐妨安樂行也觀此近處即根本戒品所謂執身不行執心不起其三千威儀八萬細行通不出此楞嚴經云因戒生定因定發慧常好坐禪則定依戒立也是名初親近處猶屬事行復次菩薩摩訶薩至是名菩薩摩訶薩第二親近處此第二近處以觀照為體前戒不親近諸惡律儀深防染習執心不起乃無生忍此觀一切法空乃寂滅忍正所謂諸法空為座也謂觀一切諸法當體空寂稱真實相了無一法可得不見有顛倒動轉生滅動亂之相也以觀諸法本自寂靜故不生不滅了無動轉當體如如故心境如空本無所有若心境寂滅則一切寂滅故言語道斷如是則無毀我者亦無受者以絶對待故無生出起滅之相故曰無名無相一切皆無則心言路絶故無量無邊無礙無障也以觀諸法雖寂而非斷滅故但以因緣假合而有一切皆從顛倒妄想而生故有言説耳此乃安心寂滅之境所謂住忍辱地故曰常樂觀如是法相是名第二親近處惡世持經妙行無出此矣雖云正身其實三業寂靜總該萬行涉俗利生無尚此矣爾時世尊欲重宣此義而説偈言若有菩薩於後惡世至以此二處能安樂説若有菩薩下至能安樂説六十句通頌行處近處也初六句總標常離國王下六句頌不近國王凶戲惡律儀外道四事亦不親近下二十句頌不近求小乘等寡女下四句頌不近婦女不男等亦莫親近下十二句頌不近殺盜淫三事莫獨下八句頌不為女人説法乞食將一比丘所謂上座阿闍黎防誤失也阿難無此故誤墮耳一心念佛所謂心清淨也是則下四句總結二處事行又復不行上中下法至能於後世説法華經又復不行下三十二句通頌二處理行初十句頌於法無所行等謂其心寂止不起分別也言不得諸法謂無一法可當情故若不知不見也此頌行處理行一切諸法下二十二句頌近處理行空無所有等頌觀一切法空無所有如實相等以心言路絶故其心安住不動也觀一切下頌觀一切法如虗空義以諸法如空故常住一相若有比丘下六句結頌二處釋上能安樂説以心無怯弱故安樂耳菩薩有時下十二句頌無怯弱之所以謂菩薩時入禪定隨義觀法言如理觀察得諸法正性以從定起説經所以心安無怯也文殊師利下五句結頌正身行也又文殊師利如來滅後至而為解説令得一切種智此正語行也應住安樂行者即上二處如理觀察無分別心然後稱理而説故無口過也不説經典過以達諸法實相乃佛隨宜所説故不言其法有過過者謂偏空跛驢智慧等也不慢餘師以無人我相故不言人之過也於聲聞人不稱名説過以如理而觀不見他人有過失也不稱名讚歎恐不見稱者銜恨也不生怨嫌之心以不見有毀我者也諸有問者但以大乘法答令得種智此大慈悲心也如此可謂善修安樂行矣爾時世尊欲重宣此義而説偈言菩薩常樂安隱説法至算數譬喻説不能盡此頌正語行也菩薩常樂下三十六句通頌正語行初十句安隱説法言內外俱淨也安隱內淨其心也淨地油塗澡浴淨衣外淨也香油塗身乃蘇合油西域以此塗身取其香而潔也安處法座所謂法空為座則內外俱空矣隨問為説言不逆其意也若有比丘下二十六句頌説法之儀式也四衆國王等求法之人也以微妙義謂但説大乘實相之法也和顏則樂説隨義而答應機而説也皆使發心等謂大慈悲也除懶惰懈怠則勇猛精進以法自娛故離諸憂惱晝夜常説則精進之至咸令歡喜所謂示教利喜也衣服臥具下十句頌清淨説法不希利養也願成佛道則以法為供所謂諸供養中法供養最謂以法為樂則自受安樂供養故無外慕耳我滅度後下十二句頌廣前品忍行以心主於忍故口無語過所以能遠諸害也蓋言諸難皆從自心不忍而致以安住於忍所謂兵無所容其刃以無死地故一切皆無矣智者如是下八句結頌正語行也謂菩薩善修其心能住安樂則自無諸難法利益廣受化益多故功德無窮説不能盡也又文殊師利至供養經卷恭敬尊重讚歎此正意行也意根諸惡煩惱三毒為最嫉妬嗔也諂媚於上誑惑於衆貪與癡也輕罵學佛道者求其長短恐其勝己三毒發業也以末法惡世三毒熾盛之時持經之人本為化彼強暴爾乃自以三毒逆之所謂以火益火名曰溢多安可以為善故戒持經自淨其心與法相應也若比丘等謂四衆有求三乘之道者毋矜己為大乘學者而惱亂彼人令其疑悔返失本行也當以慈悲調伏攝化漸進可也語其人言下惱亂之語也既不能調攝而以逆言加之譏其所學去道甚遠不得種智又責其放逸此言是而心非故觸動彼心多生誹謗是自致之也戲論諸法謂分別大小乘法空有偏圓致起諍競是皆發於三毒意根未淨所以不能住安樂行也當於一切衆生下正教持經之法當以慈悲為首也衆生迷倒悲愍之心如一子地當想如來之慈如父之等愛一子則無厭倦之心矣菩薩乃善學佛行專於利生之人當如師保之想以法其行故於十方菩薩常應深心恭敬禮拜也於一切衆生下教以持經調攝之行也平等説法則不以貴賤智愚高下其心謂以平等大悲而説也順法謂離四謗以有是增益謗無是損減謗亦無亦有相違謗非有非無戲論謗以稱法性而説則離此諸過故云不多不少深愛法者不為多説如慈母之養嬰兒不多與兒酥恐食不消返生毒也末世持經能住此行則無能惱亂之人所謂善修其心也如此則得明同學得衆來聽使法利漸廣六種之功德自備此實持經之妙行也有人如此孰不樂從其化豈有怨害之事哉是所謂真安樂行矣爾時世尊欲重宣此義而説偈言若欲説是經當捨嫉恚慢至無量衆所敬此若欲下四句頌初節質直行謂直心正念真如法故則意根三毒等煩惱自捨矣不輕蔑下四句頌第二節輕蔑眇忽之義正長行譏其去道甚遠謂輕忽之也是佛子下十二句頌第三節然通以忍為主也故曰常柔和能忍想佛如父敬菩薩如師所以破自己憍慢之心故説法自無障礙耳第三法下結頌又文殊師利至説是法時無有過失此大慈悲行也前三行即著如來衣坐如來座此一行所謂入如來室也前法師品但教菩薩法略舉要行今此品則廣釋前義耳然慈能與樂悲能拔苦在家出家有能信受此法者則增益其法樂故生大慈心非菩薩乃不信闡提之人當愍其愚迷而調伏誘引令生正信以拔其苦故生大悲心應作是念下出其悲愍之意於不信之人愍其大失所以失者於如來隨宜所説之妙法一向不聞故不知不覺且執愚自是故不問以不聞故不信不解彼既顓愚如此我終不棄當成佛時隨在何地必欲以神通智慧引之令得住是法中使其正因不失終有成佛之分此大慈悲之至也末世持經具如是四行説法乃能離諸過失以妙契佛心所謂行如來事也常為比丘比丘尼至何況得見受持讀誦此通結四行之勝益也言持經之人具此四行則為四衆國王等之所供養尊重讚歎況有毀謗之辱乎虗空諸天常隨守護豈有魔撓之事乎若處無人之境儻有生心難問者以諸天衛護神力使聽者歡喜安有惱害所加乎前云我遣諸天龍神常為守護以此經一切三世諸佛神力所護是知諸天晝夜常守者乃如來所遣也以行契佛行故諸佛護念如此也以此妙法華經無量國中名字尚不得聞何況得見受持讀誦以法之難遇故持經者固當慎重是諸佛之慧命人天之眼目故不得不護念若不聞不信豈非大失耶文殊師利譬如強力轉輪聖王至必大驚怪此設輪王髻珠之喻以況此經不妄與人也佛王三界稱曰大雄以能破諸有故強力輪王威伏諸國譬力破諸有也小王不順命譬五陰煩惱生死諸魔背覺合塵不順覺性也如來出世為一大事特為攝伏諸魔故現身説法始從鹿苑説有破凡夫執生死之苦次説般若談空破二乘厭有之見次説深密和會空有破二乘之偏執次説楞伽直指識藏即如來藏頓見佛性破二乘之權行是則四十年中所説諸經以無量無數種種方便以破三乘之執情故云起種種兵而往討伐討謂聲其罪伐謂破其國乃彈呵二乘破涅槃城也然三乘聞法各有所證故譬兵衆有功論功賞賜也田地以至奴婢人民等皆三乘果位功德利用之事也獨王髻中明珠不與譬不即為説此法華經也所以不説者恐衆驚疑故不輕説如髻珠不敢輕賜也文殊師利如來亦復如是至乃與汝等而敷演之此法合也如來亦復如是合首節其有功者下合次節如轉輪王下重牒其喻明獨髻珠不與如來亦復如是下重合次節明諸經皆説獨不説法華者以難信故先所未説而今説之是為希有難信之法如輪王解髻珠以賜非上功者不能居也故云此經是諸如來第一之説故末後乃與正如髻珠以待大功也此法華經諸佛如來祕密之藏結顯佛於生死長夜守護四十餘年以待機也爾時世尊欲重宣此義而説偈言常行忍辱哀愍一切至智慧光明如日之照此常行忍辱下四句通頌忍行為本後末世下十二句頌慈悲行令住其中謂令安住寂滅法中也譬如強力下十六句頌譬喻如來亦爾下二十句頌法合法王以忍辱大力而説法故持經妙行必以忍辱為最勝也此經為尊下六句頌此經尊上我滅度後下六句頌結答問意讀是經者下十四句頌持經者能離障遠害也遊行無畏下四句頌持經之人無畏光明者以心與法一故正大無畏若此也若於夢中但見妙事至深入禪定見十方佛諸佛身金色至後當入涅槃如煙盡燈滅此頌持經之勝益也若於夢中常見妙事者以持經之人心與理冥習消垢淨如水清月現故妙境現前此勝益之應也見諸如來等十六句頌夢中妙事見佛為衆説法又見龍神聽自説法又見佛放光説法佛為四衆下十二句又見佛説法自身處會聞法得總持證不退具足因行佛知其心故為授記汝善男子下八句言授記之事又見自身下十句言得記之後見自身在山修行證實相得禪定定中又見佛金色莊嚴之身見己從佛聞法轉為人説又夢作國王下十六句言夢作國王捨其國位往詣道場求道七日遂得佛智成無上道乃至説法千萬億劫度諸衆生化緣既畢當入涅槃此一夢之中始終見佛聞法悟道蒙佛授記及授記後又夢見捨國位求菩提乃至一生成佛終至入於涅槃且經千萬億劫之久而歷歷事皆如前白毫光中所現諸佛始終一大事因緣者蓋未曾開佛知見則佛以光相示其成佛始終不離現前一念令其了然明見今聞妙法既已開佛知見因持經之益則自見成佛始終即億劫長久只在當人一念不離剎那際令其自信不疑也然此約夢説所謂生死涅槃猶如昨夢意令持經之人四行成就當觀諸法如夢中事空無所有了不可得此深證實相三昧者之勝益也奇哉奇哉夢中見佛聞法悟道又夢入定定中説法利人乃至捨位求道至成佛度生及入涅槃經無量劫之久是雖夢事豈常情可測識哉華嚴古今一際延促同時具見於此以三百餘言敘無盡之事非佛妙辨何能若此若後惡世中説是第一法是人得大利如上諸功德此頌結四行之勝益也妙法蓮華經從地涌出品第十五此品來意以顯自心發悟恆沙性德現前乃盡持經之妙行也由前得記聲聞雖願持經自力不充難入生死險道要假他力所以佛令菩薩調護於心有所未安今從他方來有八恆河沙數菩薩各願守護持此經者世尊止而不許者何也以從外來故宗門所謂從門入者不是家珍向自己胸中流出方始蓋天蓋地故云我自有六萬恆河沙衆從地涌出體用雙彰故眷屬同等以此性德持經方能妙契法身故詣虗空向二世尊至此則生滅見謝延促同時故五十小劫謂如半日以此稱性成行故四上首皆以行名意顯如此持經方稱如來本懷蓋由安樂四行成就所致也以性德現前殊非心識分別可知故彌勒與八千恆河沙衆皆生疑心乃云不識一人故與諸佛侍者同時請問也此非小緣故先勉以被精進鎧發堅固意乃可信受而如來自言今欲顯發宣示諸佛智慧自在神通之力師子奮迅之力威猛大勢之力諸佛本懷盡在於此豈細事哉然世尊告以此諸大衆皆是如來成道已來初令發心所教化者故彌勒大衆皆起疑心以眼見世尊成道四十年來所教化者盡在靈山一會而此地涌之衆昔所未見也且我等向蒙佛教今尚如此劣解而此大衆皆久植德本深種善根者何以少時化此多衆故説父少子老之喻以述疑情此從從地湧出以顯迹妙如來壽量特顯本妙以袪二乘執迹之見以明法身常住不屬生滅故此品連壽量次第而來也爾時他方國土諸來菩薩至護持讀誦廣説此經此他方菩薩願在娑婆持此經典佛止而不許者佛意欲持此經須在性德自足不假於外將顯本迹微妙以彰法身常住不屬生滅去來也故云不須汝等我自有六萬恆河沙等眷屬護持廣説此經也菩薩之數皆以六萬言者意表六識成智則恆沙性德當下現前所謂自性宗通妙用無極若寄他六識則落名言分別非持經之妙故他不足恃也佛説是時娑婆世界至所説音聲從下發來此應佛所言自有六萬恆沙之衆同時從地涌現其前也言三千國土地皆振裂而涌出者謂地本一真法界向以無明感結故性德隱而不顯今佛法音一至則頓破無明而自性全彰妙悟自心故恆沙性德總在心源妙用無邊如是則可持經非他分別名言者比故不須他方者此也菩薩皆具佛相者以德用無二也以是本覺妙明心體故身皆金色無量光明也世界依法性空故在此世界下方虗空中住也以始覺有功本覺乃顯故聞佛音聲從下發來意顯音聞為教體也一一菩薩皆是大衆唱導之首至所不能知此言諸來菩薩各將眷屬多寡之不一也謂所將者有齊沙數漸少至姟數有姟數漸少至單己而單己無眷屬者又過恆沙數之多意顯數量無窮且伴主之不同體用之不等也是諸菩薩從地出已至百千萬億國土虗空此言涌出之衆見佛之儀也言各詣虗空向二世尊者謂入法界空妙契法身也種種讚法而讚於佛如是時間經五十小劫大衆謂如半日者言深證實相入法界性則延促同時大經云一念普觀無量劫無去無來亦無住所謂十世古今始終不離當念了無延促之相也四衆以佛神力見諸菩薩遍滿虗空者所謂無邊剎境自他不隔於毫端以法界性空無作妙力非三乘可見故假佛神力乃見也是菩薩衆中有四導師至不令世尊生疲勞耶爾時四大菩薩而説偈言世尊安樂少病少惱至不令世尊生疲勞耶此言來衆上首問訊世尊者親近隨順覺性之象持經以妙行為首故皆名行也問訊之辭言病惱疲勞者以見釋尊示現與民同患且徵娑婆弊惡難可教化也爾時世尊於菩薩大衆中至得聞是經入於佛慧此如來答衆問訊之辭正顯本之妙也言此衆生世世受化則法緣已熟供養多佛則集福已厚此證大通往昔之緣因故今一見佛聞法即入佛慧是指上根利智之菩薩也除先修習小乘者今因聞此經亦令入佛慧是知佛化衆生端在有緣凡今不信弊惡之人未下緣種故今重在持經為結將來之緣所以如來汲汲求人然所求之人須是妙契佛心深體佛行乃能忍可奈緣所以難得其人耳爾時諸大菩薩而説偈言善哉善哉大雄世尊至聞已信行我等隨喜於時世尊讚歎上首至能於如來發隨喜心此來衆聞説化衆易度故亦各發心故云我等隨喜世尊讚衆有隨喜心善其法有託也爾時彌勒菩薩至合掌向佛以偈問曰此彌勒因衆騰疑致問來衆之因緣也言八千生疑者顯八識未破之象也謂此性德妙用殊非識心分別可知故皆生疑故云不見不聞也彌勒乃唯識宗師知衆心念故為衆請決所疑以偈問也無量千萬億大衆諸菩薩至以何因緣集此問大衆來集之因緣也巨身大神通智慧叵思議至為從何所來此見來衆表裏異常不知從何所來也一一諸菩薩所將諸眷屬至其數轉過上此問來衆主伴多少不一也將六萬恆沙至億萬分之一乃敘所將之伴將少者反過於將多者也先約沙數而問千萬那由他此約姟數而問由將姟數以至單己漸少者反多於將多者譯文最巧思之乃見但觀結句其數過上則挨次而下漸多於上也如是諸大衆若人行籌數至修習何佛道此詳問來衆誰所教化也以從地涌出則非常所見且在下方空中而住又非可見故生疑也以見此多衆威儀智慧各各殊勝意非一佛一時所化故詳問誰為説法教化從誰發心稱何法持何經修習何佛道乃能如是之挺特也即此數問發起壽量之説也如是諸菩薩神通大智力至惟願決衆疑此問雖見從地涌出而竟不知從何乃自地下而來也故問所從來國土之名古德云渠無國土何處逢渠故云所遊諸國未曾見是衆也今此大衆欲知此衆之因緣故願世尊決疑也爾時釋迦牟尼分身諸佛至汝等自當因是得聞此隨分身佛之弟子各白本佛亦疑而問也爾時釋迦牟尼佛至諸佛威猛大勢之力此釋尊許答先勉衆精進者以其事之難信也彌勒號阿逸多云無能勝大事者謂諸佛智慧神通奮迅威猛及顯化地涌多衆之因緣皆大事也今將宣示非精進者不能領故勉之也諸佛智慧前云甚深無量但略拈示之耳一往開示即今言至久遠成佛教化多衆及下壽量等事皆廣顯佛智甚深無量也諸佛自在神通之力者如前三變淨土接衆在空以指開塔及後云舌至梵天謦咳彈指聲震大千等皆自在神通之力也諸佛師子奮迅之力者師子凡奮迅作舞不遺餘力如一音普説分身齊集説壽量之本皆直示法身全體無有剩法故如師子奮迅也諸佛威猛大勢之力者謂化地涌之多衆拔三乘之堅疊降五陰煩惱之衆魔皆威猛大勢之力也此四句佛自述本具之能事推之諸佛顯道同也佛之全體大用一向祕而未發今因地涌之衆方談壽量功德等事是皆難信故勉其被精進鎧可信受而不驚疑也告彌勒補處者欲為當來法式故也爾時世尊欲重宣此義而説偈言當精進一心我欲説此事至汝等一心聽此頌許説勉聽也此事乃智慧神通等四事以非尋常故難信易疑四事總屬佛之智慧故云佛智叵思議若信無力則信不及矣忍善中謂住無生忍中乃可信而不疑也今所説者是佛智慧不可思量第一甚深不可分別之法而今説之故再三安慰勿疑勉其信力善聽也爾時世尊説此偈已至一心精進求無上慧此佛答彌勒所問也言此地涌之衆皆是我於娑婆世界成佛已來之所教化此答誰為説法教化成就從誰發心也此界虗空中住言不離當下答所從來國也於諸經典讀誦通利正憶念者答受持行誰經言諸經皆通不止一經謂一切法皆是佛法也不樂在衆等者答修習何佛道言皆從止觀而入佛慧也常樂靜處亦不依止人天而住修習止也古德云我不從人天來論云修習止者不依形色身心世界等一切皆離故也常樂深智等修習觀也觀照分明則法法實相意謂一切菩薩凡求佛道未有不由止觀而入者下方空中正示止觀之象顯非止觀不足以破恆沙住地煩惱即從地涌出者此也爾時世尊欲重宣此義而説偈言阿逸汝當知至我從久遠來教化是等衆此頌答意也首六句頌答誰為教化從誰發心此等是我子下八句頌答受持誰經修習何道此言止也晝夜常精進下六句頌答所從來國亦言觀也以為求佛道故住空中勤求智慧故説種種妙法言已入佛慧心無所畏言二嚴已具此二句頌其德也我於伽耶城下八句頌本末因緣伽耶成道言雖近迹教化成道意指遠因故彌勒從此起疑説父少子老之喻以發起壽量之談以顯本也我今説實語下四句結答問意既云令初發心又言久遠教化以成佛事近而又言遠是事難信故以實語叮嚀意在勿疑必信此必有由也故大衆生疑爾時彌勒菩薩摩訶薩至如此之事世所難信此言衆生疑也意謂世尊成道未久如何教化如是多衆各各令住菩提此迹近而指遠故可疑也但衆作念而彌勒言請謂見如來為太子時出家成道至今方四十餘年其時甚少此執近迹也云何少時而化多衆當成菩提其指甚遠固可疑也況此諸菩薩皆久植德本非少時之可成就此事世所難信也譬如有人色美髮黑年二十五至是事難信此設喻以況少時不能教化多衆之疑也年二十五言甚少百歲言甚老少喻釋尊老喻地涌多衆相違之甚故舉世所疑佛亦如是得道已來至乃能作此大功德事此法合也得道未久合父少而此大衆至甚為希有合子老今日世尊作此大功德事合相違言此菩薩善入出住無量三昧且此大衆未見作為而彌勒乃言其各得三昧如此妙用自在者又非不知也故下自言信佛所説我等雖復信佛隨宜所説至聞此事已亦不生疑此為後世請決疑也彌勒自陳從佛既久信佛所説然佛所知者皆悉通達則無所不知而信知此事決無疑矣但恐新學菩薩智淺心粗及佛滅後聞而不信則取破法之罪故願佛説破所以懇請若如來不以壽量答之則長夜之疑難決矣故地涌之衆實發壽量之本也爾時彌勒菩薩欲重宣此義而説偈言佛昔從釋種至教化令發心而住不退地此頌敘疑也佛昔從釋種至如實分別説二十句敘執近疑久故此起問如蓮華在水讚地涌之德也譬如少壯人下八句頌設喻世尊亦如是下十六句頌衆老成之德我等從佛聞下十二句頌為後世啓請決疑也妙法蓮華經如來壽量品第十六此品來意由前地涌之衆彌勒騰疑故世尊説自壽量以顯本迹之妙竭盡本懷以破二乘生滅之見以顯法身常住隨緣普應隱顯無礙以明如來智慧甚深無量方便利生其智慧門難解難入之意也然諸修行人不透法身終非真悟絲毫情念未忘盡屬衆生知見非佛知見也前寶塔品遠假多寶如來啓法身境界而諸大衆雖信多寶不信釋迦同是一身一智慧力以諸聲聞昔所見者但知鹿苑説法之佛以為真佛更不知有向上事又聞將欲入滅重起生滅之見雖蒙授記但信佛語未見佛心此則終難取菩提之果以悟非真悟則修亦非真修而如來出世本懷畢竟未盡故前多方開示猶屬依他到此如來極盡神力披露本懷明示法身全體故説自壽量無窮以醫師喻明滅而不滅欲諸聲聞直須悟此法身常住是乃可為真因故因答涌出此品來也然顯理已圓故下但分別功德意在隨順而悟得也爾時佛告諸菩薩至惟願説之我等當信受佛語此世尊因前地涌之衆彌勒騰疑啓請故説此品以答之未説之先再三叮嚀當信如來誠諦之語者以壽量之事難信難解所謂諸佛智慧甚深無量今若説之恐聞者視為荒唐謬悠之談儻生疑不信則返罪戾故苦口告誡而後説也彌勒大衆三白當信受佛語唯願説之請法之心篤切之至也爾時世尊知諸菩薩三請不止至祕密神通之力此正答衆問言三請不止者此正發揮方便品初如來出定自言諸佛智慧甚深無量其智慧門難解難入之二語前佛自歎而不説因身子三請三止而後説者前因引二乘漸入佛慧將欲開佛知見故身子為當機也今説壽量乃廣明前意而因彌勒以請者以前三周方便開示已説其智慧門故為二乘授記然諸得記者其實未悟法身實際故因地涌而説壽量將為新記菩薩悟此法身以為真因必得佛果故因彌勒一生補處大士而請也觀後分別功德則知悟此本法方為真悟可以入佛知見也然佛出世為大事因緣單為衆生開示佛之智慧乃法身真體令其悟入是故最初出定即特告之但標示之而已種種開示直至寶塔品方分明顯示佛之智慧猶假多寶示其同體而已未自親説本分事也今則直示本有壽量所謂八字打開通身吐露方為竭盡本懷以此事四十年來久默斯要不務速説即今開顯未敢遽説猶費三周種種方便而今乃説者斯皆如來祕密神通之力也是知如來出世一番至今法華全經單為説破諸佛智慧甚深無量其智慧門難解難入二語而已觀者豈易見哉一切世間天人及阿修羅至百千萬億那由他劫此答一語破盡人天三乘之疑以見迹而不見本故也所謂達本情亡知心體合知本是為真知見力也譬如五百千萬億那由他至那由他阿僧祇劫此説壽量長遠難思故以地種塵墨以取世界微塵之數也前因緣周中引釋尊於大通智勝佛前為王子時説法華經結一乘之緣將明遠因以一三千大千世界為地種磨以為墨今以五百千萬億那由他阿僧祇三千大千世界為地種盡以為塵而塵又細於墨點盡此微塵則地種已不勝其多矣前云乃過東方千國土乃下一點今則過東方五百千萬億那由他阿僧祇國乃下一塵則不著塵之國又不勝其多矣是此微塵之數已非算數所知心力所及矣則三乘學人與不退菩薩皆所不達矣況諸世界著塵不著塵者總以為塵一塵一劫豈可得而思議耶是知大通猶約多迹而言耳故方便品歷言身子三乘及不退諸菩薩滿三千界如稻麻竹葦之多人合其智力而不知諸佛智慧者義見於此矣自從是來我常在此娑婆世界至導利衆生此言成佛壽量如上塵劫之遠且多也且云自從是來常在娑婆世界説法教化又在他方導利衆生此其所以難信難解故二乘人天聞之無怪其皆驚疑也此直示常住法身本無生滅依報世界同一寂光所謂有佛無佛性相常住故知諸佛本不涅槃衆生原無死生是為平等法界實相妙法畢露於此矣是豈三乘劣解可能信解耶故必開佛知見乃盡知盡見正唯謂佛與佛乃能究盡諸法實相者此也直欲三乘行人知此見此方名悟佛知見耳諸善男子於是中間至如是皆以方便分別此答伏難之文也上言成佛久遠乃説諸佛智慧甚深無量此言授記涅槃皆是方便乃説其智慧門以方便之權特為顯實所以難解難入也諸善男子若有衆生至能令衆生發歡喜心此言法身湛然常住而現身利生應化之迹但隨機有利鈍故説名字不同如華嚴名號品壽命長短如阿僧祇品法有頓漸如四聖諦品皆隨緣之用非本法也諸善男子如來見諸衆生至令入佛道作如是説此言迹近本久其所施設皆方便耳諸善男子如來所演經典至諸所言説皆實不虗此言所説之法或自或他如燈明大通多寶等事皆是一身一智慧示現之事皆是實事所言非虗以衆生智淺故生疑不信起異見耳所以者何如來如實知見至所作佛事未曾暫廢此釋皆實不虗之意以顯諸法實相常住也如實知見三界之相等者所謂諸法如是相性體力本末究竟等也以如來明見三界之相本無生死出沒生滅虗實如異等相所謂一相一味之法離相滅相究竟常寂滅相也以三界衆生迷此本法故妄見有生滅差別等相以如來明見一際平等無有錯謬所謂佛知見也故云不如三界見於三界今為衆生開佛知見直欲知此見此三界之相如是而已故前云如是妙法者此也是所謂諸佛智慧甚深無量只以衆生根性不同有種種性欲憶想分別故應機施設以若干因緣譬喻種種説法所作者皆佛事也是所謂其智慧門難解難入也如是我成佛已來甚大久遠至常住不滅此結示法身常住不滅也諸善男子我本行菩薩道至以是方便教化衆生此言唱滅以明權也前以塵劫所喻之壽命乃明法身久遠常住不滅此言本行菩薩道時所成未盡壽命復倍上數者是所謂法身向上事也如此而唱滅者方便應機之權迹耳所以者何若佛久住至是故如來以方便説此釋唱滅之所以也若佛久住於世則薄德等人不起難遭之想不生恭敬之心為是等故所以唱滅耳以權迹示現實在而言滅所以難信比丘當知諸佛出世至為度衆生皆實不虗此言如來真實不滅而言滅者欲令衆生發難遭想懷戀慕心使種善根所以不實滅而言滅也此權示滅諸佛利生法皆如此總是為度衆生故權即是實故云皆實不虗譬如良醫智慧聰達至若十二十乃至百數此設醫師之喻以喻如來實在言滅以釋為度衆生之意醫師喻佛醫方喻教妙藥喻理衆病藥性種種喻對治衆生種種性欲之病所謂佛説一切法為治一切心若無一切心何用一切法諸子至百言三界衆生一十二十者指由人天而至十類也以有事緣遠至餘國至藥發悶亂宛轉於地此喻佛化緣畢故隱身不現又現他方是為舊醫前佛既滅三界衆生親習外道小乘故如飲他毒藥宛轉於地喻以苦捨苦輪回六趣也是時其父還來歸家至速除苦惱無復衆患此喻如來觀見三界衆苦所逼故現出世是謂新醫然云其父還來言無二父也衆生在迷去佛甚遠故云遙見知名識字故云皆大歡喜發心造修故云拜跪問訊已知煩惱苦本生死苦患願求出離故云我等愚癡誤服毒藥願見救療返妄歸真故云更賜壽命佛遵諸佛法式應機教化將一乘法分別説三故云依諸經方求好藥草等萬行具足故云色香美味諸所説法皆是一相一味之法故云具足搗篩和合以此權巧方便救度故云汝等可服斷惑證真故云速除苦惱無復衆患其諸子中不失心者至於此好色香藥而謂不美此喻受化難易也見藥即服者所謂上根利智遇即信受受化易也言見父雖喜亦求治病而不肯服藥者喻二乘人雖親佛法而不肯取菩提也以習障深厚故云毒氣深入父作是念此子可愍至遣使還告汝父已死此喻將唱滅説此經也此子可愍等喻二乘執權不捨不求大乘故云而不肯服良藥留在喻説此經告父已死喻唱入涅槃實往他國而言已死喻其實不滅而示現滅度也是時諸子聞父背喪至尋便來歸咸使見之此喻受持此經即得開悟佛知見也故云尋便來歸咸使見之所謂我處靈鷲山常在而不滅也此彰法身常住隨機有隱顯耳諸善男子於意云何至不也世尊此審虗妄顯佛語真實總結上喻佛言我亦如是成佛已來至如法説我虗妄過者此言佛真法身常住不滅但隨機感權示滅度故云以方便力等爾時世尊欲重宣此義而説偈言自我得佛來所經諸劫數至爾來無量劫此通頌法身常住隨機隱顯也自我得佛八句頌成佛久遠常住不滅為度衆生故方便現涅槃而實不滅度常住此説法此頌滅而不滅以滅乃權見非實滅也我常住於此諸神通力至現有滅不滅此頌釋滅而不滅之意也其實法身常住而言滅者乃以神通力令顛倒衆生雖近而不見將謂我滅耳衆見我滅度下十四句釋不滅之所以若衆因見我滅咸供舍利而起戀慕渴仰之心欲求見佛乃至不惜身命則苦求之至時則我與衆僧於靈鷲山俱時出現而語衆生言我常在此是謂善權故曰以方便力現滅不滅非真滅也餘國有衆生恭敬信樂者至但謂我滅度此頌法身普應隨機隱顯所謂水清月現感應道交原非有心彼此也我見諸衆生沒在於苦惱至乃出為説法此頌隱顯隨機之意機怠則隱機感則出是知隱顯在機不在佛也神通力如是於阿僧祇劫常在靈鷲山及餘諸住處此頌顯法身常住無論此界他方常在不滅之意衆生見劫盡大火所燒時至散佛及大衆此頌三災壞劫而此土安隱是法身所居寂光性土及實報莊嚴土也言佛常在靈山不滅則此娑婆雖經三災壞而不壞是知此穢土即是實報莊嚴不待三變為淨土耳以衆生垢重無明所見故穢惡充滿佛眼觀之則真空冥寂微妙莊嚴故前三變淨土特示衆生佛知見耳園林等皆實報莊嚴之事即此娑婆便是實報豈常情所見乎我淨土不毀而衆見燒盡憂怖諸苦惱如是悉充滿此頌淨土其實不毀而衆生見燒盡者乃別業妄見惡業所召耳是諸罪衆生以惡業因緣至為説佛難值此十二句頌淨穢隨機隱顯非佛隨感而應無定相也我智力如是慧光照無量至佛語實不虗此頌總結法身常住本無隱顯勸衆當信也梵語毗盧遮那此云光明遍照以法身智慧光照無量故壽亦無量如醫善方便為治狂子故實在而言死無能説虗妄此頌喻也我亦為世父救諸苦患者至墮於惡道中此頌法合以凡夫顛倒故實在言滅所以示滅者惟恐常見我而生憍恣為是等故乃示滅耳是知佛若隱若顯皆為度生無虗日也我常知衆生行道不行道至速成就佛身此頌施權之所以也所謂曲隨機宜方便説法總之無非為令衆生速得成就佛慧耳妙法蓮華經分別功德品第十七此品來意由聞佛説壽量長遠已悟法身常住兼見三變淨土之境已了三界唯心此乃妙悟為深信解以為真因可契如來常住真果以此持經方為妙行以法身常住世間淨土不離當處故勉能作如是觀者是為深信解相矣故此分別功德不可思議到此生滅情亡淨穢見泯妙悟已極方為真持經者故此品來也天台判五種法師屬觀行位是知持經意在妙悟非文字也故能超越一切有為功德爾時大會聞佛説壽命劫數長遠至得大饒益此經家敘致法會大衆聞説壽量得大饒益也於時世尊告彌勒至當得阿耨多羅三藐三菩提此如來正示聞説壽量得大饒益之人也而所敘得益之人義有淺深次第即分別悟入淺深得果因之有先後耳無生忍者乃由前修安樂行初住忍辱地今聞壽量法身常住了無生滅得忍行成就以無生法忍可於心故如是恆沙衆生得無生忍也楞嚴經云由三漸次得無生忍義當觀行成就即頓悟無生以入信位今經因修四安樂行以忍為主初由生忍以至無生如觀音耳根動靜不生聞所聞盡是亦由觀照了悟無生義當信位也以信屬外凡故標舉衆生聞持陀羅尼者陀羅尼此云總持謂總一切法持無量義今云聞持者因聞壽量了悟法身安住實相持而不失義當十住住持真理以圓悟圓持不歷次第故云總持謂圓悟法身總該十位圓成一心故曰聞持陀羅尼得樂説無礙辨才者義當十行以十住圓悟實相真空但住空理今從空出假涉俗利生故為十行然樂説無礙正説法利生之行以一行圓成一切行故得無量旋陀羅尼者旋猶漩水之急流漩澓處也此義當十回向由前空假二行攝歸中道回向三處圓成一心以念念空假即念念中道如水之急流有漩謂心心攝入中道第一義諦也能轉不退法輪者義當初地謂一登地得大歡喜永不退轉故能轉清淨法輪者義當二地以離一分無明破戒之垢故云清淨皆云能轉法輪者以隨悟隨行故此經義悟即是行故八生已下歷次乃至一生當得菩提者由三地歷次以至十地一生補處當成佛果也其所約位由淺至深故衆生極多而菩薩由多漸少初從世界微塵之數減至一四天下微塵數者以理愈深位彌高故其人漸少此見根之利鈍不一也問曰此經純談實相直悟法身頓登佛果不説行位漸次階級今乃約位釋之無乃謬解佛意乎答曰理固然也華嚴乃一乘圓頓法門其所説四十二位皆以信為根本故曰初發心時即得菩提是以法界一念因心即該果海故曰因該果海果徹因源是始終地位總在因心此乃無漸次之漸次也楞嚴所説位次乃曰由三增進成就五十五位是依四根本戒圓滿一心攝入三觀故從三漸次悟無生忍是則五十五位皆依一心三觀但就斷惑淺深以約位次雖列諸位總在一心此亦無漸次之漸次也今經依四安樂行以盡持經之妙由聞壽量妙悟法身正與楞嚴由三漸次悟無生忍義同但彼經所宗一心三觀此經所宗實相為衆生正因佛性意借緣因悟入即名為佛故不説修斷行位漸次只以悟佛知見為本今既由四行妙悟法身徑登佛地乃今較量功德猶約諸位次釋之者以約緣因佛性以緣有淺深故悟有近遠但以悟而言不説斷無明以分位也此經純談實相所謂無明實性即佛性故無煩惱可斷是約位以驗悟非實有地位可名目也若以階級為難過矣古德云聖諦亦不立何階級之有此實圓頓之旨也復有八世界微塵數衆生皆發阿耨多羅三藐三菩提心此單言發心衆生乃未入道者也佛説是諸菩薩摩訶薩至歌無量頌讚歎諸佛此空瑞證法也壽量如空本具萬德故空中雨華以法身體同故供釋迦多寶及諸大衆也又雨細末旃檀沉水香等者言法身妙空所有神通妙行無不克足也上至梵天顯法身遍至色邊際也空中出音讚佛者言法性妙空法音充滿歎佛功德不可思議也爾時彌勒菩薩從座而起至合掌向佛而説偈言佛説希有法昔所未曾聞至皆發無上心此彌勒偈讚顯此法利為當來成佛真因也佛説希有法下八句敘讚法利也或住不退地下十二句頌初入道以至登地已上也復有小千界下十二句頌三地以至十一地也如是等衆生下四句頌因聞壽量得實果報之如上也復有八世界下頌發心衆生未入道者世尊説無量不可思議法至歌詠諸如來此頌瑞應也以法身如空體具萬德故空中種種瑞應以供諸佛也如是種種事昔所未曾有至以助無上心此結頌所顯也言如是種種瑞事昔所未有者蓋為聞説壽量長遠故法空妙應助發妙心現此諸瑞也前現瑞為助顯第一義今現瑞為助發無上心爾時佛告彌勒菩薩至所得功德無有限量此言因聞壽量較量後益也一念信解功德無量者以壽量如空一念信解即入法信妙空功德豈有限量哉若有善男子善女人至三菩提退者無有是處此言信解壽量即入佛慧故多劫行五波羅蜜以除般若皆屬有為事行淨名云無慧方便縛所以多劫功行不比佛慧功德也已入法位故永不退入生死也爾時世尊欲重宣此義而説偈言若人求佛慧於八十萬億至其福為如此若人求佛慧下四句總頌標五度於是諸劫中下十二句別頌施度若復持禁戒下四句頌戒度若復行忍辱下八句頌忍度若復勤精進下四句頌進度又於無數劫下十二句頌禪度是人於百千下四句頌結五度總諸功德有善男女等八句頌較功德謂一念信解壽量其福過彼多劫行五度者以斷諸疑悔安住實智絶諸思量外慕故功德勝彼不可思議也其有諸菩薩無量劫行道至説壽亦如是此頌上根聞説壽量必信不疑也其有諸菩薩下十六句言無量劫行道宿種深厚故聞説壽命必能信受故頂受此經願於未來長壽度生如今世尊説無畏法我等將來成佛説壽亦如是也由必信不疑故願力堅固如此也若有深心者清淨而質直至於此無有疑此頌必信乃上根利智之人也深心則深達實相清淨則戒根具足質直則志念堅固多聞則承事多佛總持則通達法藏隨義而解則妙契離言如此之人乃能必信所謂此經不入餘衆生手也又阿逸多若有聞佛至能起如來無上之慧此言壽量義趣也壽量歸趣乃法身極則故所得功德無有限量善入佛慧故能起如來無上之慧起猶開發也何況廣聞是經若教人聞至能生一切種智此顯聞持利益也何況者比上之辭言但知義趣則起佛智慧何況廣聞而轉教他人六種受持則功德無邊自然生一切種智矣阿逸多若善男子善女人至當知是為深信解相此言深信解相也言能深心信解法身常住則靈山一會儼然常存娑婆穢土宛然華藏能如是觀是為深信解相以一念頓超十地即得成佛故云深信解也前方便品即許身子以信得入及四大弟子領悟乃品標信解之名雖蒙授記信解未深但以信佛語故每誡曰如來所説言不虗妄然未信佛心也及現寶塔雖見多寶不滅三變淨土猶然不知釋尊法身常住穢土本淨以自心未有開悟也及説持經四安樂行依之精研地涌現前乃自心發悟故如來自説壽量長遠以顯法身常住不滅到此乃見法身永無生滅淨穢一如方信佛心故結指觀心曰若能如是觀者是為深信解相故愚前云信解標品直至現寶塔品乃由信而知解從提婆品至此由行而悟故為深信解以徹悟法身極則也天台通以三觀釋經義宗於此以悟法華三昧親見靈山一會現存是自證深信解相非特爾也但學人智淺心粗不能融入妙觀故以為繁耳豈知古人之妙悟哉又復如來滅後若聞是經至斯人則為頂戴如來上明壽量一品之利此明全經之利也言但能隨喜此經則已為深信解相矣何況讀誦受持豈不為頂戴如來耶以此經是如來法身全體故阿逸多是善男子至千萬億劫作是供養已此言若能受持讀誦此經則為供佛及僧以此經乃一體三寶所以持經即供三寶也阿逸多若我滅後至供養於我及比丘僧此重舉持經則為已供三寶者以顯法供養最故也是故我説如來滅後至及造僧坊供養衆僧此結顯法供最勝也不須塔寺等以顯理行最勝故況復有人能持是經至疾至一切種智此言持經又能兼行六度則功德無量以能疾至一切種智故也若人讀誦受持是經至讚歎菩薩功德上言但能持經不須復造塔寺僧坊等恐廢於行也故此又言既能持經又能兼行事行起造寺塔僧坊又能讚歎三乘之人如此理事雙修豈不更為殊勝又為他人種種因緣至皆應供養如佛之塔此言既能持經又能解説又能備修衆多理行豈不為已趣道場得近菩提坐道樹下將成正覺哉此釋上疾得一切種智之義也有人如此妙行則四威儀處皆應起塔供養以此人已具佛心佛行去佛不遠固當供養也此總結深信解相之功德也爾時世尊欲重宣此義而説偈言若我滅度後能奉持此經至經行及坐臥若我滅度後四句總頌持經勝福是則為具足下十八句頌則為供佛若能持此經下十二句頌則為供僧若有信解心下十二句頌單持經供養之福況復持此經下四句頌兼行六度恭敬塔廟下六句頌備具衆善若能行是行二十二句頌結持經之人以敬持經之人如佛則凡於所止坐臥之處則當莊嚴如供養佛以此佛子如佛則受用亦如佛也須曼那又云蘇摩那此云適意薝蔔亦云瞻博迦此云黃華阿提目多伽此云無龍舐此三華最香熏麻取油然燈供佛
