body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明南嶽沙門憨山釋德清述妙法蓮華經妙音菩薩品第二十四此品來意以顯法華三昧實登八地證平等真如已從八地起進九地位發真如用色心自在得如幻三昧居法師位以至覺等分身說法無思而應特以妙音名故此品來也妙音隨類現身說法者此正覺法自性性意生身也前藥王乃三昧樂意生身以入定則有出定則無此意生身以出入三昧隨類示現乃異熟所變故有往來之象若觀音則法界緣起普門示現觀者應知爾時釋迦牟尼佛至恒河沙等諸佛世界此顯持經妙行因圓將躋果覺故光召妙音以示因果冥會之相也佛有九十七種大人相肉髻頂相為第一是為無見頂相從此放光示無上果法所流智光也眉間白毫相光示中道妙智所流之光以此妙智為本因心今二光齊放表真因契果始覺合本之象也經初將說妙法先放眉光以示實相真境意欲行人了此光體以為發覺初心以造實相入佛知見今二執既破妙行已圓故二光齊放以顯因果一如初則但照東方萬八千世界以表就眾生迷妄動亂根塵識界以悟實相今則遍照東方百八萬億那由他恒河沙等世界然曰遍照乃略舉一隅以示圓照法界也以無邊法界不離眾生動亂根塵以擴而充之則遍融無礙故先照東方過是數已有世界至白毫光明徧照其國此言光照佛國以示始覺有功本覺乃顯之象也世界名淨光莊嚴乃常寂光土為法身所居之土也佛號淨華宿王智者淨華表妙行為因宿王智乃果覺也意顯以彼果覺為我因心故號淨華宿王智佛乃寂光果佛一向未顯今因釋迦白毫光明徧照其國者以白毫光表因心之智今照其佛國正示始本契會之相也故二光但言白毫爾時一切淨光莊嚴國中至恒河沙等諸大三昧此言始覺菩薩得諸三昧以顯入佛知見之象也淨光國中有妙音菩薩者以九地菩薩出真如三昧如從淨光國來居法師位應機說法無思而說如天鼓音故名妙音此由深證實相真如起大智用乃九地以至等覺之象也此地菩薩從登地來歷事多佛故云久植德本親近無量諸佛已證平等真如深入法界故云成就甚深智慧得妙幢相三昧等者大經云九地菩薩得一切種一切智智入受職位即得百萬阿僧祇三昧今言妙幢相等十六種三昧皆從真如三昧所出約用乃有差別之名故因成就甚深智慧而得以此菩薩善能說法折伏異道摧邪顯正故云妙幢相三昧以由持經深證實相故云法華三昧以佛知見淨治微細無明故云淨德三昧以顯本覺永離諸縛得大自在故云宿王戲三昧以無緣慈普應群機故云無緣三昧其所說法以實相印印定諸法故云智印三昧以一切語言皆順正法故云解一切眾生語言三昧以真如為萬行之本故云集一切功德三昧以法身顯現故云清淨三昧以得大智用離諸縛著故云神通遊戲三昧以智慧明破諸癡暗故云慧炬三昧稱真妙用嚴飾法身故云莊嚴王三昧永離垢障智光常照故云淨光明三昧識藏即如來藏故云淨藏三昧非三乘所有故云不共三昧以智慧曰念念中道故云日旋三昧此略舉三昧之總名其實得百千萬億恒河沙等諸大三昧也釋迦牟尼佛光照其身至莊嚴王菩薩藥上菩薩此正始覺有功本覺乃顯之象也起信論云始覺義者依本覺故故妙音白宿王智以始覺合乎本覺從體起用故願往娑婆見釋迦佛向以大智為本因心故及見文殊將會眾行以入妙圓果海故見藥王勇施宿王上行莊嚴藥上等諸菩薩也爾時淨華宿王智佛至如來功德智慧莊嚴此因妙音請詣娑婆往見釋尊乃示以平等妙行也莫輕彼國生下劣想者意顯菩薩妙行必以染淨忘能所滅影像方入平等法界也佛菩薩身皆卑小者欲其即應化以見法身意在本不小也汝身四萬二千由旬乃因四無量心以應根塵大願所成也六百八十萬由旬乃六根八識轉成妙淨法身也皆是如來之力等者菩薩作用皆依佛智無作無為而應變無方也故云神通遊戲功德智慧等於是妙音菩薩不起於座至甄叔迦寶以為其臺此妙音將至娑婆先現華瑞為前象也以無作妙力故不起於座以三昧力化作八萬四千眾寶蓮華者以示無作妙用也然以三昧力而現蓮華者大經云九地菩薩得百萬阿僧祇三昧其最後三昧名受一切智勝職位此三昧現在前時有大寶蓮華忽然出生其華廣大量等三千大千世界以眾妙寶間錯莊嚴等問曰妙音來見釋迦本非受職而以此釋之特非過歟答曰取象言之也以菩薩深證實相入佛知見因窮行滿當因果交會之際故自然而有不思議力現大作力以約理既齊故取象亦等以大經正說十地滿心此約入佛知見妙行已圓義當冥會以此經妙行無住不言漸次但就顯理固當如是夫復何疑爾時文殊師利法王子至亦欲供養聽法華經此文殊見華致問將顯妙音來意也故佛答之華嚴以智立體入法界品善財初見文殊指參知識末後文殊遙申右手以摩其頂表智滿不異於初心也此經亦以智立體故初放一光示實相境因文殊以發起故今入佛知見妙音來證又因文殊以發揮二經旨趣既同故取象亦等文殊師利白佛言至彼菩薩來令我得見此文殊為機發問如文可知爾時釋迦牟尼佛至文殊師利法王子欲見汝身此多寶召妙音也妙音本為親近釋迦并見文殊聽法華經而又假多寶召見者正顯等覺入妙必仗法身來接而非應化門頭之事也多寶召妙音後尚住空中自此終會不言者以持經行人既已妙契法身泯同果海了無二相以離業識法身無有彼此迭相見故故示悟時乃見入則不見也于時妙音菩薩於彼國沒至百千天樂不鼓自鳴此妙音來儀也與八萬四千菩薩俱來者意顯向以持經妙行入佛知見會八萬四千煩惱而成神通妙用也妙行所歷頓破無明故所經諸國六種震動凡有所作皆是真因故遍雨蓮華自然法音故天樂自鳴此皆依行顯德故瑞以應之也是菩薩目如廣大青蓮華葉至頭面禮足奉上瓔珞此妙音已至之儀也目如廣大青蓮華等敘妙音之身相明四萬二千由旬之身分相好也入七寶臺乃華中之臺也上升虗空表升法性空也以瓔珞奉釋迦者表以妙行莊嚴法身也而白佛言世尊至安隱少惱堪忍久住不此妙音敬為本師致訊釋迦之辭也所問訊之事皆娑婆堪忍之難事釋尊現身與民同患故此問之問訊多寶亦以少惱為辭足見娑婆非易入之地也世尊我今欲見多寶佛身至故來至此此妙音見二世尊正始覺契會本覺之象也及聽法華經并見文殊乃入佛知見二智冥合之象也多寶法身釋迦報化之身也今皆見之意謂既顯本覺則三身一體是無二無分矣爾時華德菩薩至修何功德有是神力此問妙音本因也以華德而問者華表妙行之本意顯妙音如是三昧神通之力皆依妙行所成故假以請問也佛告華德菩薩至今生淨華宿王智佛國有是神力此答敘妙音本因也本所師佛名雲雷音者以密雲將雨潤澤羣蒙必雷音先警應機自在故名雲雷音王乃從法垂應之號也妙音師之蓋有自矣以一切世界不離法界真際故國名現一切世間是則所依真土也以眾生有求隨感而現故名喜見乃適化應機之時也萬二千根塵相對之象也十萬乃百千大數也伎樂表微妙悅可之行也八萬四千乃塵勞法門相待之數鉢名應量器表應機應量之法也以此菩薩昔於根塵門頭以百千微細妙行廣化眾生能轉塵勞而為法門能為眾生知根普應隨時教化以昔具如此妙行之因故今感果得名妙音而有如是三昧神通之事此蓋自入佛知見而證得也故曰有是神力華德於汝意云何至百千萬億那由他佛此徵明昔因以證今緣也故曰技樂供養奉上寶器者今此妙音菩薩是也以妙音供佛已多植德已厚故感報神力有如此也華德汝但見妙音菩薩至為諸眾生說是經典將言妙音應化之事以見廣大神力也其身在此而現種種身處處為諸眾生說是經典者以妙音因從妙法入佛知見由破二執得淨二障已證平等真如今從真如三昧起進入九地以至等覺居法師位而以三昧力現十界身將說現身故先標總相也或現梵王身或現帝釋身至變為女身而說是經此言現十界身隨應說法先舉梵天以至三途之相也六趣在善道者可以聞法故曰而說是經至於三途不能聞法但救濟其苦而已華德是妙音菩薩至恒河沙世界中亦復如是此牒上神力廣顯妙用也言能六趣現身如此種種神通變化而於智慧無減者如以一燈分百千燈本燈如故所為既已為人己愈有既已與人己愈多也以若干智慧明照娑婆者謂以入佛智慧種種三昧能入一切眾生心想故云各得所知也於十方恒河沙世界中亦復如是者言不獨娑婆而能分身無量世界此起下亦現四聖之身也若應以聲聞形得度者至智慧之力其事如是此現四聖身而說法也以如是現身隨類說法雖是三昧神通之力其實因入佛智慧之力而然也爾時華德菩薩白佛言至能如是饒益無量眾生此問妙音住何三昧而能妙應如此佛答名現一切色身三昧此正覺法自性性意生身也楞伽經云云何覺法自性性意生身謂第八地觀察覺了如幻等法悉無所有身心轉變得如幻三昧及餘三昧門無量相力自在明如妙華莊嚴迅疾如意猶如幻夢水月鏡像非造所造如造所造一切色種種支分具足莊嚴隨入一切佛剎大眾通達自性法故是名覺法自性性意生身釋曰謂八地菩薩證一心真如進至九地發真如用得如幻三昧於一心轉變能現無量自在神通一時俱發如華開敷譬如意去石壁無礙故云迅疾如意進至十地隨所憶念化諸眾生故云隨入一切佛剎大眾蓋菩薩修行彼約得自覺聖智此以入佛知見斷惑證真至此自然而有不思議業用覿體相當非以地位局之也苟不約以行成德但云流通則妙音觀音豈徒然哉而入佛知見亦無益矣說是妙音菩薩品時至亦得是三昧及陀羅尼此言乘法妙利故聞者斷證皆同也爾時妙音菩薩至華德菩薩得法華三昧此言妙音還國覆命本師云攝用歸體故歸本國以未入妙覺猶在因位出入三昧故有往來之相往來皆憑無作妙力盡成妙行故雨寶蓮華作種種技樂以同行同證故令伴者八萬四千人皆得現一切色身三昧四萬二千天子因聞法而得無生法忍華德發問故得法華三昧亦以實行而證入故妙法蓮華經觀世音菩薩普門品第二十五此品來意謂以法華三昧入佛知見始覺因圓妙入果海逆流而出現十界身無思而應所謂聖種類身一時俱現乃得種類俱生無行作意生身之象以顯妙法三昧之極致故此品來也以滅根本生相無明大圓鏡智平等顯現故假觀音普門示現以發明之由觀音大士初以如幻聞熏聞修金剛三昧力故生滅既滅寂滅現前忽然超越世出世間即得上與十方諸佛同一慈力下與六道眾生共一悲仰故能以一身普應一切無不感應此妙行圓滿法華三昧之成功妙極於此故從藥王已來至此三品約三種意生身以證行成德也若則流通則前經但有信解而無行證則解為空解而新記菩薩將來歷事多佛又何以臻佛果乎聖旨昭然深觀可見意謂妙行雖圓誠恐行人餘習緣影難盡故復說三種加持乃可克成妙果故次三品以終焉爾時無盡意菩薩至以何因緣名觀世音此顯法華三昧入佛知見妙證極果故以觀音普門示現發明也因無盡意而請問者蓋如來藏迷為阿賴耶識其用在五意故有不思議業力今轉識成智而五意識俱成不思議之神力妙用觀音普門依此而現故因無盡意發起也但問觀音之名者欲因名以質實也故世尊答以實事佛告無盡意菩薩至即時觀其音聲皆得解脫此答觀音得名之由也於音言觀者楞嚴經云由我不自觀音以觀觀者令彼十方苦惱眾生觀其音聲即得解脫故觀音名遍十方界此由耳根如幻聞熏聞修金剛三昧以觀照力獲耳根圓通言不自觀音以觀觀者謂返觀聞性不由前塵所起知見故聲塵既滅聞性圓通蓋從音聲而入故得觀音之名也彼經言由耳根觀照得名今言無量苦惱眾生一心稱名菩薩觀其音聲皆得解脫者是約機以得名也以菩薩下與六道眾生同一悲仰是從觀自性圓通則與一切眾生性皆平等是則眾生乃菩薩心中之眾生也故眾生之苦即菩薩之苦若眾生之苦惱音聲以感激之則菩薩觀聲寂滅頓入法性神力加之則眾生之苦不期脫而自脫矣此自他兼明智悲之力也此總舉名以彰德用下別釋之若有持是觀世音菩薩名者至以是因緣名觀世音此別顯觀音德用即十四無畏也楞嚴具明經云知見旋復令諸眾生設入大火火不能燒觀聽旋復令諸眾生大水所漂水不能溺以知見屬火聞聽屬水以菩薩見聞俱泯根塵俱消故加被眾生水火不害也以斷滅妄想心無殺害令諸眾生入諸鬼國以觀照力加被其人故鬼不能為害也若復有人臨當被害至尋段段壞而得解脫此由菩薩消形同聲無塵可對則了無可觸故令刀杖不能加害若三千大千國土至尚不能以惡眼視之況復加害此脫羅剎鬼難羅剎以幽暗為性以聞熏精明慧性發光則諸暗相永不能昬故羅剎不敢惡眼視之設復有人若有罪若無罪至皆悉斷壞即得解脫此由音性圓消觀聽返入離諸塵累故能枷鎻皆悉斷壞也若三千大千國土滿中怨賊至威神之力巍巍如是此由滅音圓聞徧生慈力故能令眾生離諸怨賊以劫奪生於敵對今音滅聞圓塵境頓空無復對待故賊不能劫也已上脫外難下淨內業若有眾生多於淫欲至觀世音菩薩便得離欲此由熏聞離塵色所不劫故能今離慾貪欲以緣塵愛取今離塵不取故欲亦遠離若多瞋恚常念恭敬觀世音菩薩便得離瞋此由純音無塵根境圓融無諸違逆故能離瞋若多愚癡常念恭敬觀世音菩薩便得離癡此由消塵旋明朗照無礙之力加之故離諸癡暗然愚癡性障出於昬暗今既照明故離癡也無盡意觀世音菩薩至觀世音菩薩有如是力此由融形涉世徧事諸佛涉法王子以此加之故即生男以男子有幹事之能為法王子幹事之德也以能領受十方諸佛法門有女子承順翕受之德故即得生女若有眾生恭敬禮拜至於百千萬億劫不可窮盡此第十四無畏功德也以娑婆世界有六十二億恒河沙菩薩方便利生若持觀音一名則與彼六十二億平等以觀音圓證平等法界故一名等眾多名也此十四無畏皆是實事若約理解則不顯大士拔苦之神力也無盡意受持觀世音至無量無邊福德之利此頌結受持得十四無畏之德也無盡意菩薩白佛言世尊至方便之力其事云何此問將顯三十二應之德也經云由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土始自佛身終至人非人等為三十二此正明種類俱生無行作意生身也佛告無盡意菩薩至即現聲聞身而為說法此現四聖之身也此不言菩薩身以已現故應以梵王身得度者至即現毗沙門身而為說法此現六凡身先舉天道之總主也梵天為初禪天主帝釋為忉利天主自在大自在天居欲界頂天大將軍統領鬼神四天王統領世界毗沙門居北方為尊梵釋乃常隨佛眾餘則舉其總領也應以小王身得度者至即現婆羅門身而為說法此現人道由王臣以及士庶也妙音先舉輪王然輪王有金銀銅鐵四種所領四三二一天下如次其所統者名粟散王今言小王乃粟散也不言輪王略之也或該之耳小王治國長者推族姓居士清節自守宰官判斷邑婆羅門術數攝衛其實百工四民皆能現之但舉其大者耳應以比丘比丘尼至優婆塞優婆夷身而為說法此現四種身也應以長者居士宰官至童男童女身而為說法此現婦女及童真之身也即長者居士宰官婆羅門之婦女也應以天龍夜叉乾闥婆至執金剛神而為說法此現八部身也執金剛神乃執金剛杵以護法者無盡意是觀世音菩薩至皆號之為施無畏者此結三十二應誡當供養也六趣但言三善道不說三途者以苦趣非說法處然非不救如現焦面大士是亦現身但不分類耳無盡意菩薩白佛言至仁者受此法施珍寶瓔珞此無盡致供聞法增進之象也瓔珞乃菩薩嚴飾頸乃受繫之所今解以供觀音因聞隨感普應悟妙行隨緣頓捨法愛故解此致供名為法施時觀世音菩薩不肯受之至一分奉多寶佛塔觀音不受以表法界性中本無受捨也佛勸受之表不捨一法也轉奉二尊表迴向三處以泯同果海也無盡意觀世音菩薩至游於娑婆世界此正結答問意也爾時無盡意菩薩以偈問曰世尊妙相具我今重問彼佛子何因緣名為觀世音此無盡意重以偈問具足妙相尊偈答無盡意至能滅諸有苦此世尊總述觀音之德以答也以有深誓願度苦眾生由滅苦得名也諸有乃二十五有假使興害意推落大火坑至波浪不能沒此下別頌救難乃十四無畏但傍舉諸難故文不次此八句首舉三災之難也或在須彌峯為人所推墮至不能損一毛此傍舉險難也或值怨賊繞各執刀加害念彼觀音力咸即起慈心此頌怨賊難也或遭王難苦臨刑欲壽終念彼觀音力刀尋段段壞此頌刑戮難也或囚禁枷鎻手足被杻械念彼觀音力釋然得解脫此頌囚繫難也呪詛諸毒藥所欲害身者念彼觀音力還著於本人此頌呪毒難也或遇惡羅剎毒龍諸鬼等念彼觀音力時悉不敢害此頌羅剎鬼難也若惡獸圍繞利牙爪可怖至尋聲自迴去此頌毒蟲難也雲雷鼓掣電降雹澍大雨念彼觀音力應時得消散此頌災變難也已上皆救外難下救內難眾生被困厄無量苦逼身觀音妙智力能救世間苦此總頌婬怒癡皆眾生內分業苦也具足神通力廣修智方便至以漸悉令滅此總頌現身說法也長行無惡道頌中出之真觀清淨觀廣大智慧觀悲觀及慈觀常願常瞻仰此頌結顯觀智也顯菩薩應物觀照有五真觀者謂觀眾生本是一真法界了無異相故云真觀眾生心性本來清淨無諸雜染故云清淨觀以大智慧照破癡暗故云智慧觀無苦不拔故云悲觀無樂不與故云慈觀菩薩以此五觀常照眾生故隨感而應是故眾生常願瞻仰也無垢清淨光慧日破諸暗能伏災風火普明照世間此言觀智之用也無垢清淨光言法身三德無垢解脫德也清淨法身德也光般若德也以此三德菩薩已證以是德用普照世間故如慧日能破諸暗也三災乃迷性德所變今三德圓滿故能伏三災遠離諸難也以此觀智普明常照世間是知菩薩未甞一念捨眾生也悲體戒雷震慈意妙大雲澍甘露法雨滅除煩惱𦦨此頌應機說法之象也已證法身三德具足然法身寂滅而能應現說法利生者以無緣慈悲之力也然法身無體以悲為體戒者法身所流之教戒也故將說法先以雷震驚動群機以慈意而興廣大法雲然後乃澍甘露法雨以此滅除眾生煩惱是故經云菩提所緣緣苦眾生若無慈悲則佛亦不出世亦無法可說也諍訟經官處怖畏軍陣中念彼觀音力眾怨悉退散此頌由滅煩惱故能散眾怨觀照之力也妙音觀世音梵音海潮音至念念勿生疑此頌依德立名勸持獲益也無心而說故曰妙音不慮而知故曰觀音清淨無著故云梵音應不失時故云海潮音皆非世間之音也故須常念諦信而勿疑也觀世音淨聖於苦惱死厄至是故應頂禮此讚德勸皈以顯利益也已證法身故云淨聖普被眾生故與苦惱生死作依怙也以具一切功德故能十四無畏以慈眼視眾生故能三十二應為眾生福聚如海無量故應頂禮也爾時持地菩薩即從座起至當知是人功德不少此結讚聞品之功德也因持地結德者以觀音證極法身盡一真地而能以大地心任持眾生出生功德故以持地結讚也觀音以無作妙用應諸眾生故云自在之業無處不現故云普門示現無苦不拔故云神通之力此觀音已證妙覺雖居果位不捨因行乃已成佛示法界身雲故言普門若前妙音乃等覺已前之行故憑三昧力猶有往來之相佛意說此三品意在入佛知見必破二執淨二障盡真如際現大神用而入妙覺因果一如方為究竟故予約楞伽三種意生身釋之以明證入之次第此經既不說地位漸次故特約此以彰實行將示新記菩薩為未來入佛知見之證驗也如來說法深意豈可以淺識漫視哉佛說是普門品時至阿耨多羅三藐三菩提心此結聞品成行也佛果菩提名無等等謂無物與等而能等一切以觀音證此故聞者皆發此心以成妙行也妙法蓮華經陀羅尼品第二十六此品來意由前妙行已圓當克妙果若上上根人一超直入在中下之輩第藏識由深歷劫餘習潛伏其中雖有止觀之功而智有所因神有所不及者非假加持之力不易斷也至此故說後三品以顯三種加持之象故此品來也三種加持謂神力法力現身面言說楞伽唯二今多法力此品乃神力加持也呪乃諸佛秘密心印如天子之秘符大將執之摧堅破銳無敵不克藏識為生死窟穴最極幽深故云是法華經藏深固幽遠無人能到其習氣潛伏止觀之力所不及者須仗如來秘密心印之力以攻之楞嚴云若修行人習氣未除應當一心誦我神呪謂是故也楞伽云若不以神力建立者則墮外道惡見妄想及諸聲聞眾魔希望故七地已前不加則墮外道八地不加則墮二乘九地至等覺不加不得入妙以七地以前藏識未破等覺以前異熟未空故須加也然三意生身乃騐其已至三種加持乃警其未至蓋如來說法通途之大義如此非謂意生身後方有加持也萬無以先後視之爾時藥王菩薩即從座起至即說呪曰此言持經之福將顯入佛知見之大利也因藥王發起者向以藥王為止觀之象且為苦行持經之首入佛知見之先覺故此請問以示新記菩薩始以止觀調心終以密呪消磨習氣也以佛說修行有顯密二行故止觀為顯行呪為密行楞嚴云若修行人習氣未除應當一心誦我神呪是故修行之士將躋覺位而間被魔力所壞者習氣使然也故末世持經必須神呪加持可保無虞楞伽經七地已前不加則墮眾魔希望謂是故也此品判為神力加持而首問持經之福者向言持經之益多約利他在機今言其福專明自利在己以此經大益非厚福者不能荷擔如聞般若非於一佛二佛三四五佛而種善根謂非福不能載慧也言讀誦云通利是在入佛知見故云如說修行以持經大慧之福非神力不能保全故須加持故前屢較功德但言七寶今特約供佛功德是在即慧之福也故佛印之曰如說修行其福甚多安爾一曼爾二至阿摩若那多夜四十三此秘密神呪乃諸佛心印從來不翻譯梵成華有五不翻一秘密不翻即神呪二含多義不翻如婆伽婆三此方無不翻如閻浮樹四順古不翻如阿耨菩提五尊重不翻如般若此呪乃五不翻之一也如軍中之密號但取辦事不許人知世尊是陀羅尼神呪至則為侵毀是諸佛已凡呪皆稱陀羅尼此云總持謂總一切法持無量義心印之義稱也此呪乃六十二億諸佛所說則諸佛之心印繫於持經之法師故須此呪以護持也藥王先說者以為顯密二行之首故時釋迦牟尼佛讚藥王至於諸眾生多所饒益此釋尊印讚也爾時勇施菩薩白佛言至即於佛前而說呪曰痤隷一摩訶痤隷二至涅犁墀婆底十三世尊是陀羅尼神呪至則為侵毀是諸佛已此勇施說呪護持者頓斷習氣非勇不能以此助成妙行故次藥王說呪也夜叉等皆惱害鬼持經法師末世多害非假呪力不能免害成行故須加持也爾時毗沙門天王護世者至即說呪曰阿棃一那棃二至那履五拘隨履六世尊以是神呪擁護法師至令百由旬內無諸衰患毗沙門北方之天王也四王護世統領鬼神為生死界主北方先說呪者北方之卦為坎坎者陷也以一陰陷二陰之中以示生死險難之象行人於生死險難之中而欲頓證菩提非神力加持又何以濟險難出生死乎毗沙門為險難之主故先說也爾時持國天王在此會中至即說呪曰阿伽禰一伽禰二至浮樓莎抳八頞底九世尊是陀羅尼神呪至則為侵毀是諸佛已持國東方天王也東方之卦為震震者動也東為群動之首易曰吉凶悔吝生乎動也論曰動必有苦是則行人於生死動亂之中而作至靜之行苟非神力加持又何以臻寂滅之境哉至若南方之卦為離離者麗也虗明之象西方之卦為兌兌者說也若無虗明悅豫之境則無庸加持故彼二天王不須說耳爾時有羅剎女等至即於佛前而說呪曰伊提履一伊提泯二至兜醯十八㝹醯十九寧上我頭上莫惱於法師至即於佛前而說偈言若不順我呪惱亂說法者至當獲如是殃諸羅剎女說此偈已至應當擁護如是法師此羅剎女乃毗沙門所統故亦說呪擁護持經法師也羅剎女乃幽昧之鬼與鬼子母皆飛行而食人肉者女則陰邪之至此示無明羅剎業習戕害法身今以止觀研窮化無明而作妙明心光故羅剎女亦以自身擁護受持讀誦修行是經者頓令無明三毒淨盡無餘所謂令得消眾毒藥也若夜叉等皆所部之惡鬼此皆莫惱則無可惱者矣佛讚印許但護持經名之福已不可量何況具足受持供養其福更不可思議矣供佛必以香燈者表妙契法身潛通法界故香供為尊一切煩惱應念化成無上知覺故種種諸燈供養而為第一說是陀羅尼品時六萬八千人得無生法忍此聞品成行也以顯密雙修即得六根清淨八識圓明故六萬八千人皆得無生法忍此神力加持之益也妙法蓮華經妙莊嚴王本事品第二十七此品來意以明轉識成智之象以顯法力加持也妙莊嚴王乃如來藏在纏而為八識心王之象今顯發本真故云本事淨藏淨眼二子乃六七二識轉染令淨之象夫人柔順內助為止觀內熏之象治淨無明故云淨德以六七因中轉故二子先請出家二子轉父邪心一同出家正顯本覺出纏之象此止觀之力乃法身菩薩得無分別心與諸佛智用相應以法力自然修行真如熏習滅無明故所謂法力加持故此品來也意謂由神力加持外魔既消法力內熏淨除二障證二轉依故說妙莊嚴王之本事也前神力加持乃七地已前之象法力加持乃出八地真如三昧進九地以至等覺之象爾時佛告諸大眾至國名光明莊嚴劫名喜見此將顯妙嚴之本事先敘女師之佛也佛號雲雷音宿王華者密雲將雨雷以先之故云雲雷音宿為果覺華為因行是以果覺智為因地心進至九地諸佛法雲法雨悉能領受故所師之佛號雲雷音宿王華智也常寂光土以光為嚴故名光明莊嚴淨土為眾聖所歸故云喜見此舉彼時之佛也彼佛法中有王名妙莊嚴至一名淨藏二名淨眼王名妙莊嚴者謂如來藏元是妙嚴果體今迷之而為阿賴耶識名為八識心王因之而有六七轉識造種種業受種種苦若轉七識而為平等性智則藏識無染污可受故云淨藏若轉六識而為妙觀察智則分別之見即消見分亦泯即得法眼淨故云淨眼此轉染令淨之象是二子有大神力至皆悉明了通達此其二子有大神力以顯二智有廣大力用也以菩薩六度萬行佛慈悲喜捨四無量心乃至三十七品助道法皆仗二智之力用故云皆悉明了通達三十七品謂四念處四正勤四神足五根五力七覺支八正道成之行槩不出此以四心為體六度為用道品為助皆六七二識轉智所修之行故又得菩薩淨三昧至於此三昧亦悉通達此言二子之三昧也以二智觀照念念淨治無明故云淨三昧日為本智星宿乃微細觀察故云日星宿三昧照明三體故云淨光三昧了達根塵故云淨色三昧身心世界內外洞觀故云淨照明三昧念念莊嚴法身故云長莊嚴三昧能破煩惱諸魔障礙故云大威德藏三昧是皆二智止觀之象爾時彼佛欲引導妙莊嚴王至或聽我等往至佛所此敘二子化父之因緣也非一乘妙法佛知見地不能轉彼業識故云欲引導妙莊嚴王故說法華經非二識智用止觀之力不能開佛知見故二子白母願母見佛聽經止觀之功專為轉邪之用故令往白父共去二識本是妙明佛智今為識用故云生邪見家以止觀熏變無明方得轉染令淨故母令二子為視神變父若見者心必清淨於是二子念其父故至令其父王心淨信解此二子現神變以警發父心也謂以無作智淨自心體故涌在虗空地水火風皆八識之相分向執取為我我所今一一變化消融無礙方離執取之心故令父見神變心淨信解也時父見子神力如是心大歡喜至可共俱往此父見神力心大歡喜發心見佛者以藏識受六七智用所熏即有轉變之機也故問其所師欲共往見於是二子從空中下至欲重宣其意以偈白母願母放我等出家見沙門至願聽我出家母即告言聽汝出家所以者何佛難值故二子見父已信仍白其母求聽出家者以六七因中轉故先請出家然非止觀內熏之力不能親證佛慧故母聽二子出家以顯佛難值遇意欲深心信解乃可入佛知見也於是二子白父母言至諸佛難值時亦難遇此二子白請父母同往見佛者意顯始因止觀熏變必心境一如乃能入佛知見故願俱往見佛言佛甚難值時亦難遇者所謂欲識佛性義當觀時節因緣也彼時妙莊嚴王後宮至示教利喜王大歡悅此敘合宮皆有可化之機也意顯藏識含藏種子習氣煩惱蒙止觀熏變之力皆轉染令淨故王後宮八萬四千眷屬皆堪任持妙法華經也然如來藏所以不由生死苦趣者以六識所造業力牽纏故也今七識不執則六識亦轉則八識生死之因絕本來無染即入佛知見故淨眼菩薩得法華三昧淨藏菩薩通達離諸惡趣三昧也以始覺有功本覺乃顯故其王與夫人得諸佛集三昧能知諸佛秘密之藏也以六七二識既轉則五八一時俱轉則四大根塵一切煩惱無不轉者故王及群臣并四萬二千人一時俱詣佛所也到此則一切法無非佛法故彼佛為王說法示教利喜爾時妙莊嚴王及其夫人至成就第一微妙之法此妙嚴供佛之益也由轉染令淨解脫纏縛故解頸真珠瓔珞以散佛上也以妙契法身常樂我淨涅槃妙德故化成四柱寶臺臺中有大寶床敷百千萬天衣其上有佛結跏趺坐也蓋虗空恒一真常德也天衣適體真樂德也有佛趺坐真我德也放大光明真淨德也以藏識既空法身乃現故念佛身希有微妙之色此妙契法身之象也時雲雷音宿王華智佛至其國平正功德如是此佛與妙嚴授記者以悟藏性本空開佛知見乃是成佛真因故為授記也普陰群生故佛號婆羅王以永破無明癡暗故國名大光頓超諸有故劫名大高王皆八識出纏之象也其王即時以國付弟至饒益我故來生我家此言妙嚴出家之益也以藏識轉智泯同法身以權智應緣故云以國付弟言與夫人等者意顯止觀功圓同時出纏則一切智用根塵諸法一時俱為妙用矣故與夫人二子并諸眷屬於佛法中精勤修道則轉一切煩惱皆為佛知見矣故於八萬三千歲精勤修習妙法華經也至此則一切行皆為淨妙功德而為法身莊嚴矣故云得一切淨功德莊嚴三昧也證無住身入法性空故云上昇虗空本覺既顯方見始覺之功故王見佛以感二子為善知識也此蓋借法力熏習真如為緣因佛性修而得者故云二子轉我邪心令得安住於佛法中得見世尊此二子是我善知識為欲發起宿世善根來生我家此其善知識是大因緣所以化導令得見佛此皆顯示資借緣因熏習之力也爾時雲雷音宿王華智佛至三藐三菩提心此彼佛印證妙嚴正顯緣因佛性故歸重善知識也意謂正因佛性人人本具故為宿世善根要借善知識緣因助發止觀熏修乃顯所謂佛種從緣起故此歸重善知識是大因緣故此經歷敘大通智勝之本因以下一乘之緣種故今乃得從此妙法悟入故持經之法師皆是末世眾生佛性之因緣故不敢侵毀者正以善知識所持佛性種子為重故也大王汝見此二子不至愍念邪見眾生令住正見此出二子之本因也已曾供養六十五百等者謂六識發起觀智就五根門頭一一洞明不為根塵所惑凡有所作皆為妙行故云供養六十五百千萬億那由他恒河沙等諸佛親近恭敬於諸佛所受持法華經愍念邪見眾生令住正見是知持經法師專以觀照熏習為本也而熏習之功久經多劫又非一時之故也妙莊嚴王即從虗空中下至說是語已禮佛而出此妙嚴讚佛以顯妙契法身之象也故先讚報身相好復讚法身功德以如來之法具足成就不可思議微妙功德教戒所行安隱快善皆法身之功德也圓覺經云譬如銷金礦金非銷故有雖復本來金終以銷成就一成真金體不復重為礦故妙嚴云我從今日不復自隨心行不生邪見憍慢瞋恚諸惡之心也此妙嚴徹見自心直到不疑之地是皆妙法之功所謂法力加持之益也佛告大眾於意云何至諸天人民亦應禮拜此示淨藏淨眼二子今緣也意顯能轉妙嚴邪心及化夫人眷屬俱入佛法中者皆仗二子止觀調治熏變之功今藥王藥上之宿因也以一切菩薩修行未有不依止觀而修一切如來成等正覺未有不因止觀而得此是藥王藥上二菩薩成就如此諸大功德已於無量佛所植眾德本故能成就不思議力也意在結歸觀心以盡持經妙行以顯法力加持之功也故識是二菩薩名字皆應禮拜佛說是妙莊嚴王本事品時至於諸法中得法眼淨此結聞品成行也意顯止觀功成則一切塵勞應念清淨故八萬四千人遠塵離垢得法眼淨也妙法蓮華經普賢菩薩勸發品第二十八此品來意由前信解以資妙行行成得果茲當證入乃現身面言說加持也經云是人若坐思惟此經爾時我復乘六牙白象王現其人前其人有所忘失一句一偈我當教之與其讀誦又云若有受時讀誦正憶念修習書寫是法華經者當知是人則見釋迦牟尼佛如從佛口聞此經典此正現身面言說加持也以等覺菩薩若不加持不得入妙以有法身來接故須加持乃得證入故此品來也此經以智立體故文殊啟發以資信解以行成德故普賢成終以明證入故為入佛知見也普賢有二一道前屬因二道後屬果謂行彌法界曰普隣極亞聖曰賢此在等覺屬因稱真法界曰普彌綸萬化曰賢此在妙覺屬果以此普賢乃法界之全體為毗盧十身之願身故菩薩依此發心信解修行還證此體故曰無不從此法界流無不還歸此法界然菩薩因圓至等覺已必假果覺來接乃得入妙故此品為證入之終而普賢以願力守護必得是經也以因普賢乃得證入故曰勸發爾時普賢菩薩至無量無邊不可稱數從東方來此言普賢來儀也以法華初會普賢向不在座今從東方來者然東為群動之地以法華妙行稱真法界普遍一切眾生妄想亂動心中今入佛知見而法界性體方得現前故此終會普賢乃從東方來始而光照東方終則普賢從東方來正示智行冥一之象也以此法性普入一切眾生身中不為煩惱之所留礙故云自在神通力以法身真際乃離心意處故曰威德無一不具故曰名聞此為萬行之本故與無量無邊不可稱數大菩薩俱所經諸國普皆震動至百千億種種技樂此言普賢凡所舉動必破無明而成妙行以滋法喜故云普皆震動雨寶蓮華作種種技樂又與無數諸天龍至禮釋迦牟尼佛右繞七帀此言隨從普賢八部神眾皆資妙行以為護法故云各現威德神通之力右繞七帀見佛慇勤之儀也白佛言世尊至於如來滅後云何能得是法華經此普賢問法以見來意也以普賢妙行為法身全體有大威力故曰寶威德上王佛國心聞洞達故曰遙聞既曰遙聞特請惟願說之世尊未答一辭者正顯離言之道不容聲矣世尊說般若須菩提巖中晏坐帝釋散華歎曰尊者善聽般若須菩提言未之聞也帝曰世尊以不說說尊者以不聞聞世尊一日陞座文殊白槌云諦觀法王法法王法如是世尊便下座今普賢特請願說世尊不答普賢即問云何能得是經意顯妙法乃絕言之道無說無示離言默證乃可悟入故云能得是經佛告普賢菩薩至於如來滅後必得是經此佛正示普賢妙行以資證入也由普賢特為聽經而來故請惟願說之世尊未答一辭意示離言寂滅之道蓋不容言故隨問云何能得是經故佛說成就四法當得是經一為諸佛護念二植眾德本三入正定聚四發救一切眾生之心者起信論云信成就發三種心一者直心正念真如法故故云諸佛護念二者深心樂集一切諸善行故故云植眾德本三者大悲心欲拔一切眾生苦故故云發救一切眾生之心又云如是信心成就得發心者入正定聚故云入正定聚然此品顯證而言信成就者謂初以文殊大智發信依信生解依解發行行起解絕故為證入是乃信之成就也所謂發心畢竟二無別如是二心先心難然信必借行乃得成就故文殊大智定須普賢勸發故終以四法必得是經也論依最初發心說此約成就說足見智行相依始終無二也爾時普賢菩薩白佛言至諸惱人者皆不得便此正顯加持之力也以有加持守護之力故使諸魔惡鬼諸惱人者皆不得便此雖絕外患實淨內障以普賢妙行能使一切煩惱諸魔不得現行不致戕害法身以損慧命令其安隱證入也是人若行若立至我當教之與共讀誦還令通利此正現身面言說加持也言是人若行若立若坐思惟此經是則四威儀中念念深入法華三昧不忘不愚若有忘失一句一偈則普賢菩薩乘六牙白象現其人前教之與共讀誦還令通利必使證入而後已是為身面言說加持也爾時受持讀誦法華經者至得如是等陀羅尼此言由加持力以見身面即得三昧及陀羅尼也陀羅尼此云總持一心真如之異稱三種陀羅尼止觀之義旋即楞嚴旋倒聞機之旋如急流之水有漩澓也謂一切法總歸一心故名真如湛然常寂為旋陀羅尼是名為止一心真如有大智用不離一心為百千萬億旋陀羅尼是名為觀體用不二但是一心止觀雙運名為中道遮照同時存泯無礙為法音方便陀羅尼是名等持因見普賢入法界性一念頓得故云以見我故即得三昧等世尊若後世後五百歲至即於佛前而說呪曰此普賢說呪擁護以盡加持之力也後五百歲乃鬪諍堅固難持之時非假加持之力無以克成勝果故須加也前云行立坐等四威儀中念念思惟今云修習是經應一心精進是則非徒讀誦而可冀其感應也滿三七日則以一切眾生所喜見身現其人前是由觀照增明如水清月現行人心與法界冥一故菩薩現身此感應道交自然之理也欲為行人淨治無明習氣故說加持呪曰阿檀地一檀陀婆地二至辛阿毗吉利地帝十九此呪力加持令其功速成就也以呪能破障凡修習止觀之力有所不及者故須神呪加持功易克成耳世尊若有菩薩至皆是普賢威神之力此顯呪乃法界全體故云當知普賢神通之力若念普賢威神則法界大用現前故心與咒冥則菩薩感應如響若有受持讀誦正憶念至為諸如來所摩其頭此言持經要行以正念為主也前一往但云受持而已至此普賢特言思惟修習正憶念是知持經以觀照為要行非徒循行數墨而已起信論云覺心初起心無初相遠離微細念故得見心性又云能觀無念可謂向佛智矣此中正憶念即無念也思惟修習必觀無念乃與真如法界相應故感普賢現身加持如來手摩其頭故下歷言正憶念解其義趣是知入佛知見必以正念為要行也若但書寫是人命終至解其義趣如說修行此較勝行之益也若但書寫全不解義則感生忉利天報何況正念解義修行而不感如來加持乎若有人受持讀誦至正憶念如說修行此顯解義之勝益以勸修持也上但書寫則感生忉利天上矣今解義之福利臨終必感千佛授手接引上生兜率天宮與彌勒補處菩薩共生一處是為當來龍華三會又為一乘妙法之緣種矣是故智者應當一心正憶念如說修行為妙行也世尊我今以神通力故至廣令流布使不斷絕此普賢結願流布此經誓使佛種不斷也爾時釋迦牟尼佛讚言至能受持普賢菩薩名者此如來讚歎普賢護助持經之德如來亦以神力守護受持普賢名者以此經乃如來護念之法普賢護持經人則經在普賢故如來亦護持普賢名者則經亦在持名之人也以凡所舉念皆法界性現前昭著故普賢若有受持讀誦至為釋迦牟尼佛衣之所覆此言正憶念修習入佛知見之妙證也此經已有如來全身故則見釋迦妙契法身故如從佛口親聞念念入佛知見故印供佛佛所讚善以是成佛真種必見授記故佛手摩頭則一切行皆是佛行故為衣之所覆是皆正憶念修習之妙證也如是之人不復貪著世樂至能修普賢之行此言持經妙證之成功也前安樂行品戒持經者不親近外道經書及不近諸惡律儀女人等不起三毒等煩惱一一切戒者恐引習氣有妨正憶念故遠之不使為害也今已入佛知見一切惡習淨盡自然不貪不喜不為所惱凡所修為皆是普賢妙行也若知見未開則動成擾亂今既證入則無法不妙故不待遠離而心自遠矣普賢若如來滅後至當坐天人大眾中師子法座上此言入佛知見即得菩提故見持經者應作成佛之念也證果有期故云不久當詣道場等破諸魔下皆成佛之事普賢若於後世受持讀誦至亦於現世得其福報此言持經所感現前之福也以法味資神故不貪著世間樂具以即慧之福故所願不虗三障日消故其福益厚現報如此則未來生天殊勝可知先後分別持經之益不同以正憶念如說修行故不久成佛以但受持讀誦書寫故感天福報若有人輕毀之言至水腹短氣諸惡重病此通言讚毀業報昭然如影響也毀持經者為狂人則失正知見故感世世無眼若有供養讚歎其人則獲現果報若出其人之過惡無論虗實即得白癩病者以傷毀法身故感此報若輕笑之者則感世世牙齒疎缺諸惡等報者以從口業傷妙法全體故感通身諸惡重病也前方便品末歷言毀經之報者以戒說者不擇其機令無智人輕毀譏謗是單約謗經者說也及持品以後歷言毀謗持經法師是單約謗人而言恐人聞謗不信法師佛種自此斷絕矣今言持經者意在正憶念如說修行之人業已入佛知見妙證法身毀之則傷法身全體矣是知先後佛說毀謗之報各有所主非謂此節結前文也然佛以大圓鏡智平等說法圓照法界始終一貫稱性所演以備殫群情本無思量分別若以文章起伏照應求之似涉有心思量攻為文字則落世諦常情之語非大智無思稱性所說也故云學者當善於義莫著言說是故普賢若見受持是經典者當起遠迎當如敬佛此結敬事持經之人通結重法之義也前文歷言敬持經者當敬如佛以如說修行入佛知見不久即得菩提妙行已圓故當敬事如佛正謂此也是故者承上結文之辭也說是普賢勸發品時至微塵等諸菩薩具普賢道此結聞品成行也以入佛知見則一切諸法通歸法界故得百千萬億旋陀羅尼則一一行稱真法界故云得普賢道以聞此普法故成此大益妙法大利歸極於此楞嚴妙行歸無所得華嚴善財童子參遍知識入法界後但見普賢以法界性中本無證得故唯有普賢方稱法界之量故二經旨趣相須一貫以見如來說法之致也佛說是經時普賢等諸菩薩至受持佛語作禮而去此為末後流通分也此經以文殊發啟而結會不說其名者以泯同果海故如華嚴會緣入實則無文殊但歸普賢其義等也此經專為引攝二乘故聲聞信受奉行迴向偈稽首法界主相好光明身隨緣應眾生演說微妙法令一切聖賢盡開佛知見我以一毛智測量法性空如飲海一滴欲識百川味寂滅離言法難以思惟求甚深智慧門方便可通達願見聞隨喜頓開佛知見佛種不思議究竟常不斷共入涅槃城安住極樂國南嶽門人方玉校對
