body:
  text: 姚秦三藏法師鳩摩羅什奉詔譯明南嶽沙門憨山釋德清述妙法蓮華經譬喻品第三品名譬喻者比事類情故曰譬喻此品來意由佛法說盡廢昔權以顯今實二乘一向自絕成佛之望身子上根既聞佛慧心大歡喜自信作佛故述領悟之懷世尊特為授記第中下根人向執權乘未肯頓捨故佛說火宅喻許賜諸子三車一車之權實中根之人始得領悟故此品來也共下九喻各有所主以前說如來出世為一大事因緣今以長者驚入火宅救濟諸子又為一大事之譬喻也爾時舍利弗踴躍歡喜至從法化生得佛法分此身子自敘今得之欣懷悔昔不知之過咎也踊躍下慶今之得所以下傷昔之失我常下悔怨佛之過也身子雖小乘葢蒙佛恩受佛教非一日矣尚不知佛心將以為偏黨況其他乎是知師資水乳從昔所難也若我等下敘知佛心不偏乃貪小自誤之過我從下慶今之得前云若我弟子不信此法非真羅漢故身子自信以真子自許也真子乃因聞佛說真實之法而出故云從佛口生化我一向執着鄙吝之心故云從法化生今法王大寶自然而至故云得佛法分也爾時舍利弗欲重宣此義而說偈言我聞是法音得所未曾有至教化諸菩薩此頌身子領悟自敘昔失之疑展轉再三而申其情以慶今得而大喜也我聞下十句敘今已得知昔不失以除憂我處下二十四句敘悔責昔失之過咎我常下八句敘尋常懷疑而不決今聞下二十句敘今聞法知非悔責昔日著邪之自誤佛於下四句敘慶今得已除疑結頌長行初聞佛所說下三十六句重陳疑狀以釋不疑之所以甚矣人心之難悟也佛明教猶疑而不信將以醍醐為毒藥耳初身子請說世尊止之曰不須復說若說是事一切天人皆當驚疑始而將謂無可驚疑者今身子自陳其情曰初聞佛說則心大驚疑甚至以佛為魔者是則幾乎永絕其分矣則驚疑之狀可知若非佛以種種因緣而調伏之則此疑不能釋其心終不能安也以引三世諸佛之儀式始信佛心乃知波旬無此事以我墮疑網故以佛為魔耳柔軟微妙者感佛法說種種因緣以顯實且佛囑云心生大歡喜自知當作佛故我心歡喜自知定當作佛也如來出世為此二乘無論往昔因緣即今已費四十年之苦心今日剛得一人信受而不疑是知師資雅合利生之事豈易易哉爾時佛告舍利弗至教菩薩法佛所護念此敘身子久蒙佛化之因緣顯今緣熟而得記也法界以緣起為宗故佛性有正因緣因所謂佛種從緣起故眾生雖具正因佛性若不遇諸佛菩薩善友出世教化為緣則終難顯了所謂佛以一大事因緣出現世間此經重在緣因今身子雖信自當作佛而追敘其昔日之疑將謂已失成佛之利故佛說昔化之本因已教成佛之緣種但忘之耳非失之也故今雖說聲聞成佛但令知其本有自信而已非別有所增益也此法華經乃成佛之因緣一向不說故云護念今已說之以見緣熟所謂付囑故為授記下諸弟子授記皆此意也舍利弗汝於未來世至像法住世亦三十二小劫此說授記之事也記亦云記莂莂者草菜之種子意顯因果不爽也身子自知作佛而授記猶過多劫事多佛具菩薩道而後成者以聲聞一向安住小乘已絕成佛之分非佛教化之本懷故於四十年來種種因緣發起捨小樂大之心而竟不得以其不信自心是佛故也以不信是佛故一切菩薩道法利生事業皆非己分所以歷劫無明全然未破是為焦芽敗種耳世尊多方調伏直至今日方肯自信然所信者乃不生滅心此心是為成佛之真因故從此可以進修成佛之行矣然菩薩所修成佛之行以四弘誓願為本度無邊之眾生斷無盡之煩惱學無量之法門成無上之佛道以二乘向有佛道長遠之怖安肯發此大心哉以今既信自心正可教以大行所謂教菩薩法也供多佛修福具諸行修慧也福慧兩足四弘誓願已滿所以為成佛之因故歷多劫而後得果名實並充依正俱妙宜矣身子成佛號華光者此隨因獨得之名也華為因光為智以身子夙因智慧故果亦如之十號諸解甚詳此佛之通號也國名離垢則不比娑婆亦說三乘乃隨其本願劫名大寶則時非五濁菩薩無數則純一上根壽十二小劫則非滅劫將滅轉授堅滿之記則使妙法傳續無窮正法像法住世三十二小劫者以時非五濁人無三惡故法住之久宜矣此所謂未來之佛也然諸弟子授記成佛依報莊嚴眷屬殊勝法住久遠一一皆超過於釋迦者何也以華藏世界二十重佛剎殊勝微妙者多獨娑婆一土穢惡不堪乃同一類惡業眾生所感同業煩惱之報土乃應身佛調伏眾生之地非實報微妙之境也今諸聲聞成佛乃直指其實報莊嚴以佛佛斷盡煩惱純一淨因故所感酬因之報亦清淨無比此雖殊勝特華藏中一塵毛耳豈能盡法界之量哉惟我毗盧遮那證窮法界故通一華藏而為化境此其佛智甚深不可思議難信難解者此也後言長者其家大富其子即克紹家業所須不過盡一己之量而已豈能盡長者之所有哉以此觀之則可以窺此經之歸趣矣爾時世尊欲重宣此義而說偈言舍利弗來世成佛普智尊至宜應自欣慶此重頌授記之事也頌言華光亦為王子而出家者本之燈明智勝即我釋尊皆從王子而出家是知無有一佛不是轉識成智而證三身者故云棄國捨榮豈有天生彌勒自然釋迦不修而成者耶爾時四部眾比丘至今乃復轉無上最大法輪爾時諸天子欲重宣此義而說偈言昔於波羅奈轉四諦法輪至盡迴向佛道此敘在會四眾八部因見身子受記各各皆生歡喜也以如來住世為四眾八部之依皈一向隨佛聞法未知究竟如諸將從漢人人思得尺寸之封也始見如來放光現瑞皆已騰疑不知所為何事且因文殊已知將說法華經矣及出定說經但歎二智甚深謂一切天人三乘所不能知此則更生疑悶也然身子為佛之長子乃四眾天人之所敬仰者始且驚疑終竟領悟而得授記成佛故如長者得子而委付家業則眷屬親族皆有所依歸故四眾歡喜而身解脫所以脫衣供佛從此人人自知必當作佛故盡發迴向之心也此法王御世與諸魔共戰今賞一功而法界之家國定矣豈小緣哉世尊出世為一大事因緣即今已遂本懷尚有未信之徒自可一一次第而舉故向下之談如建瓴之勢聞者望風而靡不勞餘力矣爾時舍利弗白佛言世尊至說其因緣令離疑悔此身子自慶領悟得記復為未悟請佛決疑所以發起喻說也爾時佛告舍利弗至諸有智者以譬喻得解此正聞喻說也謂先前以種種因緣譬喻言辭皆為顯發一乘無上菩提教菩薩法明言我法無有二乘則人人皆當知有成佛之分矣又何疑耶然既於因緣不悟則更當譬喻以發明之前說一大事因緣所以難明者以方便品末直說舍那現應化身將一乘法分別說三是則明言有法報身佛在焉而二乘一向但認釋迦應身之佛熟遊三界穢濁之境執著已證二乘之果不復知有向上事雖前明告現身三界三七思惟之事而聲聞劣解猶有所未解故當更以譬喻總明現身三界之因緣耳故後喻說甚明舍利弗若國邑聚落至心不厭患無求出意此正陳三界無安猶如火宅為喻說也言娑婆世界居華藏世界海中但一塵毛若國邑中之一聚落村舍耳長者則指從報垂化之主佛也年邁喻法報冥一自受法樂之地如長者年邁安恬寂靜之時也以修進位中比壯志功勳若忘功罷業比年老心閒而無事也財富等喻實智僮僕喻權智以供任使宗門所謂奴兒婢子邊事也其家廣大唯有一門喻一乘佛知見所謂十方諸如來一道出生死也三界具有五道眾生故云五百人止住其中堂閣朽故喻三界眾生依正二報無常敗壞之相也眾生清涼心中無故而起五欲之火故曰欻然長者諸子喻三善道言五道眾生堪受化者什一而已長者見是大火下喻以佛眼觀見六道眾生貧窮無福慧故不覺不知以苦捨苦故無求出意佛見眾生之苦如此所以興起大悲濟度之心也舍利弗是長者作是思惟至但東西走戲視父而已此下喻三七思惟依實施權之意也身手有力喻佛具有神力智慧力也衣裓几案衣裓若此方之衣襟可以提取几案如此方之椅轎可以提挈喻攝受也一門喻一乘法被機不廣故云狹小所謂若我但以神力及智慧力捨於方便讚如來知見力無所畏者眾生不能以是得度以一乘法信之者希則得度者寡意要施權令眾生自信自肎則受化者眾矣此喻始坐道場初七思惟若但讚佛乘眾生沒在苦不能信是法故二七思惟依實施權故云一門狹小意要別設方便也佛以神力攝授提挈眾生而不得必欲自信自肎者正謂把手他人行不得為人自肎乃方親耳若人不信不肎則諸佛所不化矣諸子幼稚下喻眾生無知難化將設方便先陳其害使知怖畏乃肎自出此三轉之初先示三界之苦狀也父雖下喻眾生迷惑不受教不求大勢佛及以斷苦法故如視父而已了無親信之心也爾時長者即作是念至競共馳走爭出火宅此言長者救焚喻佛三七思惟現身三界初說三乘也然佛已出三界而言同及諸子必為所焚者喻佛性之在眾生五欲煩惱之中若不以方便開顯必當斷滅佛種故如同焚也先心所好者喻眾生以著諸欲而墮生死今亦以種種所欲之物而引導之故說三乘種種方便所謂先以欲鈎牽後令入佛慧也互相推排爭出火宅者喻佛居鹿苑諸外道等如舍利弗各領徒眾而爭歸於佛也推排喻諸弟子初心捨邪從正之狀是足以見三乘之權有力也是時長者見諸子等至得未曾有非本所望此喻廢三顯一之意也長者見諸子得出其心歡喜等者喻諸小乘因聞佛教而出三界證四諦果無復生死煩惱之障礙故如露地而坐如諸子心安而父亦踴躍歡喜正如子病而父亦病子安而父亦安佛以同體大悲攝化眾生意見於此矣時諸子等就父索車喻聲聞執權果以為實也長者各賜一大車等者喻今說法華各授成佛之記名為等賜以顯平等佛性也其車高廣喻一乘之廣大也眾寶莊校等者顯長者之財富無量喻一乘二智之甚深所謂方便知見波羅蜜皆已具足莊校華纓所以飾外喻方便權智婉筵丹枕所以飾內喻實智法樂駕以白牛喻大法唯大根眾生堪荷負也膚色等喻大根之純淨大力喻堪荷負行步平正喻正行其疾如風喻根利多僕從喻多方便自慰也所以者何下自釋等賜大車之意謂長者財富無量不應自厚而薄於子正喻佛自住大乘若以小乘化則為墮慳貪也今此下結一視諸子喻佛觀三界眾生如一子地故愛無偏黨也所以者何下喻佛無盡藏既已與人己愈有故云猶尚不匱諸子各乘大車等喻今二乘成佛實出望外也舍利弗於汝意云何至善哉善哉如汝所言此佛審身子長者許三而賜一為虗妄不者以三車本無喻三乘假設唯有一乘是實也身子所言不虗者意謂身命可寶尤責於物也全軀保命已得弘多況免火宅之難乎即不與最小一車猶不虗妄以長者本意假設為誘引故況今等賜一大寶車已出望外豈虗妄耶是則身子已信三乘為假一乘是實則諸大弟子可因譬喻而悟矣故佛讚言善哉善哉善其契會佛心也舍利弗如來亦復如是至於一佛乘分別說三此以法合喻也如來以一子地視眾生故為世間父故喻長者宅主而生三界下此合其家廣大以成就無量知見等正如長者大富也本有救焚之心故生三界與民同患教化眾生令至安隱之地故欲令得菩提也見諸眾生下合宅舍四面火起諸子躭湎嬉戲不以為患也舍利弗下合長者救焚無䇿是舍唯有一門而復狹小思設濟度之方也若我但以神力等以至眾生不能以是得度正合一門狹小之義也所以者何下合諸子癡迷思設方便權宜也如彼長者下合假設三車誘引諸子本心在後等賜一大車也而作是言下合善言誘喻諸子也汝速出三界下合長者許門外三車可以遊戲快樂也若有眾生下合諸子出宅就父索車也喻中許三原無三法中許三各取證意使三乘之人知昔果是權文雖法喻不齊而意在開權顯實也此一段通明三乘之權合諸子聞許三車而爭出火宅也如彼長者下將顯今實合長者等賜一大白牛車重牒其喻以法合也如來亦復如是正顯今實諸三乘人一一授記成佛也故云皆以如來滅度而滅度之是諸眾生下合等賜諸子一大寶車寶物莊校無物不備正喻法界莊嚴萬德具足也淨妙第一之樂正合婉筵丹枕所謂實智自受法樂也如彼長者下重顯初許三車不妄正合今座權立實諦信今實不虗也如來亦復如是下總結喻說以明開權顯實之意諸佛所證法藏甚深靡不竭施眾生但法大機小不能盡受所以將一乘法分別說三者此也佛欲重宣此義而說偈言譬如長者有一大宅至有五百人止住其中此頌喻佛為三界依歸故如宅主其宅久故下十二句三界喻眾生同業所感之依報堂舍通喻眾生別業所感之正報高危等喻無常敗壞之狀久故謂從來如此非特今也有五百人止住其中則五道眾生皆不免無常生老病死之苦也鴟梟鵰鷲烏鵲鳩鴿至毒害火災眾難非一此詳喻三界眾生惡業因果一一備陳其情狀也上言是朽宅中有五百人而言子者一十二十乃至三十蓋言五趣眾生堪受化者不過什一特指人天善類而言其不受化造惡者眾矣今總言惡業眾生肆貪嗔癡諸煩惱濁種種顛倒習氣之不一故感三途苦果之不同甚可畏也喻文一百三十二句總顯三途之因果皆由人中惡習情想所召之不同葢舉果以驗因言雖稱喻其實是法如楞嚴習因交報可徵矣前譬如長者下十六句總喻三界眾生鴟梟鵰鷲下二十四句別言畜生之因果也畜有飛走蠢輭諸蟲受形巨細之不同或婬習以恣貪或嗔習以肆毒其惡均也三毒肆發而無忌故云交橫馳走男女身形種種不淨屎尿流溢猶然貪愛執著而不捨誠若蜣蜋之集糞壤狐狼之囓死屍貪得不已若群狗慞惶而求食爭競不休摣掣而發嘷吠之惡聲此畜類之因果皆三毒之顯現故云其舍恐怖變狀如是槩言畜生之情狀也處處下別顯鬼趣之因果也言處處皆有者無一眾生不以魑魅魍魎之心而為鬼趣之因也夜叉云苦活鬼言食人肉者由昔人中惡業深重損法身傷慧命斷絕善根故墮鬼中以苦自活而以人肉為食者此由人而入鬼趣者也三毒相滋故云產生執悋不捨故云藏護此由畜生復入鬼趣之苦果故夜叉爭取而食之此由畜而入鬼趣者也以畜類既多而鬼趣亦盛故食飽而惡心轉熾宿習現行兩相交攻故鬬諍之聲甚可怖畏也鳩槃茶云可畏鬼無常殺鬼也或時離地等者或一念之善而感人天尋即墮落故云往返遊行言嬉戲者所謂在餘惡道如遊園觀也鬼取其畜畜畏死而鬼快意故云怖狗自樂畜多種而獨指狗者以狗習近於人貪嗔盛故復有諸鬼下單言餓鬼之狀也身大裸形言其貌惡常住其中言其時長一墮此中經五百劫不聞漿水之名故云呌喚求食𮮦腹針咽首如牛頭言其形惡食人噉狗言從人及畜皆墮此類也頭髮髼亂言狀惡殘害兇險言性惡皆宿習然也呌喚馳走則苦逼所致夜叉下通結鬼畜皆有求出之心而無門可出故但闚看牕牖而結云如是諸難恐畏無量皆三毒之實報是皆舉果以明因重在因也以二類皆有互相造業之狀故下言地獄則通重其果是朽故宅下通顯地獄之因果也以地獄苦逼二類但受而不能造故將明地獄而重舉宅主者意喻三界朽宅唯佛能化故云屬於一人三界眾生由三毒猛熾故云忽然火起無常敗壞一至則無論鬼畜皆歸地獄故宅被火焚而諸鬼大呌諸蟲慞惶不能自出所謂生不修福死歸苦處也惡獸毒蟲始則交橫肆毒今則悶絕無知故云藏竄孔穴地獄苦極之狀也毗舍闍云惱害鬼言煩惱至此亦無所施故云亦住其中是皆生無福德故為火逼入於地獄冤對相尋故云共相殘害也野干之屬始則恣貪嗔以囓他人之死屍今則自死其屍又為諸大惡獸之所食也地獄盡皆業火燒然故臭煙充塞昏無所見也蜈蚣毒蛇始則逞毒以傷人今被燒而爭出又為惡鬼所取食此則從地獄出復墮畜生之中矣餓鬼本因婬習所招以生為欲火死為業火故頭上火然無飲無食故饑渴悶走而不能出此三毒惡業所歸之極處也故總結云其舍如是甚可怖畏眾難非一也甚矣眾生癡迷三毒熾然故感三途之劇報皆迷一心所致故知三途惡事皆唯心變現之境也佛始以火宅喻三界舉其大者而言之其宅中諸惡禽獸及諸惡鬼皆三惡道中之實事如楞嚴所謂內分之因果也言雖為喻其實即果以明因非別取分外之物為喻也然眾生三毒而為三途之因形雖未化而心與之俱往矣古釋配合於法雖詳不若尅就因果之實事為切故不暇一一今但略通大義若欲具明請觀別解是時宅主在門外立至嬉戲快樂自在無礙此頌長者救焚也宅主在門外立譬佛獨出三界也聞有人言譬三七思惟諸天梵王請轉法輪也先因遊戲者謂三界眾生始因無明縱浪煩惱而墮三界初非有心要墮故云嬉戲長者聞已下四句喻佛現身三界與民同患也告諭諸子十六句喻將說三乘先示生死苦患之相也諸子下四句頌諸子了無出心喻眾生雖聞佛教而不信也是時長者下二十四句喻佛初說三乘假名引導也諸子聞說下六句諸子聞說三車而爭出宅喻眾生依佛教法而出三界也長者見子下二十句喻眾生離苦而慈父樂也生育甚難言人身不易得也爾時諸子下十二句喻三乘執權當實也長者大富下三十句喻今獨說一乘妙法也寶物莊嚴喻一乘果法萬德皆備也諸子是時下六句喻今聞法歡喜也告舍利弗我亦如是至一切皆當成得佛道此頌以法合喻也合上十節一一可知總之皆為捨權就實也是乘微妙清淨第一至更無餘乘除佛方便此頌廣讚一乘之德也佛所悅可言一乘乃佛所樂說若三乘則原非本心日夜劫數者謂一入妙法則久近情忘以法自娛無論大小直至成佛而不退也故結之以是因緣更無餘乘告舍利弗汝諸人等至安隱眾生故現於世此頌重明佛為救眾生出世應機說法頌我為一切世間之父等意也皆是吾子言三界眾生為佛一子地未有父不憐子者因見眾生長劫燒然故興悲出世拔濟也以眾生根小故先設權乘雖出生死其實非真滅度也今說佛慧唯是實法若昔所化有眾生聞而生信者則皆是菩薩俱有成佛之分矣若人小智下明昔權所以言苦集滅道四諦之法所以為權者以小智眾生深著愛欲故為先說苦諦以警之使知苦而生厭諦者真實而無異也眾生知苦而不知苦本故為說貪欲為苦本使知斷集而滅苦也若滅貪欲則苦無所依使知修道而證滅也以離苦名為解脫耳是人於何下十二句言滅非真滅所言解脫者但離虗妄分段生死名為解脫其實未得一切解脫以有變易生死尚在故說此人未實滅度以未得無上大涅槃故所以為權佛之本意只要眾生成佛豈以是為足哉但大小三乘皆應機之法也然小法非真而如來亦說者以我為法王於法自在隨我所說無非秪為安隱眾生故現於世耳汝舍利弗我此法印至在所遊方勿妄宣傳此頌申明今說大法深誡身子擇機宣傳也誡其勿妄者以我今日所說名為法印佛所說法以實相印印定諸法故使魔外不得混易此法專為利益世間故說但須擇機苟非其人則甚勿妄傳也若有聞者隨喜頂受至隨順此經非己智分此頌正明擇機也若有聞而隨喜頂受者是人則為不退大菩薩矣即無大機但有聞而能信者此亦難得亦可為說若有信受下十二句言信機也以能信此法者則已曾供佛聞法福慧深厚若能信汝即為見我及比丘菩薩如在今日靈山一會此堪能荷負故可為說耳斯法下八句言此大法為深智說非淺識所及也汝舍下八句言不及所以且汝智慧第一尚以信得入況餘聲聞信語而不信心者乎所以非己智分也又舍利弗憍慢懈怠至此人罪報汝今復聽此頌誡非機勿傳也此法甚深難信難解即佛住世親為眾說猶且待機四十年未敢速說及說尚有增上慢人況佛滅後身子小乘縱善說誰能信之乎其在同儕多有憍慢自高及懈怠寡聞者亦有我見自是者此三等人皆不可說說亦不信返生誹謗不若不說為得耳其在凡夫無智況深著五欲即聞亦不解說之何益故誡勿妄宣傳也非機不信不唯無益而返害之以此經乃人人佛性種子也凡不信者定生誹謗若謗此經則斷一切世間佛種矣縱不誹謗或顰蹙而厭聽懷疑而不決皆不信之儔也言有害者以取三途之罪報也汝今復聽吾今為汝一一說之其人命終入阿鼻獄至如是展轉至無數劫此頌歷言謗經之罪以警不信之儔也其有謗經之罪必先墮地獄一入地獄而時長難出者以佛性種子名常住真心既背此心而永劫沉淪常在地獄固其所也從地獄出當墮畜生至謗斯經故獲罪如是此頌明畜生之報也畜有多種隨業受形狗性苟且以失正信故墮狗以多疑故墮野干以損法身故形瘦而黮癩以不敬三寶故人惡賤以不䬸采法味故困饑渴肉枯竭以永殞善根故生受楚毒死被瓦石皆斷佛種性之罪報也上乃畜之眇小者若作駝驢皆力大而能負重者以煩惱癡重故常負重而更受杖捶以性執愚故但念水草餘無所知皆謗此經所感之報也或因邪見而作野干又無一目以生不知所敬故被童子打擲而至死也捨此而更受蟒身長大而無足蓋嗔癡之劇報也受小蟲𠯗食之苦者以多口誹謗故受苦不休是皆謗此經之罪報也若得為人諸根暗鈍至無智人中莫說此經此頌言人中之報也若得為人者言從地獄畜生幸出而為人也生無智慧故諸根暗鈍不敬三尊故矬陋𤼣躄為人短小輕蔑人故以生無聞見故感盲聾以我慢自高故感背傴以謗法故人說不信口出惡言故口氣常臭邪想固蔽故鬼魅所著以生無法則故貧窮下賤為人所使以不餐采法藥故多病痟瘦以遠離慈父故無所依怙雖親人人不在意也以無正念故所得易忘以性習顛倒故修醫順方而更增他疾自病遇藥而返增劇以非理加謗故他逆而橫罹其殃上皆人中之報也以永殞善根故永不見佛聞法長劫聾啞諸根不具纔由三途而出為人人中業感旋即復入三途故常處地獄如遊園觀在餘惡道如己舍宅駝驢猪狗是其行處皆謗經之業招感也若得為人下十六句言先從三途出而為人由人而復入三途今則又從三途出而為人所謂如遊園觀也既得為人猶然夙業難消仍復盲聾等為莊嚴水腫等惡病為衣服言苦不離身也身臭不淨之如此矣日又我見而不悛嗔恚而不息婬熾而不擇如此安能脫苦趣何以停𮄊劇報之迅輪乎是皆謗經之罪報也告舍利下總結非機有此多損說不能盡以是因緣故誡汝無智人中莫說此經也若有利根智慧明了至汝當為說妙法華經此頌正言上根可說之人也如上所說一一有人如此真法器也乃可為說否則失其人矣安可使慧命不續乎求佛舍利則精誠之至也昔康僧會西域望見震旦有五色光燭天知為佛舍利尋光而來至江東佛陀里結茅設像行道或奏吳主孫權以為異主詔問言為佛弟子問佛何在云佛已滅有舍利可驗問可得見乎云精誠求之乃可得也因命立壇求之不應以死始期七日不應改期七日又不應再期終不應會乃禱曰余死不惜則此土眾生終絕佛法之緣也於是精誠益篤中夜極力大呼佛號三聲徧身血汗迸流於是忽聞瓶中鏗然有聲光燭天地進之吳主大喜建塔奉之此長干塔為江南佛寺之始有人求經如此豈忍不為一說乎告舍利下總結正機前非機之罪窮劫說之不能盡今正機之益亦窮劫說之不盡也妙法蓮華經信解品第四此述中根領悟因喻說而生信解也此品來意四大弟子因聞世尊譬喻之說又見身子領悟得記乃今的信昔果是權解今一乘是實因悔恨癡迷故說窮子喻以敘本懷曲盡父慈子頑之狀以譬怖大之心既聞開發今始自信乃解昔非故此品來也信解始此其意直至囑累品方盡信解之義以諸子由信解而堪囑累故爾時慧命須菩提至發希有心歡喜踊躍此敘四大弟子聞說譬喻乃生信解故歡喜踊躍將敘昔懷也前法說則身子智慧上首獨一人領悟此喻說亦所難信以從前種種因緣譬喻談之熟矣今非昔比要且非智莫解故須菩提稱曰慧命居上首也以小乘空法空生等上首一捨則眾皆能捨矣以聞未曾有法發希有心所以歡喜踊躍也即從座起整衣服至樂說譬喻以明斯義此敘得失之情也居僧之首下先敘昔之所以執信小果為實者以年朽邁幸得涅槃之安自謂不堪大事無復進求無上菩提之心以此自足故世尊一向說法我等疲懈絕無精進但念自證空法為足了無度生之心是故於菩薩大法淨佛國土教化眾生之事心不喜樂所以不喜者以世尊始令我等出於三界我等已出已證涅槃之果矣況今年邁但以無事為安是故於菩薩利生成佛之事不生一念好樂之心且每聞佛呵自謂絕無成佛之分矣豈知昔果是權設哉我等今於下敘今信解之情因聞佛授聲聞成佛之記所以心大歡喜者以忽然得聞希有之法法王大寶不求而一旦自得豈不深自慶幸哉慶幸之心無以自見當說譬喻以述領悟之意譬若有人秊既幼稚至坦然快樂無復憂慮此喻信解之情先敘昔日不信之狀也良以眾生無明暗蔽真性如幼稚無知背覺合塵久淪生死如捨父逃逝久住他國備沉五道生死長遠故如五十其年長大以無善根困歷四生以苦自活如求衣食以有正因熏習故漸到本國以本覺法身流轉五道名曰眾生所謂如來藏轉三十二相入一切眾生身中如垢衣所纏故云其父先來以背覺合塵故云求子不得中止一城其家大富等者譬舍那如來居華藏界現威特身稱法界之莊嚴故云大富珍寶無量等喻佛實智佛有無量知見波羅蜜皆已具足故云悉皆盈溢僮僕等喻佛方便權智利生之事業臣民可以任使令象馬等可以供運載皆權智也化功歸己故云出入息利應身無量徧十方界故云徧他國多商賈也商賈以主人之本而取利喻佛之應身也久淪生死徧歷諸趣故喻經歷國邑今幸值佛出世故如漸到父城也父每念子者經云奇哉奇哉一切眾生具有如來智慧德相但以妄想顛倒而不證得所謂與子離別五十餘年心知眾生具有佛性而尚未設化故云未曾向人說如此事但自思惟下喻三七思惟度生之方法心懷悔恨者悔昔既有一乘之緣種不應放捨恨易失而難遇也老朽喻佛因窮果滿若生緣之殆盡也多有財物喻二智甚深無有子息喻無上根以續慧命佛法無傳如家業之散失欲有所付是以初七思惟以興無緣之大悲也思法有所付故如來以大事因緣出現於世但以護念付囑為懷若長者思得其子以付家業始得無憂也世尊爾時窮子傭賃展轉至往至貧里以求衣食此喻二乘華嚴會上怖大之事也說華嚴時二乘亦預但未入法界之門故喻窮子遇到父舍而住立門側也遙見其父踞師子床等喻說華嚴地上菩薩主伴圍繞諸天神王如吏民僮僕等正喻怖大以有眼不見舍那身有耳不聞華藏法故如威德特尊即懷恐怖而竊以為王非己可並也以二乘之見狹劣故念非傭力得物之處以華嚴廣大自在稱性法門非二乘所堪貧里喻人天小乘易修易得故如肆力有地衣食易得也或見逼迫喻無心希求強以大乘見化恐失己利故疾走而去見子便識喻普見眾生皆有佛性也凡有心者定當作佛故喻思有所付思念此子無由見之喻佛正觀眾生無眾生相以眾生任運自然現於平等大悲心中故如而忽自來甚適所願也年朽貪惜喻法報功德佛所護念即遣旁人喻華嚴頓教乃佛加被菩薩所說十信法門知一切法即心自性成就慧身不由他悟所謂急追將還也凡非己所為而加之曰怨今作佛本非二乘所求故喻不相犯而見捉華嚴四十二位一一皆說菩薩求佛果海利生之事故喻執之逾急強牽將還菩薩往來三界利生遊戲神通之事二乘觀三界如牢獄厭四生如桎梏故喻窮子念無罪而被囚執此必定死悶絕躃地正喻有眼不見有耳不聞之狀也二乘去果海甚遠故喻父遙見然一乘頓法被機不廣思欲開權故縱之勿強誡莫與語也所以者何下釋縱放所以將申設權之意也佛自知一乘頓法非劣根所堪故喻如長者自知豪貴為子所難言審知等者喻若眾生全無佛性則已苟有佛性不愁不受其化也因此故須方便以度之正喻將欲施權也不語他人云是我子喻待其時聽自信也放之者任之而已喻不強化往至貧里喻樂為鄙事既知是子而縱之者意在必須方便此二乘之權特為不信劣根眾生所設明矣爾時長者將欲誘引其子至下劣之心亦未能捨此喻施權也將欲等將者且然未必之辭喻佛未現應身先遣菩薩內秘外現以同事攝誘引二乘為先導也除糞喻斷煩惱以華嚴說無明十二因緣即普光明智此豈二乘所堪故說小乘斷見思速取小果易見効也故云先取其價慕果修因故喻尋與除糞見子愍怪喻興慈悲也窓牖遙見等喻佛未現身前以佛眼觀見六道眾生貧窮無福慧因此三七思惟以方便度脫也即脫瓔珞等喻佛隱千丈尊特之身現丈六老比丘相右手執除糞器等喻隨順劣根三十四心斷結成佛之事因此得與二乘周旋故喻以方便故得近其子也咄男子等斥使安意無復他慕喻諸小乘初從外道親近於佛恐有退墮之意故斥使安之也當加汝價等小乘始學七方便得證初果如一日之價由是而進二三四果漸入大乘故喻加價也諸有所須等者喻三十七品助道之法老弊使人喻小乘神通皆佛所棄故如老弊我如汝父者喻釋迦示三藏果頭佛以非真佛故云如父所以者何下喻上如父而漸親之意嗔恨諸惡喻外道謗佛更與作字名之為兒喻二乘與諸菩薩同入法性皆當稱子但幼小無力故名為兒爾時窮子下喻歷阿含方等斷見思煩惱故云二十年中常令除糞過是已後下喻歷方等而入般若彈呵淘汰之功二乘之人於此漸向大乘故云心相體信般若會上佛命須菩提轉教菩薩人雖小乘能說大法故云出入無難未捨小果故云所止猶在本處長者有疾等喻憂慧命未續涅槃將至也以般若未盡法界之量故云多少取與令二乘轉教故云汝悉知之將定父子之分故先囑云當體此意般若乃平等佛慧故喻父子不異將有付囑故云宜加用心無令漏失上皆喻佛命二乘轉教之辭也即受教勅下喻奉命轉教故般若萬行三乘悉知故喻領知眾物但以非己智分故喻無希取一餐之意以二乘未肯即捨小果故喻窮子下劣之心亦未能捨也已上通喻昔失蓋約四十秊前之事下喻今得正顯此會復經少時父知子意至今此寶藏自然而至此喻今得也復經少時等喻說般若後二乘已有樂大之心也臨欲終時等喻涅槃時至即說此經授記二乘作佛也將欲付囑乃因多寶集十方分身諸佛證明此法故云并會親族等宣言等喻此經中說往昔教化因緣之事一切財物皆是子有喻今授記依正劫國莊嚴等事也窮子聞父此言即大歡喜正喻今得也世尊大富長者則是如來至所應得者皆已得之此以法合喻也佛視眾生如一子而二乘人心以菩薩為真子自視為似子而已佛因眾生苦故特說出苦小乘之法諸聲聞人以為諸苦熱惱迷惑求脫心切故樂著小法此樂小之情也三苦者謂苦苦壞苦行苦也今日世尊下合滯權之情也世尊以方便力等敘佛令二乘說般若轉教菩薩之事以得小果為足故於大乘般若無有志求我等又因下敘世尊知我樂小故不即為授記故我等不知真是佛子總上通合昔失也今我等下合今知不失也以今日觀佛慈悲方知昔日元無秘悋而我等亦未嘗失但不樂大耳於此經中下敘悟佛心觀今為說一乘則知昔彈呵之時早欲以大乘教化矣此謂是我等咎也是故下正合今得今見世尊說此大法特為身子授記且云千二百人皆當作佛此實法王大寶不求自至所以為大慶幸也爾時摩訶迦葉欲重宣此義而說偈言我等今日聞佛音教至甚大歡喜得未曾有此頌通敘信解之情也譬如下頌喻昔失也初八句頌子逃父求也求之下三十四句頌喻菩提場思化有緣之眾也死時將至喻不化眾生慧命將絕也爾時窮子下十二句喻迷淪之事也求索衣食喻在迷中有出苦之心也有得無得喻從小乘外道修習也饑餓等喻未得正修返傷法體也遂至父舍喻到覺場未敢入也爾時長者下十句喻說華嚴時也窮子見父下十四句喻乍見法界之事也長者是時下十二句頌喻說華嚴大法也但普觀眾生具有佛性未即開說故云默識驚愕等正喻聞說頓法怖大之事也長者知子下十二句頌喻開權也遣人即內秘外現以示同事攝也窮子下四句喻樂小長者於牖下十句喻隱勝現劣也既益汝價下八句喻說小果修進之法也若汝也如我子似子而已非真子也長者有智下十二句頌喻般若時也入出二十年正喻轉教般若之事以非己智分故云我無此物而不希取也已上通頌喻昔失父知下二十一句頌說法華因緣之事也今於下六句頌喻今得上頌喻說下法合也佛亦如是知我樂小至普於其中應受供養佛亦如是下八句頌合樂小故為說小法也佛勅我等下三十二句通合滯權也佛勅下至說無上道合說般若教菩薩事也諸佛子下至當得作佛合聞般若菩薩各得授記成佛也一切下至說斯真要合自滯權小疑佛不為說大也如彼下重喻滯權故云自無志願非佛悋而不教也我等內滅下二十一句重明初心樂小所以貪著小乘得少為足故不生喜樂因此故於般若佛慧無復志願以自所得法將為究竟耳我等下十六句重敘樂小之心即以所得小果謂已報佛恩矣所以自足而不進也我等雖為下二十二句重明滯權佛即縱捨以待時也以待調伏其心然後乃教大智佛恩難報正在於此我等今日下二十八句正敘今得言得道得果正明今悟一乘實智也以久持淨戒修梵行而今乃得無上大果是知今實亦由昔權而至也前云若不信此法非阿羅漢今日乃知是真阿羅漢應受人天供養也世尊大恩以希有事至於一乘道隨宜說三此明深知大恩念不能報也世尊下二十六句申明恩大難酬謂佛以希有事方便憐愍教化利益我等脫億劫難拔之苦證無上菩提之果何恩大於此哉所以無量億劫無能報者也手足下言難報之事以恩量如空安可以有相身心身外長物而可以報哉所以於恒沙劫亦不能報也諸佛希有下十句重申難報之所以也以佛自證無量不可思議廣大神通而能為我等下劣眾生忍於斯事且又為我等取相凡夫曲施方便隨宜而說此世尊慈悲大恩無可為喻豈能報耶諸佛於法下十六句述明隨宜而說以感方便大恩也所以能隨宜而說者以佛得最自在之法所謂我為法王於法自在故能知眾生種種樂欲隨力所堪故以無量譬喻言詞而為說法隨根授法種種籌量分別知已故於一乘法隨宜說三此領三七思惟之事感此曲垂方便之恩至難酬報者此也既不能報惟心感而已從上佛祖知恩者希果能知恩則為的骨子矣窮子一喻描寫窮子始終之情狀吐露當機之本心未有如此之詳且盡者苟不知恩何能有此
