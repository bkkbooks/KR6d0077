body:
  text: 明南嶽沙門憨山釋德清述敘意昔天台智者大師精持此經得法華三昧親見靈山一會儼然未散乃通以三觀解釋此經全體以至百界千如總歸觀心其玄義釋籤最為精詳但文博義幽淺識難窺槩以為繁而宗之者希溫陵禪師創為要解文簡義盡託事表法雅有指歸且宗華嚴之義為一始一終極為允當以意在簡要未盡發揮始終源本故觀者未能洞達原始要終之旨略為闕然然二師判經全部皆以後入品總入流通似未徹歸趣學者漫視為尋常致使佛意未暢經旨不明在文字不無為贅清自幼入講肆聽習不一而竊有疑焉時懷參究往蒙恩遣嶺外先辱達觀禪師聞予發難為許誦此經百部以消夙愆及在行間乃開道場於壘壁集諸弟子課諷眾請講說一週恍然有契遂以開示悟入四字判其全經眾皆悅可因筆為擊節始終一貫而以華嚴信解行證四門收之略無剩法請益大方間有許可因思大綱雖挈以分品目而經未會通不便初學復述品節以彰全經之旨猶略而未詳以宗華嚴發明如來出世為一大事因緣於方便品如來自敘甚明第傳者昧其源頭故學者不無望洋之歎也故今復為通義者以尊古德舊解不敢妄為訓釋但會通全經以歸開示悟入佛之知見發明華嚴始終一貫之大旨以暢如來出世之本懷若合殊流而歸於海以重在綱宗而文言可略故通其大義雖製不師古而理有所宗觀者幸無以人廢言區區僭越之罪可逭矣懸判佛說一代時教古德分判淺深多少不一賢首大師分而為五謂小始終頓圓以此經為終教以華嚴為圓教天台智者大師分而為四謂藏通別圓以此經為純圓以華嚴為別圓謂帶別明圓是則二師似有相左蓋各有所尊耳天台以為純圓者意謂此經純談實相如大白牛純一無雜三乘同歸五性齊入理無不徹事無不盡究竟為圓而以華嚴為別圓者以四十二位之行布謂借別明圓此則未盡圓融果海事事無礙稱性之極談故獨尊此經不無貶損以天台親悟法華三昧得處稱尊以顯法勝妙非謂抑揚賢首以華嚴為圓此經為終者蓋華嚴乃報身佛據實報土稱性所演圓圓果海法界圓融自在法門依正塵毛一一稱性週遍雖言諸位義彰因果交徹無障無礙故稱為圓而以法華為終者以此經乃化佛所說據方便土曲引三乘同歸一極所謂如來以一大事因緣故出現於世欲令眾生開示悟入佛之知見然佛知見者乃一真法界如來藏心舍那證之為法界海慧普光明智是謂一乘常住真心初成正覺於菩提場即稱此心演說華嚴頓彰圓融無礙法界獨被大機而小根在座如盲如聾所化不廣所謂一門狹小未盡本懷故觀樹經行三七思惟將一乘法分別說三故以同體大悲不起於座遍現十方垂應化身示從兜率降王宮八相成道於鹿野苑說四諦法度諸眾生而諸聲聞雖證涅槃而於一乘佛之知見杳然絕分因此費佛四十年中權巧方便彈呵淘汰之功至此法華會上眾志貞純纔信佛心乃有成佛之分故一一授記方遂如來出世本懷至此利生之緣將終故云終教此約化儀事畢為終而稱圓者乃收因結果究竟攝入果海之圓非自住圓融果海之圓也故華嚴為頓圓如日初出先照高山此經為漸圓如合殊流而歸於海若龍女成佛亦名圓頓大論所明二經歸趣皎如日星請觀方便一品則如來出世本懷具可見矣是知經中喻稱長者威德特尊指佛報身而言也一真法界長者家也華藏世界無量莊嚴長者之富也一乘因果大白牛車也前至寶所法界歸寧之地即所謂妙莊嚴海也凡所施設皆歸法界種種發露何所不明是故古德有判華嚴為根本法輪諸方便教為枝末法論法華為攝末歸本法輪而教中所顯不出理行因果以理行為因證入為果愚謂四十秊前方便引攝至楞伽會上說自覺聖智識藏即如來藏顯理圓心妙經云我大乘非乘已有開權顯實之意至法華會上純談實相一色一香皆歸中道顯行圓境妙理行既圓心境皆妙佛之知見了此而已如來出世本懷無餘事矣故三乘人開此知見故一一授記即入涅槃所以為終引歸法界方為究竟此賢首約化儀判為終教極為盡理溫陵約與華嚴相為始終最為有見第未盡發揚耳但諦觀經旨融會教觀妙契佛心則了無剩法矣釋題題稱妙法蓮華經者乃直指一真法界如來藏心以立名也論云所言法者謂眾生心是心總攝世出世間一切諸法而為法界之全體一切聖凡染淨因果無不包含融攝在聖不增在凡不減處染不垢出塵不淨是以舍那如來證窮此心故心境一如聖凡平等眾生本具故曰奇哉奇哉一切眾生具有如來智慧德相但以妄想顛倒執著而不證得良由諸佛悟之而為普光明智名佛知見眾生迷之而為無明業識生死根株一見此心當下是佛此心之妙也華藏世界依正莊嚴重重無盡微妙圓融塵毛草芥依心而立實相無相此境之妙也心境不二純是一真故稱妙法然此妙法眾生迷之名為藏識諸佛悟之名如來藏依此一心建立法界名蓮華藏是以真妄交徹染淨融通因果同時始終一際故約喻則取象蓮華約法則直指心體也然而此心在佛則為普光明智亦名實智又名一切種智亦名自覺聖智故名佛知見在眾生則為根本無明以眾生本具佛之知見但以無明葑蔀而不知故諸佛出世單為揭示此心使其眾生自知自見而悟入之故曰諸佛如來唯一大事因緣故出現於世所謂開示眾生佛之知見使得清淨故唯以此事為大更無餘事是為如來出世本懷甚矣此心之難悟也惟我舍那如來初成正覺於菩提場頓示此心演大華嚴名曰普照法界脩多羅名為一乘獨大根眾生見聞得益而下根劣解身雖在座如盲如聾故興同體大悲觀樹經行將一乘法分別說三故現應化身雙垂兩相二始同時於鹿野苑說四諦法度諸聲聞原其本懷特為開示佛知見也以眾生根鈍自茲以來經四十秊勞佛種種無量方便群機不悟久被彈呵方有信佛之心直至法華會上見其根機既純諦信此心即為一一授記成佛所謂知一切法即心自性成就慧身不由他悟釋迦出世本懷今日方遂故盡情吐露歷敘一往同患之苦心以了利生之能事於此不久即入涅槃所謂應跡之終也故如長者將終委付家業是知此經如付家業之囑書乃為一代時教之流通以一向不說謂之護念今日乃說是為付囑故事該已往義在言外苟非圓照法界妙契佛心而以區區文字求之則渺無歸宿了此一題則於全經之旨思過半矣姚秦三藏法師鳩摩羅什奉詔譯姚秦者乃東晉五胡亂華姚興有國之號也初前秦主苻堅見道安法師尊稱為聖人安曰貧道非聖聞之西域龜茲國有鳩摩羅什者是為聖人檀越欲見當可迎之時堅以鐵甲七萬命呂光為將伐龜茲取什及至圍城王曰吾與中國相邈遠素不相通何為見伐光曰大秦天王聞王國有聖人鳩摩羅什欲請歸供養非利王之土地也時什秊方二十乃龜茲王甥智辯非常業已為王講般若經王曰什乃吾國之寶豈肯輕棄聽其命耳王久不解什請於王曰以貧道之故而苦其民人非慈悲之道也願請行即當返耳王不得已遂遣行光迎什入關聞堅已卒姚萇自立光遂據涼州即位國號大涼未幾光卒子紹立為太原公呂纂所害纂立又為呂超所廢立呂隆數秊什皆被幽姚興弘始三秊遣師伐隆隆降遂奉什入長安秦主師禮之什在涼為紹等挫辱有不堪其言者師安忍之及見秦主初甚敬重次因西域梵師有持禪波羅蜜經至者與什甚契興欲留之梵師不住遂棄去興怒陰遣使者襲殺於關外因疑什恐有去志乃賜宮女與什謂續佛種以占什意什逆知之以為法情深遂納之以釋其疑譯此經時始居草堂正當危疑之際而以法為重乃不避嫌成此法緣因見古人忘身為法備歷艱難什滅葬後塔前生青蓮華姚興啟塔視之華從舌根而出非大聖示現何以有此哉初肇公同居譯場秦主雅重未幾什入滅而肇亦被害悲哉此經二十八品大科為三分前序一品以彰說法之由致判為序分正宗一分二十七品以開示悟入四字科之從方便品至法師品九品為開佛知見見寶塔一品為示佛知見從提婆達多品至囑累品十一品為悟佛知見從藥王本事品至普賢勸發品六品為入佛知見開示悟為信解入為行證品末數句為流通分以終焉妙法蓮華經序品第一如是我聞一時佛住王舍城至亦與眷屬俱此結集法藏之儀式也乃世尊臨滅阿難所請最後垂範諸經通置於首具如常解惟佛說法各稱機宜其所列眾以當機為首此經乃最上一乘教菩薩法而以聲聞居前者以今開權顯實特為引攝二乘入佛知見授記作佛故為上首若夫歎德則曰諸漏已盡心得自在正顯諸二乘人心已調柔堪受大法斯正機熟得道之時若下所列諸弟子輩則其人也其有學比丘尼等亦首居者以佛所化者有因有親餘皆屬因此則親也緣因佛性正為此耳向下各為授記是為了因佛性顯了利生之能事畢矣菩薩摩訶薩八萬人至各禮佛足退坐一面此序廣列法會之眾也諸大菩薩乃助佛揚化為法眷屬以佛為出世至聖所說之法乃絕世之談自非法身大士何能鼓簧文殊是七佛之師而能妙契佛心故居上首此經以智立體是所宗故至若諸天人王龍神八部常隨佛化為護法眾故俱在座以如來出世為化眾生齊成佛道是為本懷今為諸二乘人一一授記各得成佛將畢利生之事正似長者將終委付家業并會親族國王大臣剎利居士為作證盟而付囑之此所以靈山一會不少一人可想見其勝集也若華嚴集眾同異生身有四十二以表各得一位法門圓成果海是知諸經列眾各有所宗耳上為通序下為別序爾時世尊四眾圍繞至歡喜合掌一心觀佛此別序發起此經之由致也將談妙法先說無量義經者以四十秊前為三乘人所說諸法皆方便施設未離心意識量今將顯示一乘實相佛知見地故先說此經而為前導意欲諸人離心識出情量乃可入佛知見耳此經乃諸佛秘密心法如輪王頂髻中珠不妄與人故為佛所護念此已顯心法之妙矣復入無量義處三昧者以顯寂滅一心實相真境非散心亂意可窺必從三昧而觀方可深入無際故三昧亦名無量義處此已顯境妙也心境皆妙而全經之旨已彰於此矣意顯了此心境方為成佛之真因故天雨四華非入此心境不足以飜破無明故地搖六震已顯妙法全體大用所謂先以定動者也法會大眾昔所未見故皆歡喜不知所以故但觀佛而已冀有所授也爾時佛放眉間白毫相光至以佛舍利起七寶塔此全彰法界真境也白毫相光表中道妙智所謂自心現自覺聖智境界也以一真法界普光明智一切眾生動亂根塵識界皆是此智隨緣變現今此智現前洞然照澈了無隔礙故徧照東方萬八千界三界苦樂之依處六道眾生之輪迴諸佛成佛之始終菩薩利生之妙行皆不離此智用故皆圓現於光中了此一光則淨穢情忘生佛平等而一乘實相佛智見地昭然心目之間矣所謂後以智拔者也全經大旨盡見於斯爾時彌勒菩薩作是念至悉見彼佛國界莊嚴於是彌勒菩薩欲重宣此義以偈問曰文殊師利導師何故至瞻察仁者為說何等此彌勒問明實相真境也一乘妙法實相真境佛知見地已盡露於一光之中矣四眾昔所未見故驚而起疑殊非心識思量可到彌勒雖聖識情未透故不免分別所以騰疑以文殊大智必能了其原由且以歷事多佛必曾見其實事故須請問以決之至於所問光中所現六趣眾生之情狀諸佛利生之事業菩薩修行之始終乃至種種求道之因緣供佛舍利之妙行歷歷明見且謂如來入定須之頃光中乃見眾多久遠之事相纖悉不遺何緣有此殊不知舍那如來於菩提場說華嚴時入普光明智剎那際三昧乃現十界身星羅普應處處說法利益眾生是知鹿苑至今四十秊中所作事業未起剎那三昧此豈劣解眾生心識分別所能知耶是則一往所說未盡光中之事今日乃露法界之一班耳故了此光相則洞見佛心是謂悟佛知見矣此非心識可知亦非言說可到實為妙法之全體務在妙悟絕言是故世尊將談妙法先以一光為前相也吾人苟能覩此光相不言而喻又何墮落葛藤窠臼哉爾時文殊師利語彌勒菩薩至難信之法故現斯瑞此文殊總答問意也夫瑞不虗應應必有由故知現瑞將說大法之前相也雨以潤其焦枯螺以壹其眾志鼓以筞其疲怠皆說大法之譬也以大法希有恐作尋常欲生難遭之想故先以瑞事警發故曰欲令咸得聞知難信之法故現斯瑞諸善男子如過去無量無邊至三菩提成一切種智此引燈明之本始以證釋迦祖述其道以顯妙法傳續有由也佛號日月燈明者以日月通乎晝夜照不及者則燈以繼之此常然大明不昧以象普光明智之德也能證此智即名為佛故十號具足以佛所證根本實智故所說法稱性而談故初中後善隨機分別故說三乘而為一乘之方便故曰令成一切種智引古證今此則釋迦化儀相同也次復有佛亦名日月燈明至千萬佛所植諸善本此歷敘從前二萬億佛名字皆同而說法亦同以明佛佛道同以顯妙法心心相印也名號及所證既同而說法又同故初中後善以其本智乃轉八識之所成故最後佛未出家時而有八子此本覺在纏之象也八子各領四天下謂其識不離四大根身也賴耶出纏故聞父出家諸識悉捨染污而俱成智矣故云悉捨王位亦隨出家常修梵行也釋迦本既同古而跡亦相類本跡既同而無不同矣是時日月燈明佛至教菩薩法佛所護念此燈明相傳至二萬億佛是知佛性種子前無始也時至而說無量義經入無量義定者則佛佛以開佛知見為究竟之談也雨華動地放光等事一一同今以顯實相心境始終不二寂滅真常是為希有之法也而彼眾騰疑則難信難解從來舊矣非特今也彼佛出定即說妙法華經足證開權顯實之法自古佛佛說法之弘規以此可知今日之事矣彼佛說妙法時六十小劫之久而聽眾謂如食頃是知一乘妙法佛知見地為普光明智不離剎那際三昧也一入此三昧則生滅見亡頃久一致了無身心之相則十世古今始終不離於當念所以無有一人而生懈倦也說此經已即入涅槃諸佛利生了此大事則出世之本懷畢矣以此則知我佛不久涅槃時至也將滅而授德藏之記者欲以此法付囑有在冀將傳續於無窮足證此會弟子各當成佛有分也彼佛滅後妙光持法華經八十小劫為人演說者以顯一乘佛知見地究竟不離智用也燈明八子皆師妙光者以顯妙觀察智在因則有轉染令淨之功在果而有鑒機說法之用所以八子皆令成佛也八子最後成佛者號曰然因師妙光燈而成果亦仗持經之功用然燈又為釋迦之本師則其妙法展轉傳授有自來矣以明古今一道也然此佛之知見殊非識情思量分別之境故求名貪利者而不通利且以善根為成佛真因故得值多佛此又為今日聲聞得記之證也故文殊結指其人曰彼妙光者我身是也求名菩薩則汝彌勒是也彌勒既曾在昔持經而疑現前之事者信乎此法非識心分別之境也歷觀往古入定放光之瑞相出定說經授記之因緣則知今日必說大乘妙法蓮華經也此乃懸序即今法會之因由先示實相寂滅之心境全體大用一念頓彰此非言說可到故放一光圓明顯現以借文殊大智為眾傍通畢見如來出世之本懷即四十秊來未起普光明智剎那際三昧也世尊一日陞座文殊白槌云諦觀法王法法王法如是故後正說妙法但云如是而已爾時文殊師利於大眾中欲重宣此義而說偈言我念過去世無量無數劫至以求無上道此頌長行入定放光及光中圓現法界事相生佛始終一一相同但於唱滅詳出教誡勉勗之辭及滅後起塔四眾精進求道之事此又預為今會最後之垂範也以見佛法難值耳是妙光法師奉持佛法藏至令盡無有餘此頌助化傳宣顯益皆同結證必說妙法華經而先以光瑞為方便也今佛放光明助發實相義者以佛知見寂滅心境殊非言說思量可到聊以毫端三昧示之所謂如我按指海印發光要使諸人直下便見不隔絲毫所以宗門諸祖棒喝交馳揚眉瞬目無非直指西來的意此則不待言說而為方便也人者苟能了此光相則日用現前二六時中咳唾掉臂無非法華三昧矣妙法蓮華經方便品第二正說之初品以方便名者以第一義諦平等寂滅超情離見無作無為是則佛未出世祖未西來一段真風凜凜充塞渾淪現成所謂向上一路空劫已前唯佛與佛乃自知之是謂佛之知見豈假作為良以眾生迷而不悟勞我世尊捨自法樂脫珍御服著弊垢衣現身三界曲為今時發揚此事是則纔出母胎一手指天一手指地曰天上天下唯我獨尊此則徹底為人通身吐露早已大垂方便矣及至出家入山修道成佛說法四十秊來去來坐立常為此事更無餘事則從前一往種種施設無非特為眾生指示本分向上一事何莫而非方便耶柰何眾生垢重情深一向不悟所幸淘汰既久根器漸純將有開發之機故世尊今日特為大眾吐露本懷顯示本有故為此會說法華經開示佛之知見以明出世之因緣令諸眾生各各自知自見自信自肯悟入而後已方愜本懷所以各為授記者正顯但信自心即名為佛一悟此心則染淨情忘法法皆妙心外無法除此心外無片事可得所謂一乘妙法佛知見也以此寂滅離言之道非言可到故先入定以示其微密放光以彰其圓妙是則前之光瑞又為今日之方便也大眾不悟猶自驚疑故假彌勒文殊傍通一線是為方便之方便也悲夫大眾畢竟茫然故我世尊重打葛藤此則一落言詮又為此法之方便也故以名品此連下八品判為開佛知見者以眾生本有佛之知見向被無明封蔀而不自知故如來出世特揭而開之然此開字約佛則為揭開打開開除之開故云開方便門下經云如却關鑰開大城門在機則為開發之開所謂悟自心者如蓮華開然盡三周說法通為開者以世尊一往四十秊前所說三乘之權意要聞者了悟一心之妙以三乘人不得離言之旨但執權說以為真實故不信自作佛今則開除前權打開秘藏頓顯一實故上根聞說即信自心非智者不能故法說一周獨舍利弗一人領悟而中根之士因譬方知故譬喻一周四大弟子領悟其下根之士終為絕分故廣引宿昔因緣之事而後方悟故千二百等皆從因緣一周而領悟也其說雖長總要當機的信自心是佛所以一一授記成佛是以極盡如來神力為眾發揚今日纔得大眾發真信心名雖領悟但醒悟之悟非悟入之悟其實但入信門而已矣歷觀後文許以信得入及諸弟子自敘昔日不信之辭及身子領悟四大弟子述成乃以信解標品故開佛知見重在信心正與華嚴知一切法即心自性成就慧身不由他悟而以信為基本也故雖授記而猶歷多劫事多佛正同四十二位乃由信解而後行證也苟不立諸位則歷劫無明何由頓淨無上佛果豈能頓圓哉請觀化儀則知如來說法始終之意也爾時世尊從三昧安詳而起至辟支佛所不能知此世尊出定稱歎諸佛二智甚深以證己智將以開佛知見也諸佛本智證窮法界徹盡塵毛故實智甚深隨順三乘機宜所說九部諸法通為引攝眾生入佛知見故為入智慧之門言雖種種差別不一皆為指示一心究竟佛知見地言近指遠難解難入故為權智甚深諸二乘人淺智著相不能了達離言之旨故不能知非智不入故身子當機意抂激發二乘也所以者何佛曾親近至隨宜所說意趣難解此徵釋二智甚深所以也以親近多佛則佛之心印盡得之矣盡行道法則佛佛修行妙道利生規則盡習之矣其所造進不至徹法而不已以勇猛精進故實德內充而名稱普聞如此名實並隆者以其成就未曾有法也故為眾生隨宜所說諸法皆為發揚第一義諦寂滅之旨所以意趣難解故非二乘所知也舍利弗吾從成佛已來至知見波羅蜜皆已具足此佛自歎二智甚深以明從前方便之所以也以諸佛證已則己智之甚深可知故自出世成佛以來四十年中所說九部諸法以種種因緣譬喻無數方便權巧法門無非顯示一乘引導眾生離生死著入佛知見而已法雖差別而心本一真以我如來權實二智皆已具足故稱性而說方便權中已具知見之實諸二乘人隨言取義故不知究竟歸趣所以難信難解開權顯實已揭於此矣舍利弗如來知見至未曾有法佛悉成就此歎二智甚深之因也由親近多佛盡行多法故所證真實知見廣大深遠即諸佛之德用若四無量心四無礙辯十力四無所畏禪定解脫等一切諸法一一深證窮極一切未曾有法皆悉成就以其所證實智既深故德用無邊此在華嚴所明佛智佛境界佛功德等一一稱真法界皆以海言方知廣大深遠也由其所證者深故隨順機宜善能分別種種巧說諸法觀根逗機言不逆意故柔軟應不失時故眾悅此權智甚深之妙也佛之德用說不能盡總而言之無量無邊未曾有法佛皆成就此其所以諸二乘人不能知也止舍利弗不須復說至如是本末究竟等此正顯諸法實相也既說而又止之者葢顯此法逈出常情未可輕談恐其聞者驚疑不信故秪可但言難解不敢言其所以也然所以不可言者以佛所成希有之法諸三乘人難信難解唯佛與佛乃能究竟諸法之實相此乃離言難解之法豈可輕談哉下釋諸法實相難解之所以然諸法者不過相性體力作因緣果報本末耳盡此十法而已皆易見而易信者何難之有以即諸法以顯實相故深妙而難解也何謂諸法實相耶若言其相相即無相相如也若言其性妙性天然性如也若言其體體自真常體如也若言其力力用稱真力如也若言其作作而無作作如也若言其因生本無生因如也若言其緣性空成事緣如也若言其果果不離因果如也若言其報業性昭然報如也若言本末則始終一際本末如也以上諸法一一是如是之法故究竟平等寂滅無二此諸法之實相也以可信可解者諸法三乘皆知而難信難解者即諸法以明實相此唯佛與佛乃能究盡殊非二乘可知耳爾時世尊欲重宣此義而說偈言世雄不可量至如是諸人等其力所不堪此重頌二智甚深難解以顯究竟實相也稱佛為世雄者無雌可匹曰雄謂佛超出凡聖而獨尊之稱也言道場所得果正指盧舍那佛於菩提場初成正覺證窮法界海慧乃曠劫修因所感之果此佛自證之境界故唯佛悉知言如是大果報者正指華藏世界無量莊嚴圓融果海交徹無礙故云種種性相義此唯佛與佛乃能知之以果海離言不可說示故云言辭相寂滅此離言之道非思量分別之境豈三乘人所堪耶但可以信入耳此頌正為究竟一實之地為今所歸之極致以長行未盡故頌中特發明之假使滿世間皆如舍利弗至亦復不能知此歷頌三乘不知二智之甚深也身子智慧第一假使滿世間之身子固不能知即正使滿十方之身子合弟子之眾智亦不能知身子雖智不如獨覺之利智亦滿十方如竹林之多合眾智為一心盡億劫之長久亦不能知獨覺雖利不若菩薩之大根如稻葦之多即充滿十方合一心於恒河沙劫咸皆思量亦不能知新發意之菩薩不若地上不退之深證合恒沙之眾心思而求之亦不能知信乎佛智甚深微妙也以佛智如空無所依超出思量心識之表而三乘人以所知心測度而求其境界豈可得乎三賢十聖住果報唯佛一人居淨土如九重深密事不許外人知而佛智甚深總非九界眾生可知耳又告舍利弗無漏不思議至引之令得出此頌誡令當信妙法亦信三乘是權也以實相離言之道非心識思量分別之境界而三乘人以心思測度而求之此其所以難知也以其法不思議甚深微妙故唯佛與佛乃知之耳諸人但當信之而已若信今是實信昔是權則可捨執著而悟入之也大經云若人欲識佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙是豈可以執著思量而求之耶爾時大眾中有諸聲聞至甚深微妙難解之法此身子因佛止而不說乘大眾之疑而請也世尊此會入定放光現希有事大眾無不驚疑所幸文殊已釋之矣今方出定不待眾問而自極歎二智之甚深且云從前所說之法意趣難解二乘所不能知然一向聞佛所說一解脫義我等已得何嘗不知而今世尊一旦無故而作是說者此我眾心甚可疑也此正二乘但信佛語執悋之心未捨將以昔證為實不知是權所以因斥而起疑即身子雖智而亦未免懷疑也願聞今日稱歎之因緣所以為眾請說爾時舍利弗欲重宣此義而說偈言慧日大聖尊久乃說是法至欲聞具足道此重頌請意也聖人不出世萬古如長夜故稱佛為慧日四十年前未曾稱歎甚深不可思議之法故云久乃說之無問而自說者以是道場所得法乃佛自證之境界非眾所知故無能發問者即我雖智慧亦難可測故不能問所以無問而自說也況所歎之法是世尊尋常所行之道眾皆以為已知矣而今極歎其甚深微妙唯佛自知殊非三乘所及所以大眾生疑也眾等皆疑我亦未了敢問世尊所歎者為是究竟之法耶為是所行之道耶若是究竟法則是道場所證唯佛自知固非我等可及若是所行道則四十秊來眾所同見同聞而共知者業已取證矣何甚深之有此其所以生疑也欲聞具足道則究竟所行皆願指示歸趣也故敢以請爾時佛告舍利弗至諸天及人皆當驚疑此因請說而重止也所以重止而不說者以今日開權盡廢三乘打破向家之窠窟如家國之喪亡恐其皆當驚疑也夜光投人鮮不按劒況無上妙法乎是以未敢輕易投人也舍利弗重白佛言至聞佛所說則能敬信爾時舍利弗欲重宣此義而說偈言法王無上尊惟說願勿慮是會無量眾有能敬信者此申重請必說之意也意謂世尊所以不說者將為此會智淺根劣而不信耳今觀四眾根利智明必能敬信必不負世尊開示也佛復止舍利弗若說是事至將墜於大坑爾時世尊重說偈言止止不須說我法妙難思諸增上慢者聞必不敬信此出再止之意也所以止之而不說者非是秘悋亦非無機第恐增上慢人聞而不信以此輩未得謂得未證謂證自以為足必生誹謗則不唯無益而返害之將墮惡道以妨此等故不若不說為嘉耳爾時舍利弗重白佛言至長夜安隱多所饒益爾時舍利弗欲重宣此義而說偈言無上兩足尊願說第一法至則生大歡喜此申三請之意也身子所恃而懇請者以觀此會大眾皆久受佛化者必無增上之儔也然下退席之眾皆與身子同一法會周旋久矣而竟不知其人者可見人之相與知心之難即此可進增慢之儔也爾時世尊告舍利弗至吾當為汝分別解說此因懇請許說也佛為此會業已入定放光動地最先警發羣機矣此非小小因緣也及方出定即便稱歎二智甚深而又無問而自說矣宜乎徑談何以將說而又止之必待再三懇請而後說者何也一則以顯二智甚深難信難解未可輕談二則發其二乘樂大之心堅其篤信令生希有之想耳以二乘人一向與佛周旋視為尋常而其所說之法易信易解故遇便信受不以為難即有不信而所損不多以其法乃權設人乃小果尚有可待之時今則開佛知見為一乘成佛之真種況微妙甚深若輕說則仍前如言取義而不入或我慢輕忽而不信則永斷佛種絕成佛之真因或致誹謗而墮惡道則所損者大故待再三懇請而後說也觀華嚴將說十地而金剛藏必須三家五請而後說者一以恐其有損而不說二則以其地法深妙難解而不易說且法界海會純一上機宜其隨說而有鄭重若是今法華一乘實相正是華嚴法界之地體況二乘劣解力所不堪若輕投而不信則永斷善根再無成佛之機矣且如來化緣將畢時不待人安有從前之日月哉所以必須眾志貞堅可一變而至於道也三止之意豈徒然耶說此語時會中有比丘至世尊默然而不制止此上慢退席以策羣機也當許說時座下有五千人禮佛而退世尊默然而不制止者正以警發二乘當捨夙習而以虗心受教也增上慢者己實未得未證而自以為已得證故謂之上慢又且自高於已得證者云增上慢此輩自以為足其心不虗無受教之地若聞妙法而不信入則永斷佛種此在座與二乘同列皆有自足之心也如後身子與四大弟子皆云佛說一解脫義我等已得又云我等已得涅槃而不復進求無上菩提是皆增上慢儔也以其執著夙習知見安能得入一乘妙法哉故今退者不止正欲激發此輩令捨舊日名言習氣自淨其心可受今日之教也若留而惑眾則大負如來深慈矣爾時佛告舍利弗至唯然世尊願樂欲聞此喜機純可說也無復枝葉純有貞實則益堅眾志故云退亦佳矣楞嚴云若有一人不清淨者則使道場終不成就況五千乎故以退者為佳也佛告舍利弗如是妙法至如優曇鉢華時一現耳此正說妙法也如來極盡神力剛道如是二字而已信乎諸法寂滅相不可以言宣也如是者直指之辭法者即前相性等諸法然諸法未見其妙但即諸法以見如如是為妙耳若見諸法之妙則心外無法一切真常無非實相了此即名為佛故如優曇華時一現耳優曇乃瑞應華三千年一現現則有聖人出此則待時而現也以喻一乘妙法尋常不說必待機熟得道之時而說也舍利弗汝等當信佛之所言不虗妄上已直指妙法全體但以難信難解此下所謂分別解說葢不得已而有說也以其難信故最初教以當信以前三乘之法二乘皆執為實今一旦廢之恐其不信故誡以信佛所說言不虗妄此正世尊法久後要當說真實此開權顯實已盡於一言之下矣向下無非發明此意舍利弗諸佛隨宜說法至無有餘乘若二若三此明權即是實以顯一乘之妙也諸佛隨宜說法皆以為權殊不知意趣難解以即權即實故難信耳下徵釋之曰何以權即是實以無數方便演說諸法皆離心意識境界以顯佛知見地原非思量分別之境而二乘人以思量求之故不能解所以唯佛與佛乃能知耳所以即權即是顯實者不待今日故云諸佛本為一大事因緣故出現於世所言一者謂一真法界常住真心也心外無法故曰一廣大包含生佛平等依正不二故曰大諸佛證此自利利他故曰事以眾生本具為因諸佛為此出世助發為緣單因此緣此而出世間更無別事故四十年來種種方便開示者此心耳故下又徵釋之曰云何名一大事等此又分別解說一大事也所言一大事者乃眾生本具真心即佛之知見也然而此心但為無明所蔽故諸佛出世特為眾生揭開而指示之令離妄染而得清淨使自悟入為此而已豈更別有他事哉故結之曰是為諸佛以一大事因緣故出現於世是知諸佛但為教化菩薩令其成佛唯此一事原非為教二乘也豈有二乘三乘為實事哉此則如來大暢出世本懷盡廢三乘之權獨顯一乘之妙極盡於此矣舍利弗一切十方諸佛至尚無二乘何況有三此歷引十方三世諸佛說法之儀式以證釋迦今日言不虗妄以有憲章祖述也佛意謂我以無量方便演說諸法皆為一乘佛知見者非創為也乃宗十方三世一切諸佛諸佛皆以無量方便種種譬喻言辭演說諸法是法皆為一佛乘故令諸眾生聞法究竟皆得一切種智直至成佛而後已佛佛皆然是知諸佛但為教化菩薩直令悟入佛之知見以此為能事是故我今遵諸佛說法之儀式所以先說三乘者以知眾生有種種欲深心所著故不得已隨其本性而開導之以佛說一切法為治一切心若無一切心何用一切法即其所說皆要眾生得一佛乘一切種智故耳十方世界尚無二乘三乘我何獨異於諸佛哉此則痛斥二乘盡廢昔權如來出世本懷畢露於此矣舍利弗諸佛出於五濁惡世至於一佛乘分別說三此敘諸佛出世不得已而說三之意也佛佛出世所以必說三乘者以處濁惡之時也眾生剛強垢重而難化不得不隨機而調伏之所以費盡無量無數之方便故將一乘法分別說三豈得已哉劫濁謂同造惡一類眾生同聚一時故名劫濁執斷常等具六十二種邪見名見濁眾生心識但以妄想貪嗔癡等擾亂其心名煩惱濁以不淨種子發業潤生合成眾生名眾生濁業識命根隨生死業故名命濁當此時世濁亂之極豈可頓教成佛哉所以廣用方便者此也舍利弗若我弟子至無有餘乘唯一佛乘此痛斥二乘令堅一乘之信也華嚴地上菩薩名真阿羅漢且地上菩薩大阿羅漢豈有不知成佛之事哉故云若我弟子自謂阿羅漢辟支佛若不知諸佛但教菩薩事者此則非佛弟子所謂假名羅漢辟支佛耳故下領悟則曰我等今者真是聲聞真阿羅漢所云非真阿羅漢者以不信此法故也且我弟子既證羅漢得出生死即當上求佛果可也今執著小乘而自以為足不復進求菩提者皆是增上慢人也若果真是阿羅漢豈有不信成佛之事哉此斥之深而欲信之切也若現前親見佛聞法無有不信此事者除佛滅後不得見佛但能持經容有不信者雖比時不信但能受持解義者亦作成佛遠因此人若遇餘佛亦得決了所謂金剛種子歷劫不磨如人食之終當透皮而出此正華嚴所說聞而不信尚結佛種之因以佛性種子為成佛之真因固當信重故云汝等當一心信解受持佛語諸佛如來言無虗妄等以結章首之言也爾時世尊欲重宣此義而說偈言比丘比丘尼有懷增上慢至唯有諸貞實此頌退席之眾也長行通舉五千頌列三等雖云上慢我慢不信總之皆一闡提也缺戒護疵則根器不淨小智糟糠則智淺心麤以無福德故不堪受法所以去耳此眾貞實故當說也舍利弗善聽諸佛所得法至以故說是經此頌即實明權也初一偈總頌謂佛所得法乃道場所得一乘實智佛知見之大法也以眾生不堪故以方便權巧而為說之此三七思惟正為此也眾生心所念下一偈頌不堪之所以良由眾生心念行道邪正欲性好尚善惡業果種種若干之不同皆非受大之根器為是等故不敢說大佛悉知是已下兩偈半正明施權謂既知根器不堪不得不以方便權巧而化之此九部法皆為此輩而說也修多羅云契經伽陀云孤起頌本事說佛本行如提婆達多忍辱仙等本生說佛往因如十六王子等未曾有即希有之事因緣即種種緣法譬喻如下火宅等祗夜云應頌優波提舍云論議此敘小乘九部之權法正為二乘而說者若加方廣自說授記為十二部總為隨機之說也鈍根下四偈半頌即權明實之意謂以鈍根樂小之人雖近多佛而不行妙道故為生死眾苦所惱愍此等故說小乘之涅槃設是方便其實意要引入佛慧如下化城之設意在引至寶所但密意調伏未曾明說汝等成佛一向不說者以說時未至故今正是其時決定說大乘然大非九部之外別有也但知九部隨機之說專以引入大乘為本懷因為入大故說此經非別有大乘也即權明實之意盡揭於此矣有佛子心淨柔軟亦利根至皆成佛無疑此頌今為大根顯實也心淨根利行深妙道則異上鈍根堪荷大法故為說大乘所謂正直捨方便也故記是人來世成佛以此大根深心念佛則心與佛冥修持淨戒則不貪著生死一聞得佛大喜遍身所謂毛孔熈怡佛性種子殊勝故為說大乘若未聞妙法則根之利鈍尚有差別若得聞此大法則無論大小皆得成佛無疑所謂利根鈍根等雨法雨皆得充滿此正顯實之大益也十方佛土中唯有一乘法至說佛智慧故此頌結顯一實也謂雖有三乘假名引導其實但顯一乘佛慧所以權即是實是知諸法皆如也諸佛出於世唯此一事實至皆令入佛道此頌敘佛出世唯說一乘之意也初五句頌諸佛出世唯證一實故不以小乘度人下二十句歷敘不以小乘度人之所以以佛自住大乘當行平等之慈利物也所得法乃道場所證法身真體也定慧莊嚴乃現他受用報身也法報冥一故曰平等以自證平等之大法豈可以小乘而化人即化一人已墮慳貪尚為不可況其多乎凡若有人信歸於佛佛則一以至誠待之若欺其不能誑其不知貪其利嫉其勝皆諸法之惡也佛皆斷之故於十方無惡名之怖亦無大眾之畏故以相好莊嚴之身現光明普照之相為說一乘實相之大法此暗敘坐菩提場之事也一實相印所謂海印三昧也佛所說法以實相印印定故魔外不混舍利下一偈敘出世本懷如我下一偈敘今滿願方稱本懷也若我遇眾生盡教以佛道至來世得作佛此頌敘開權之所以也佛既本願化一切眾生成佛如何又說三乘之法耶以所遇無智之眾恐其錯亂迷惑不受故所以隨機演說耳非本意也下廣頌五濁惡世眾生難度不得不設方便之意我知下八句頌煩惱濁受胎下四句頌命濁入邪見下八句頌見濁於千萬下四句頌劫濁當此濁惡之世眾生汩沒苦惱之中故設方便先說出苦之法示以涅槃滅苦之道此但滅盡諸苦出分段生死非真滅度出變易生死也諸法下四句顯實如何是真滅耶以諸法本來真常寂滅此是一乘之妙道佛子行此來世成佛以二乘但見生滅四諦之法故今特為顯示方盡如來出世本懷也我有方便力開示三乘法至唯一無二乘此頌敘顯實也如來方便知見波羅蜜皆已具足故云有方便力以此故說三乘以諸佛皆說一乘故我今唯說一乘眾當諦信無疑也過去無數劫無量滅度佛至令入於佛道此頌十方三世道同先明過去諸佛也以過去諸佛皆依權演實故我釋迦祖述其道也又諸大聖主知一切世間至助顯第一義此頌廣明助顯第一義也言更以異方便者此意從序品文殊云今佛放光明助發實相義而來意謂實相妙法非言可宣佛先放一光全彰妙體則實相真境平等顯現可不言而悟矣為正方便以諸佛皆以無數方便說三乘法今言即權顯實良以此法微妙難信恐三乘人一向執權悋而不捨不能離言取義則實相難明前雖放光平等示現惜乎諸人不悟業已當面錯過矣前云佛子行道已來世得作佛意恐二乘之人向怖佛道長遠猶存希望有待之心未必盡信故不肯捨權則負此嘉會失其時矣今顯第一義諦實相妙法生佛平等不論聖凡有福無福乃至人天小善但能從佛一心信心則當下是佛不待更成此我世尊急欲二乘發起信心故引諸佛更以異方便助顯第一義也故下引菩薩人天乃至微因小善舉手低頭一稱佛名則皆已成佛不待更成況三乘九部之權法豈非成佛之本乎是則宗門發明向上一棒一喝之下揚眉瞬目譏呵怒罵之間令人頓脫生死情根豈非舉手低頭已成佛耶以前已一光平等顯現恐其忽略又云種種因緣說法皆為一乘故今重以種種小行助顯故云更以異方便助顯第一義由是觀之一向三乘之權法豈非一實之法乎故云我此九部法入大乘為本者此也若有眾生類值諸過去佛至皆已成佛道此頌歷敘異方便也今異方便首舉菩薩次舉人天而不及二乘者以今九部法止是二乘成佛之方便因恐不信故引菩薩凡夫非分之法以助顯之使其必信無疑也且菩薩乃未成佛之人也今言已成者意顯六度乃稱真實相之行也凡夫乃非成佛之人也今言若善輭心則非剛強梗化之人但能隨順佛法信心不逆者以凡夫中有此柔輭之心於佛滅後雖未見佛但能因佛發心或為供舍利誠心造塔以用七寶乃至童子之聚沙或為供像誠心七寶以至童子草木爪甲之戲畵或為供佛誠心華香伎樂以至散心舉手低頭之恭敬或散亂心見佛一稱其名號如是種種眾行微因小善蓋皆從佛發心也所以一一皆已成佛者以眾生乃諸佛心內之眾生但日用而不知有今從佛發心則知有佛知有則自心全體是佛是以凡作一行皆是佛行所謂一念信心即得菩提故一一言皆已成佛道非虗語也言已成佛者天台六即若理即則具之而已若名字即則知名識字已成之義明矣所以舉此諸行為助顯者苟二乘人能信菩薩之六度凡夫之眾善皆已成佛而九部之方便豈非實相之妙法二乘之涅槃豈非成佛之正行乎端在的信自心不疑佛語當下直證實相矣此如來開權顯實之善巧啟發二乘迫切懇至之心難以言語形容矣觀者若但隨言說而不深體其心則於妙法難窺其奧於諸過去佛在世或滅度若有聞是法皆已成佛道此頌結過去道同也三乘皆親見佛所說之行也凡夫供塔等皆佛滅後乃因佛旋發之行也適然之行尚成佛況特立之法乎未來諸世尊其數無有量至導師方便說此頌未來道同也諸佛本誓願四句言未來諸佛所以祖述現在者以釋迦本願欲令一切眾如我等無異故未來諸佛皆同此願耳諸佛下八句言諸佛自得之法甚深稱性而說故方便甚深也法常無性等者謂一真法界為本住法所謂常住真心故曰常然法界以緣起為宗故云無性無明十二因緣即普光明智以隨染淨緣遇緣即宗染緣乃生死業種淨緣乃佛種吾佛證窮此智故說一乘以為眾生成佛之緣故曰是故說一乘是法住法位等者以佛稱性說法謂之海印森羅常住用其所說之法皆不動本際故住法位以住法位故世間相即常住實相是則無有一法非真實者道場所證如此而已所謂本住法乃實智也以第一義諦寂滅離言但以方便權智為眾演說故所說法一一稱真故權即是實所謂二智甚深也此特敘於未來諸佛中者意為將授記者垂範也天人所供養現在十方佛至隨應方便說此頌現在道同也初八句明權即是實知眾下八句明多方助顯今我亦如是安隱眾生故至皆令得歡喜此頌自行祖述三世也初四句明權即實我以下四句明隨機助顯所謂悅可眾心也舍利弗當知我以佛眼觀至說無分別法此頌因觀六道汩於五濁歷敘出世因緣也初十六句敘觀五濁佛具五眼非佛眼不能窮眾生界故以佛眼觀貧窮無福慧眾生濁也入生死苦命濁也深著五欲煩惱濁也不求佛法劫濁也深入邪見見濁也以觀此五濁眾生故興同體大悲以起濟度之心也我始下十句敘出世因緣以明三七思惟也舍那如來於菩提場初成正覺法報冥一自受法樂因見苦惱眾生感動無緣慈力故初七思惟度脫又思自證智慧微妙第一非鈍根所堪且思度之之方故云云何而可度爾時下八句敘感應道交謂正思出世適諸天來請此正機感應會之時後文所謂聞有人言也我即下八句二七思惟鈍根不堪大法恐其有損故寧入涅槃而不敢輕投也尋念下四句三七思惟當遵諸佛說法儀式以一乘法分別說三也作是下十八句敘諸佛勸喻釋迦善體諸佛之心而以方便即權顯實也故云但為教菩薩舍利下八句敘釋迦因聞諸佛勸喻而依教奉行也思惟下十句正敘雙垂兩相現應化身為今弟子說三乘法也已前佛未出世未有三寶今日乃有三寶之名耳從久遠下四句明雖說三乘本懷但為顯實也涅槃無上大涅槃也生死苦永盡二死永亡也以諸佛久遠劫來所讚示者皆即權以顯實故我常如諸佛所說所謂雖說三乘但為教菩薩也舍利下十二句敘出世本懷因為待機今正機熟應說佛慧之時也如是妙法諸佛如來時乃說之所謂欲識佛性義當觀時節因緣根機既熟啐啄同時則不勞餘力故世出世法當貴乎時也佛祖用處不違時失候故云今正是其時舍利下八句敘退席之眾也言劣根既去則不混亂眾心故喜而無畏以無回互委曲之心故正直捨方便但說無上道也菩薩下四句言昔日小乘一聞今法皆是菩薩昔日懷疑今皆已除各各自信成佛故千二百人悉皆作佛此則不待一一授記早已為眾分明決擇矣如三世下四句通結釋迦仰遵三世諸佛儀式也諸佛興出世懸遠值遇難至無聲聞弟子此頌極讚一乘之難遇以堅二乘之信也初云如是妙法諸佛如來時乃說之如優曇華時一現耳故歷敘其難諸佛曠劫一出豈易值哉即出世而未便即說此法猶隱忍待時經四十年此法豈易說哉今日方說尚有退席之眾此聽信者更不易得其人也所以此法如優曇華時時一現上時訓是然佛雖難值今已值法固難說今已說雖難猶不為難獨有聽而信者甚為難耳故有聞法歡喜不但全身擔荷即發一言讚歎者甚為希有過於優曇華此極言信心難發也汝等下勸其勿疑當信佛也我今業已普告大眾明示但以一乘教化菩薩矣汝等二乘決不可以聲聞自居也我佛慈悲懇切唯恐二乘不信故叮嚀勸喻之如此也汝等舍利弗聲聞及菩薩至廣讚一乘道此頌敘付囑保護之意也謂此妙法乃諸佛秘密心要一向不敢輕談者故切誡身子等既得此法於五濁惡世不可輕易說向於人恐其不信而取惡道之損也若果有上根利智是為難得又不可失人即當為說故曰廣讚則不嫌其多說也舍利弗當知諸佛法如是至自知當作佛此頌總結前意也諸佛法如是謂上說十方三世諸佛皆說即權顯實之法也汝等既知諸佛隨宜方便之事則知元無三乘不必更疑諸聲聞人無成佛之分則宜歡喜自信作佛也甚矣心之難明也佛性種子眾生與佛不隔一毫只在信與不信耳昔有僧問古德如何是佛德云我說恐汝不信僧云和尚重言安敢不信德云即汝便是僧茫然所以自信為難也故世尊既說是法又恐作尋常故囑其保重又囑其必信此其成佛真因以信為本也
